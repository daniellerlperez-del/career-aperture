const SMB_INDUSTRIES = [
  'HR Tech', 'FinTech', 'HealthTech', 'RetailTech', 'LegalTech',
  'InsurTech', 'Supply Chain Tech', 'PropTech', 'EdTech', 'AgTech',
];

const SMB_STAGES = [
  'Bootstrapped', 'Pre-Seed / Seed', 'Series A', 'Series B/C', 'Scale-up', 'PE-backed SMB',
];

const SMB_ROLES = [
  'Founder / CEO', 'CPO', 'CTO', 'Head of Product', 'VP Product', 'VP Engineering',
];

const SMB_PAIN_POINTS = [
  'AI strategy', 'Product-market fit', 'AI governance', 'Platform architecture',
  'Regulated workflows', 'Go-to-market', 'Enterprise readiness',
];

function buildSMBLinkedInURL(industry, role) {
  const q = `${role} ${industry}`;
  const params = new URLSearchParams();
  params.set('keywords', q);
  params.set('origin', 'GLOBAL_SEARCH_HEADER');
  return `https://www.linkedin.com/search/results/people/?${params.toString()}`;
}

function buildSMBGoogleURL(industry, painPoint) {
  const q = `site:linkedin.com/in "${industry}" "${painPoint}" (founder OR CPO OR "head of product" OR CTO)`;
  return `https://www.google.com/search?q=${encodeURIComponent(q)}`;
}

function SMBProspecting({ profile, apiKey, guardrails, onNeedApiKey }) {
  const [industry, setIndustry] = useState('HR Tech');
  const [stage, setStage] = useState('Series A');
  const [role, setRole] = useState('Founder / CEO');
  const [painPoint, setPainPoint] = useState('AI strategy');
  const [loading, setLoading] = useState(false);
  const [pitch, setPitch] = useState(null);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);
  const [companyName, setCompanyName] = useState('');

  const liURL = buildSMBLinkedInURL(industry, role);
  const googleURL = buildSMBGoogleURL(industry, painPoint);

  function copyURL(url) {
    navigator.clipboard.writeText(url).then(() => setToast('URL copied'));
  }

  function addToBoard(boardType) {
    const title = companyName.trim() || `${industry} · ${stage}`;
    const sub = [role, painPoint].filter(Boolean).join(' · ');
    const date = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const card = { id: Date.now(), title, sub, date };
    const stored = load() || {};
    const kanban = stored.kanban || { jobCards: {}, smbCards: {} };
    if (boardType === 'smb') {
      const col = (kanban.smbCards && kanban.smbCards.prospect) ? kanban.smbCards.prospect : [];
      kanban.smbCards = { ...(kanban.smbCards || {}), prospect: [...col, card] };
      setToast(`Added to SMB Pipeline → Spotted`);
    } else {
      const col = (kanban.jobCards && kanban.jobCards.watching) ? kanban.jobCards.watching : [];
      kanban.jobCards = { ...(kanban.jobCards || {}), watching: [...col, card] };
      setToast(`Added to Job Hunt → Light Table`);
    }
    persist({ ...stored, kanban });
  }

  async function generatePitch() {
    setLoading(true); setPitch(null); setError('');
    try {
      const systemMsg = `You are a positioning expert helping ${profile.name} pitch consulting services through Perez Creative Labs. Her background: ${profile.background} Her edge: ${profile.edge}. Write punchy, direct prose — no corporate language, no bullet points in the pitch itself.${buildGuardrailsStr(guardrails)}`;
      const userMsg = `Generate a consulting pitch for ${industry} companies at ${stage} stage who need help with "${painPoint}". Target contact: ${role}. Output valid JSON only: { "hook": "one sharp sentence that names the problem they have", "value": "2 sentences on what PCL delivers and how", "proof": "one credibility statement using Danielle's track record", "ask": "specific, low-friction call to action" }`;
      const res = await fetch('/.netlify/functions/research', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 800, system: systemMsg, messages: [{ role: 'user', content: userMsg }] }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const parsed = JSON.parse(data.content?.[0]?.text || '{}');
      setPitch(parsed);
    } catch(e) { setError(e.message || 'Something went wrong.'); }
    finally { setLoading(false); }
  }

  const UrlRow = ({ label, url }) => (
    <div className="url-box" style={{marginBottom: 10}}>
      <div className="url-box-label">{label}</div>
      <div className="url-row">
        <div className="url-text">{url}</div>
        <div className="url-actions">
          <a href={url} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
          <button className="btn btn-primary btn-sm" onClick={() => copyURL(url)}>Copy</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Field Work</div>
        <div className="page-sub">Find consulting clients for Perez Creative Labs. Prospect SMBs that need AI product strategy, governance, or platform design — and build the pitch.</div>
      </div>

      <div className="card">
        <div className="card-title">Industry</div>
        <div className="chips-wrap">
          {SMB_INDUSTRIES.map(i => (
            <button key={i} className={`chip ${industry === i ? 'active' : ''}`} onClick={() => setIndustry(i)}>{i}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex', gap: 24, flexWrap:'wrap'}}>
          <div style={{flex: 1, minWidth: 200}}>
            <div className="card-title" style={{marginBottom: 8}}>Company Stage</div>
            <div className="chips-wrap">
              {SMB_STAGES.map(s => (
                <button key={s} className={`chip ${stage === s ? 'active' : ''}`} onClick={() => setStage(s)}>{s}</button>
              ))}
            </div>
          </div>
          <div style={{flex: 1, minWidth: 200}}>
            <div className="card-title" style={{marginBottom: 8}}>Target Role</div>
            <div className="chips-wrap">
              {SMB_ROLES.map(r => (
                <button key={r} className={`chip ${role === r ? 'active' : ''}`} onClick={() => setRole(r)}>{r}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Pain Point / Need</div>
        <div className="chips-wrap">
          {SMB_PAIN_POINTS.map(p => (
            <button key={p} className={`chip ${painPoint === p ? 'active' : ''}`} onClick={() => setPainPoint(p)}>{p}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Search URLs — {industry} · {stage} · {role}</div>
        <UrlRow label="LinkedIn People Search" url={liURL} />
        <UrlRow label="Google X-ray (Decision Makers)" url={googleURL} />
      </div>

      <div className="card">
        <div className="card-title">Add to Develop Board</div>
        <div style={{fontSize:11, color:'var(--muted-2)', fontFamily:'var(--mono)', marginBottom:10, letterSpacing:'.03em'}}>
          Type a specific company name, or leave blank to use the current segment as the card title.
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:10}}>
          <input
            value={companyName}
            onChange={e => setCompanyName(e.target.value)}
            placeholder={`e.g. Acme Corp  ·  defaults to "${industry} · ${stage}"`}
            style={{flex:1, padding:'8px 11px', fontSize:12, fontFamily:'var(--mono)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:7, color:'var(--text)'}}
          />
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-sm" onClick={() => addToBoard('smb')}>+ SMB Pipeline → Spotted</button>
          <button className="btn btn-secondary btn-sm" onClick={() => addToBoard('job')}>+ Job Hunt → Light Table</button>
        </div>
      </div>

      <div className="card">
        <div className="card-title">PCL Pitch Generator</div>
        <div style={{fontSize: 12, color: '#8888a0', marginBottom: 12}}>Uses Claude to generate a targeted pitch for this segment using your background as the proof point.</div>
        {!apiKey && (
          <div style={{fontSize: 13, color: '#92400E', background: '#1a1200', border: '1px solid #92400E', borderRadius: 6, padding: '8px 12px', marginBottom: 12}}>
            ⚠️ Requires API key.{' '}<button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'#F0A820',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0}}>Add in Settings.</button>
          </div>
        )}
        <button className="btn btn-primary" onClick={generatePitch} disabled={loading}>
          {loading ? 'Generating…' : 'Generate Pitch'}
        </button>
        {loading && <div style={{marginTop: 12}}><FlaskLoader text={`Building pitch for ${industry} · ${role}…`} /></div>}
        {error && <div className="error-msg" style={{marginTop: 8}}>{error}</div>}
        {pitch && (
          <div style={{marginTop: 16}}>
            <div className="dossier-section"><div className="dossier-section-title">Hook</div><div className="dossier-text">{pitch.hook}</div></div>
            <div className="dossier-section"><div className="dossier-section-title">Value</div><div className="dossier-text">{pitch.value}</div></div>
            <div className="dossier-section"><div className="dossier-section-title">Proof</div><div className="dossier-text">{pitch.proof}</div></div>
            <div className="dossier-section">
              <div className="dossier-section-title">Ask</div>
              <div className="dm-box">{pitch.ask}</div>
              <div style={{marginTop: 8}}>
                <button className="btn btn-secondary btn-sm" onClick={() => navigator.clipboard.writeText([pitch.hook, pitch.value, pitch.proof, pitch.ask].join('\n\n')).then(() => setToast('Pitch copied'))}>Copy Full Pitch</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Networking({ profile, apiKey, guardrails, onNeedApiKey }) {
  const [context, setContext] = useState('Former colleague');
  const [platform, setPlatform] = useState('LinkedIn DM');
  const [goal, setGoal] = useState('Job referral');
  const [targetName, setTargetName] = useState('');
  const [targetCompany, setTargetCompany] = useState('');
  const [loading, setLoading] = useState(false);
  const [outreach, setOutreach] = useState(null);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);

  async function generateOutreach() {
    if (!targetName.trim()) return;
    setLoading(true); setOutreach(null); setError('');
    try {
      const systemMsg = `You are helping ${profile.name} with strategic networking. Her background: ${profile.background} Her edge: ${profile.edge}. Write in first person as Danielle. Be warm, direct, and human — not salesy. Match the length and tone to the platform.${buildGuardrailsStr(guardrails)}`;
      const userMsg = `Write a networking outreach message to: ${targetName.trim()}${targetCompany.trim() ? ` at ${targetCompany.trim()}` : ''}. Relationship context: ${context}. Platform: ${platform}. Goal: ${goal}. Output valid JSON only: { "subject": "subject line if email, null if DM", "message": "the full message, natural and human, no placeholder brackets", "followUpNote": "internal note for Danielle — best timing to follow up and what to watch for" }`;
      const res = await fetch('/.netlify/functions/research', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 900, system: systemMsg, messages: [{ role: 'user', content: userMsg }] }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const parsed = JSON.parse(data.content?.[0]?.text || '{}');
      setOutreach(parsed);
    } catch(e) { setError(e.message || 'Something went wrong.'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Reach</div>
        <div className="page-sub">Write your outreach. Generate a targeted message for any networking goal — referral, consulting lead, coffee chat, or community.</div>
      </div>

      <div className="card">
        <div className="field-row">
          <div className="field">
            <label>Person's Name</label>
            <input value={targetName} onChange={e => setTargetName(e.target.value)} placeholder="Jane Smith" onKeyDown={e => e.key === 'Enter' && generateOutreach()} />
          </div>
          <div className="field">
            <label>Company (optional)</label>
            <input value={targetCompany} onChange={e => setTargetCompany(e.target.value)} placeholder="Salesforce" onKeyDown={e => e.key === 'Enter' && generateOutreach()} />
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Relationship Context</div>
        <div className="chips-wrap">
          {NETWORK_CONTEXTS.map(c => (
            <button key={c} className={`chip ${context === c ? 'active' : ''}`} onClick={() => setContext(c)}>{c}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex', gap: 24, flexWrap:'wrap'}}>
          <div style={{flex: 1, minWidth: 180}}>
            <div className="card-title" style={{marginBottom: 8}}>Platform</div>
            <div className="chips-wrap">
              {NETWORK_PLATFORMS.map(p => (
                <button key={p} className={`chip ${platform === p ? 'active' : ''}`} onClick={() => setPlatform(p)}>{p}</button>
              ))}
            </div>
          </div>
          <div style={{flex: 1, minWidth: 180}}>
            <div className="card-title" style={{marginBottom: 8}}>Goal</div>
            <div className="chips-wrap">
              {NETWORK_GOALS.map(g => (
                <button key={g} className={`chip ${goal === g ? 'active' : ''}`} onClick={() => setGoal(g)}>{g}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        {!apiKey && (
          <div style={{fontSize: 13, color: '#92400E', background: '#1a1200', border: '1px solid #92400E', borderRadius: 6, padding: '8px 12px', marginBottom: 12}}>
            ⚠️ Requires API key.{' '}<button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'#F0A820',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0}}>Add in Settings.</button>
          </div>
        )}
        <button className="btn btn-primary" onClick={generateOutreach} disabled={loading || !targetName.trim()}>
          {loading ? 'Writing…' : 'Generate Outreach'}
        </button>
        {loading && <div style={{marginTop: 12}}><FlaskLoader text={`Writing your ${goal.toLowerCase()} message…`} /></div>}
        {error && <div className="error-msg" style={{marginTop: 8}}>{error}</div>}
        {outreach && (
          <div style={{marginTop: 16}}>
            {outreach.subject && (
              <div className="dossier-section"><div className="dossier-section-title">Subject</div><div className="dossier-text">{outreach.subject}</div></div>
            )}
            <div className="dossier-section">
              <div className="dossier-section-title">Message</div>
              <div className="dm-box" style={{whiteSpace: 'pre-wrap'}}>{outreach.message}</div>
              <div style={{marginTop: 8}}>
                <button className="btn btn-secondary btn-sm" onClick={() => navigator.clipboard.writeText(outreach.message).then(() => setToast('Message copied'))}>Copy Message</button>
              </div>
            </div>
            {outreach.followUpNote && <div className="research-note">{outreach.followUpNote}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsModal({ profile, setProfile, watchList, setWatchList, apiKey, setApiKey, guardrails, setGuardrails, onClose }) {
  const [tab, setTab] = useState('profile');
  const [localProfile, setLocalProfile] = useState({...profile});
  const [localKey, setLocalKey] = useState(apiKey);
  const [localWatch, setLocalWatch] = useState([...watchList]);
  const [localRules, setLocalRules] = useState([...guardrails]);
  const [newRule, setNewRule] = useState('');
  const [newCompany, setNewCompany] = useState('');
  const [newTier, setNewTier] = useState('2');
  const [toast, setToast] = useState(null);

  // ── Watch Dates (Layer 2 — local only, never committed) ──
  const [watchDates, setWatchDates] = useState(() => {
    try { return JSON.parse(localStorage.getItem('aperture_watch_dates') || '[]'); } catch { return []; }
  });
  const [newDate, setNewDate]   = useState('');
  const [newLabel, setNewLabel] = useState('');
  const [newDesc, setNewDesc]   = useState('');

  function saveWatchDates(updated) {
    setWatchDates(updated);
    localStorage.setItem('aperture_watch_dates', JSON.stringify(updated));
  }
  function addWatchDate() {
    if (!newDate || !newLabel.trim()) return;
    saveWatchDates([...watchDates, { date: newDate, label: newLabel.trim(), desc: newDesc.trim() }]);
    setNewDate(''); setNewLabel(''); setNewDesc('');
  }
  function removeWatchDate(i) { saveWatchDates(watchDates.filter((_, idx) => idx !== i)); }

  // ── Export / Import ──
  function exportData() {
    const all = {};
    ['dp_aperture_v1','dp_cold_open_v1','aperture_kpi','aperture_watch_dates','aperture_preview_ok'].forEach(k => {
      const v = localStorage.getItem(k); if (v) all[k] = JSON.parse(v);
    });
    const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `aperture-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    setToast('Data exported ✓');
  }
  function importData(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const all = JSON.parse(ev.target.result);
        Object.entries(all).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
        setToast('Data imported — reload to see changes ✓');
      } catch { setToast('Import failed — invalid file'); }
    };
    reader.readAsText(file);
  }
  function resetData() {
    if (!window.confirm('This will permanently delete ALL Career Aperture data in this browser. Continue?')) return;
    ['dp_aperture_v1','dp_cold_open_v1','aperture_kpi','aperture_watch_dates','aperture_preview_ok'].forEach(k => localStorage.removeItem(k));
    setToast('All data cleared — reload to reset');
  }

  const edgeScore = scoreEdge(localProfile.edge);
  const barColor = edgeScore >= 70 ? '#22C55E' : edgeScore >= 40 ? '#F59E0B' : '#EF4444';

  function save() {
    setProfile(localProfile);
    setApiKey(localKey);
    setWatchList(localWatch);
    setGuardrails(localRules);
    onClose();
  }

  function addRule() {
    const r = newRule.trim();
    if (!r || localRules.includes(r)) return;
    setLocalRules([...localRules, r]);
    setNewRule('');
  }

  function removeRule(i) {
    setLocalRules(localRules.filter((_, idx) => idx !== i));
  }

  function addCompany() {
    if (!newCompany.trim()) return;
    const id = Date.now();
    setLocalWatch([...localWatch, { id, company: newCompany.trim(), tier: parseInt(newTier) }]);
    setNewCompany('');
  }

  function removeCompany(id) {
    setLocalWatch(localWatch.filter(w => w.id !== id));
  }

  const TabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)}
      style={{padding:'6px 14px', border:'none', background: tab===id ? 'rgba(245,156,0,0.10)' : 'none',
        borderRadius: 6, cursor:'pointer', fontSize: 13, fontWeight: tab===id ? 600 : 400,
        color: tab===id ? '#f59c00' : '#8888a0', fontFamily: 'inherit'}}>
      {label}
    </button>
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="modal">

          <div className="modal-title">Settings</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

          <TabBtn id="profile" label="Profile" />
          <TabBtn id="watchlist" label="Watch List" />
          <TabBtn id="guardrails" label="Guardrails" />
          <TabBtn id="api" label="API Key" />
          <TabBtn id="deadlines" label="Deadlines" />
          <TabBtn id="data" label="Data" />
        </div>

        <div className="modal-body">
          {tab === 'profile' && (

function KeywordSelector({ mustKws, setMustKws, optKws, setOptKws }) {
  const [open, setOpen] = useState(false);
  const [custom, setCustom] = useState('');
  const ref = React.useRef(null);

  useEffect(() => {
    function onOutside(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onOutside);
    return () => document.removeEventListener('mousedown', onOutside);
  }, []);

  const isChecked = (label) => mustKws.includes(label) || optKws.includes(label);
  const isMust    = (label) => mustKws.includes(label);

  function toggle(label) {
    if (mustKws.includes(label)) {
      // remove from must
      setMustKws(prev => prev.filter(x => x !== label));
    } else if (optKws.includes(label)) {
      // remove from optional
      setOptKws(prev => prev.filter(x => x !== label));
    } else {
      // add as optional first
      setOptKws(prev => [...prev, label]);
    }
  }

  function cycleMode(label, e) {
    e.preventDefault();
    e.stopPropagation();
    if (mustKws.includes(label)) {
      // must → remove
      setMustKws(prev => prev.filter(x => x !== label));
    } else if (optKws.includes(label)) {
      // optional → must
      setOptKws(prev => prev.filter(x => x !== label));
      setMustKws(prev => [...prev, label]);
    }
  }

  function addCustom() {
    const v = custom.trim();
    if (!v) return;
    if (!mustKws.includes(v) && !optKws.includes(v)) setOptKws(prev => [...prev, v]);
    setCustom('');
  }

  function removeKw(label) {
    setMustKws(prev => prev.filter(x => x !== label));
    setOptKws(prev => prev.filter(x => x !== label));
  }

  const recommended = DOMAIN_KEYWORDS.filter(k => k.recommended);
  const other       = DOMAIN_KEYWORDS.filter(k => !k.recommended);
  const totalCount  = mustKws.length + optKws.length;

  function KwOption({ label, isRec }) {
    const checked  = isChecked(label);
    const must     = isMust(label);
    return (
      <div className="role-option">
        <input type="checkbox" checked={checked} onChange={() => toggle(label)} />
        <span style={checked ? {color: must ? '#ff88b0' : 'var(--accent)'} : {}}>{label}</span>
        {isRec && !checked && <span className="role-rec-badge">✦ rec</span>}
        {checked && (
          <button
            className={`role-option-mode ${must ? 'must' : 'opt'}`}
            onClick={(e) => cycleMode(label, e)}
            title={must ? 'Click to remove' : 'Click to promote to Must Fit'}
          >{must ? 'must' : 'opt'}</button>
        )}
      </div>
    );
  }

  return (
    <div className="role-selector" ref={ref}>
      <button className={`role-trigger ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
        <span>
          {totalCount === 0
            ? 'Select domain keywords…'
            : `${totalCount} keyword${totalCount > 1 ? 's' : ''}${mustKws.length > 0 ? ` · ${mustKws.length} must` : ''}`}
        </span>
        <span className="caret">▾</span>
      </button>

      {open && (
        <div className="role-panel">
          <div className="role-group-hdr">Recommended for your background</div>
          {recommended.map(k => <KwOption key={k.label} label={k.label} isRec={true} />)}
          <div className="role-group-hdr other">All keywords</div>
          {other.map(k => <KwOption key={k.label} label={k.label} isRec={false} />)}
          <div style={{padding:'8px 12px 10px', borderTop:'1px solid var(--border)'}}>
            <div style={{display:'flex', gap:6}}>
              <input
                value={custom}
                onChange={e => setCustom(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCustom(); } }}
                placeholder="Add custom keyword…"
                style={{flex:1, fontSize:12, padding:'5px 8px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', fontFamily:'var(--mono)'}}
              />
              <button className="btn btn-secondary btn-sm" onClick={addCustom} disabled={!custom.trim()}>Add</button>
            </div>
          </div>
        </div>
      )}

      {totalCount > 0 && (
        <div>
          <div className="role-pills">
            {mustKws.map(label => (
              <span key={label} className="role-pill must" title="Must fit — AND logic">
                ⊕ {label}
                <button className="role-pill-x" onClick={() => removeKw(label)}>×</button>
              </span>
            ))}
            {optKws.map(label => (
              <span key={label} className="role-pill" title="Other fits — OR logic">
                {label}
                <button className="role-pill-x" onClick={() => removeKw(label)}>×</button>
              </span>
            ))}
          </div>
          <div className="kw-hint">
            <span className="h-must">must</span> required in results (AND) &nbsp;·&nbsp;
            <span className="h-opt">opt</span> nice to have (OR) &nbsp;·&nbsp; click badge to promote
          </div>
        </div>
      )}
    </div>
  );
}

function RoleSelector({ selected, setSelected }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  useEffect(() => {
    function onOutside(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onOutside);
    return () => document.removeEventListener('mousedown', onOutside);
  }, []);

  function toggle(label) {
    setSelected(prev => prev.includes(label) ? prev.filter(x => x !== label) : [...prev, label]);
  }

  const recommended = JOB_ROLES.filter(r => r.recommended);
  const other = JOB_ROLES.filter(r => !r.recommended);
  const count = selected.length;

  return (
    <div className="role-selector" ref={ref}>
      <button className={`role-trigger ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>

        <span className="caret">▾</span>

      {open && (
        <div className="role-panel">

          ))}
          <div className="role-group-hdr other">All roles</div>
          {other.map(r => (
            <label key={r.label} className="role-option">
              <input type="checkbox" checked={selected.includes(r.label)} onChange={() => toggle(r.label)} />
              <span>{r.label}</span>
            </label>
          ))}
        </div>
      )}

      {selected.length > 0 && (
        <div className="role-pills">
          {selected.map(label => (
            <span key={label} className="role-pill">
              {label}
              <button className="role-pill-x" onClick={() => toggle(label)}>×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

    setNewCompany('');
  }

  function removeCompany(id) { setCompanies(prev => prev.filter(c => c.id !== id)); }

  async function refreshCompany(company) {
    if (!apiKey) { onNeedApiKey(); return; }
    setLoadingMap(prev => ({ ...prev, [company.id]: true }));
    try {
      const prompt = `You are a company intelligence analyst. Research ${company.name} and report on notable signals from the last 90 days relevant to a job seeker evaluating this company.

Return ONLY valid JSON, no markdown, no fences. Schema:
{
  "funding": "funding rounds, valuation, investment news — or null if none",
  "layoffs": "layoffs, reductions, hiring freeze — or null if none",
  "leadership": "executive hires, departures, org changes — or null if none",
  "productLaunches": "product launches, acquisitions, pivots — or null if none",
  "reorgs": "restructuring, rebranding, strategic shifts — or null if none",
  "summary": "1-2 sentences: overall signal picture for a job seeker — what does this mean for someone considering joining?",
  "sentiment": "POSITIVE or NEUTRAL or CAUTIOUS"
}

Use null for any category with no notable signals. Be specific and direct.`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 500, messages: [{ role: 'user', content: prompt }] }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const brief = JSON.parse(data.content[0].text.trim());
      setCompanies(prev => prev.map(c => c.id === company.id ? { ...c, brief, lastRefreshed: new Date().toLocaleDateString() } : c));
    } catch(e) {
      setToast(`Refresh failed: ${e.message}`);
    } finally {
      setLoadingMap(prev => ({ ...prev, [company.id]: false }));
    }
  }

  function addToResearch(name) {
    window.__apertureCompany = name;
  }

  const sentColor = s => s === 'POSITIVE' ? 'rgba(61,226,136,.85)' : s === 'CAUTIOUS' ? 'rgba(208,24,120,.85)' : 'var(--muted)';
  const sigLabel = (label, text) => text ? (
    <div style={{display:'flex', gap:8, alignItems:'flex-start'}}>
      <span style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--accent)', letterSpacing:'.06em', padding:'2px 6px', background:'rgba(240,168,32,.1)', border:'1px solid rgba(240,168,32,.2)', borderRadius:4, flexShrink:0, marginTop:1}}>{label}</span>
      <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', lineHeight:1.5}}>{text}</span>
    </div>
  ) : null;

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Signal Feed</div>
        <div className="page-sub">Track target companies for funding, layoffs, leadership changes, and product moves. Hit Refresh on any company to pull a 90 day intel brief.</div>
      </div>
      {!apiKey && (
        <div className="card" style={{borderColor:'rgba(240,168,32,.4)', background:'rgba(240,168,32,.06)'}}>
          <div style={{fontSize:13, color:'var(--accent)'}}>API key required. <button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0,fontFamily:'inherit'}}>Add in Settings.</button></div>
        </div>
      )}
      <div className="card">
        <div style={{display:'flex', gap:8}}>
          <input value={newCompany} onChange={e => setNewCompany(e.target.value)} onKeyDown={e => e.key === 'Enter' && addCompany()} placeholder="Add a company to watch…" style={{flex:1}} />
          <button className="btn btn-primary" onClick={addCompany} disabled={!newCompany.trim()}>Add</button>
        </div>
      </div>
      {companies.length === 0 && (
        <div style={{textAlign:'center', padding:'48px 24px', color:'var(--muted-2)', fontFamily:'var(--mono)', fontSize:12}}>Add companies above to start tracking signals.</div>
      )}
      {companies.map(company => {
        const b = company.brief;
        const sigs = b ? [
          b.funding && ['Funding', b.funding],
          b.layoffs && ['Layoffs', b.layoffs],
          b.leadership && ['Leadership', b.leadership],
          b.productLaunches && ['Product', b.productLaunches],
          b.reorgs && ['Reorg', b.reorgs],
        ].filter(Boolean) : [];
        return (
          <div key={company.id} style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'16px 18px', marginBottom:10}}>
            <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, marginBottom: b ? 10 : 0}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{fontSize:13, fontWeight:600, fontFamily:'var(--mono)', color:'var(--text)'}}>{company.name}</span>
                  {b?.sentiment && <span style={{fontSize:9, fontFamily:'var(--mono)', color:sentColor(b.sentiment), letterSpacing:'.07em'}}>{b.sentiment}</span>}
                </div>
                <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', marginTop:2}}>
                  Added {company.addedOn}{company.lastRefreshed ? ` · refreshed ${company.lastRefreshed}` : ''}
                </div>
              </div>
              <div style={{display:'flex', gap:6, flexShrink:0}}>
                <button className="btn btn-primary btn-sm" onClick={() => refreshCompany(company)} disabled={loadingMap[company.id]} style={{fontSize:11, padding:'4px 10px'}}>
                  {loadingMap[company.id] ? '⟳' : b ? 'Refresh' : 'Get Signals'}
                </button>
                <button onClick={() => removeCompany(company.id)} style={{background:'none',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:16,padding:'2px 6px',lineHeight:1}}>×</button>
              </div>
            </div>
            {b?.summary && <div style={{fontSize:12, color:'var(--text)', lineHeight:1.55, marginBottom: sigs.length ? 10 : 0}}>{b.summary}</div>}
            {sigs.length > 0 && (
              <div style={{display:'flex', flexDirection:'column', gap:6}}>
                {sigs.map(([label, text], i) => sigLabel(label, text) && <React.Fragment key={i}>{sigLabel(label, text)}</React.Fragment>)}
              </div>
            )}
            {!b && <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', fontStyle:'italic', marginTop:4}}>Hit Get Signals to pull recent intel.</div>}
          </div>
        );
      })}
    </div>
  );
}

function ActivityReport() {
  const MA_MINIMUM = 3;

  // MA unemployment week: Saturday through Friday
  function getWeekBounds(offset) {
    const now = new Date();
    const day = now.getDay(); // 0=Sun … 6=Sat
    const daysSinceSat = day === 6 ? 0 : day + 1;
    const start = new Date(now);
    start.setDate(now.getDate() - daysSinceSat + (offset * 7));
    start.setHours(0,0,0,0);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23,59,59,999);
    return { start, end };
  }

  const [weekOffset, setWeekOffset] = useState(0);
  const [manualActs, setManualActs] = useState(() => { const s = load(); return s?.activityReport?.manual || []; });
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0,10), employer:'', city:'', method:'Applied online', position:'', result:'' });
  const [toast, setToast] = useState(null);

  const { start, end } = getWeekBounds(weekOffset);

  function fmt(d) { return d.toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'numeric' }); }

  function inRange(str) {
    if (!str) return false;
    try { const d = new Date(str); return !isNaN(d) && d >= start && d <= end; } catch(_){ return false; }
  }

  function gatherActs() {
    const stored = load() || {};
    const acts = [];

    // Board — job cards
    const colMap = {
      watching:  ['Online job board research', 'Identified opportunity'],
      applied:   ['Applied online', 'Application submitted'],
      screen:    ['Employer phone screen', 'Interview completed'],
      interview: ['Employer interview (video/in-person)', 'Interview completed'],
      offer:     ['Employer contact', 'Offer received'],
    };
    Object.entries(stored.kanban?.jobCards || {}).forEach(([col, cards]) => {
      (cards || []).forEach(card => {
        // Fallback: use numeric id as timestamp for legacy cards missing created field
        const ts = card.created || (typeof card.id === 'number' ? new Date(card.id).toISOString() : null);
        if (!inRange(ts)) return;
        const [method, result] = colMap[col] || ['Job search activity', 'In progress'];
        // Cards from job search have card.company (employer) + card.title (job title) separately
        // Cards added manually have card.title as "Company · Role" or just company
        const employer = card.company || card.title || '';
        const position = card.company ? card.title : (card.sub || card.title || '');
        acts.push({ date: new Date(ts), employer, city:'', method, position, result, source:'board' });
      });
    });

    // Deep Research history
    (stored.deepResearch?.history || []).forEach(item => {
      if (!inRange(item.ts)) return;
      acts.push({
        date: new Date(item.ts),
        employer: item.label?.split(' · ')[0] || item.label || '',
        city: '',
        method: item.type === 'person' ? 'Professional networking (online)' : 'Online employer research',
        position: 'General inquiry',
        result: 'Research completed',
        source: 'research',
      });
    });

    // People contacts
    (stored.people || []).forEach(p => {
      if (!inRange(p.addedOn)) return;
      acts.push({ date: new Date(p.addedOn), employer: p.company || '', city:'', method:'Professional networking (LinkedIn)', position: p.title || 'Networking contact', result:'Contact established', source:'people' });
    });

    // Signal Feed refreshes
    (stored.signalFeed || []).forEach(co => {
      if (!inRange(co.lastRefreshed)) return;
      acts.push({ date: new Date(co.lastRefreshed), employer: co.name || '', city:'', method:'Online company research', position:'General inquiry', result:'Research completed', source:'signals' });
    });

    // Manual entries
    manualActs.forEach(m => {
      if (!inRange(m.date)) return;
      acts.push({ date: new Date(m.date), employer: m.employer, city: m.city || '', method: m.method, position: m.position, result: m.result, source:'manual', id: m.id });
    });

    acts.sort((a,b) => a.date - b.date);
    return acts;
  }

  const activities = gatherActs();
  const met = activities.length >= MA_MINIMUM;

  function saveManual() {
    if (!form.employer.trim()) return;
    const entry = { ...form, id: Date.now() };
    const updated = [...manualActs, entry];
    setManualActs(updated);
    const stored = load() || {};
    persist({ ...stored, activityReport: { ...(stored.activityReport || {}), manual: updated } });
    setForm({ date: new Date().toISOString().slice(0,10), employer:'', city:'', method:'Applied online', position:'', result:'' });
    setShowAdd(false);
    setToast('Activity added');
  }

  function removeManual(id) {
    const updated = manualActs.filter(m => m.id !== id);
    setManualActs(updated);
    const stored = load() || {};
    persist({ ...stored, activityReport: { ...(stored.activityReport || {}), manual: updated } });
  }

  function copyReport() {
    const pad = (s, n) => String(s || '').slice(0, n).padEnd(n);
    const lines = [
      'MASSACHUSETTS UNEMPLOYMENT WEEKLY WORK SEARCH LOG',
      `Week of: ${fmt(start)} through ${fmt(end)}`,
      '',
      `${'#'.padEnd(4)}${'DATE'.padEnd(13)}${'EMPLOYER'.padEnd(28)}${'CITY/STATE'.padEnd(16)}${'CONTACT METHOD'.padEnd(35)}${'POSITION'.padEnd(28)}RESULT`,
      `${'-'.repeat(4)}${'-'.repeat(13)}${'-'.repeat(28)}${'-'.repeat(16)}${'-'.repeat(35)}${'-'.repeat(28)}${'-'.repeat(24)}`,
    ];
    activities.forEach((a, i) => {
      lines.push(`${String(i+1).padEnd(4)}${fmt(a.date).padEnd(13)}${pad(a.employer,28)}${pad(a.city,16)}${pad(a.method,35)}${pad(a.position,28)}${a.result || ''}`);
    });
    lines.push('');
    lines.push(`Total activities: ${activities.length}  |  Minimum required: ${MA_MINIMUM}/week  |  Status: ${met ? 'REQUIREMENT MET' : `NEED ${MA_MINIMUM - activities.length} MORE`}`);
    navigator.clipboard.writeText(lines.join('\n')).then(() => setToast('Report copied to clipboard'));
  }

  function printReport() {
    const rows = activities.map((a, i) => `
      <tr>
        <td>${i+1}</td>
        <td style="white-space:nowrap">${fmt(a.date)}</td>
        <td>${a.employer || ''}</td>
        <td>${a.city || ''}</td>
        <td>${a.method || ''}</td>
        <td>${a.position || ''}</td>
        <td>${a.result || ''}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>MA DUA Work Search Log — ${fmt(start)} to ${fmt(end)}</title>
      <style>
        body { font-family: Arial, sans-serif; font-size: 12px; margin: 32px; color: #111; }
        h2 { font-size: 15px; margin-bottom: 4px; }
        .sub { font-size: 11px; color: #555; margin-bottom: 20px; }
        .status { display:inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 20px;
          background: ${met ? '#d4edda' : '#fff3cd'}; color: ${met ? '#155724' : '#856404'}; border: 1px solid ${met ? '#c3e6cb' : '#ffeeba'}; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f5f5f5; border: 1px solid #ddd; padding: 6px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
        td { border: 1px solid #ddd; padding: 6px 8px; vertical-align: top; }
        tr:nth-child(even) { background: #fafafa; }
        .footer { margin-top: 20px; font-size: 10px; color: #888; }
        @media print { body { margin: 16px; } }
      </style>
    </head><body>
      <h2>Massachusetts DUA — Weekly Work Search Log</h2>
      <div class="sub">Week of ${fmt(start)} through ${fmt(end)} &nbsp;·&nbsp; Saturday–Friday (MA DUA certification week)</div>
      <div class="status">${met ? `✓ REQUIREMENT MET — ${activities.length} of ${MA_MINIMUM} activities` : `⚠ ${activities.length} of ${MA_MINIMUM} required — need ${MA_MINIMUM - activities.length} more`}</div>
      <table>
        <thead><tr><th>#</th><th>Date</th><th>Employer / Organization</th><th>City, State</th><th>Contact Method</th><th>Position / Work Type</th><th>Result</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="footer">Generated by Career Aperture · Perez Creative Labs &nbsp;·&nbsp; Keep records for at least one year per MA DUA requirements.</div>
    </body></html>`;
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 400);
  }

  const METHODS = [
    'Applied online','Applied by email','Applied in person','Phone inquiry',
    'Interview (phone)','Interview (video)','Interview (in-person)',
    'Job fair / career fair','Networking event','Professional networking (LinkedIn)',
    'Online employer research','Staffing / recruiting agency','Career center services',
    'Resume or profile updated','Other',
  ];

  const weekLabel = weekOffset === 0 ? 'This week' : weekOffset === -1 ? 'Last week' : `${Math.abs(weekOffset)} weeks ago`;
  const sourceTag = s => ({ board:'board', research:'research', people:'network', signals:'signals', manual:null }[s]);

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

      <div className="page-header">
        <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16, flexWrap:'wrap'}}>
          <div>
            <div className="page-title">Activity Report</div>
            <div className="page-sub">Massachusetts DUA weekly work search log. Minimum 3 activities required per certification week.</div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexShrink:0}}>
            <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(w => w - 1)}>← Prev</button>
            <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted)', whiteSpace:'nowrap', minWidth:80, textAlign:'center'}}>{weekLabel}</span>
            <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(w => Math.min(0, w+1))} disabled={weekOffset === 0}>Next →</button>
          </div>
        </div>
      </div>

      {/* Week status bar */}
      <div className="card" style={{borderColor: met ? 'rgba(61,226,136,.25)' : 'rgba(240,168,32,.3)', background: met ? 'rgba(61,226,136,.04)' : 'rgba(240,168,32,.05)'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12}}>
          <div>
            <div style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'.14em', textTransform:'uppercase', marginBottom:3}}>Certification Week</div>
            <div style={{fontSize:14, fontFamily:'var(--mono)', color:'var(--text)', fontWeight:500}}>
              {fmt(start)} through {fmt(end)}
            </div>
            <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', marginTop:2}}>Saturday through Friday (MA DUA format)</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:30, fontFamily:'var(--mono)', fontWeight:700, color: met ? 'rgba(61,226,136,.9)' : 'var(--accent)', lineHeight:1}}>
              {activities.length}
              <span style={{fontSize:14, fontWeight:400, color:'var(--muted-2)'}}> / {MA_MINIMUM}</span>
            </div>
            <div style={{fontSize:10, fontFamily:'var(--mono)', letterSpacing:'.08em', marginTop:2, color: met ? 'rgba(61,226,136,.8)' : 'rgba(240,168,32,.8)'}}>
              {met ? 'REQUIREMENT MET' : `NEED ${MA_MINIMUM - activities.length} MORE`}
            </div>
          </div>
        </div>
      </div>

      {/* Table */}
      <div className="card" style={{padding:'18px 20px'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16, flexWrap:'wrap', gap:8}}>
          <div className="card-title" style={{marginBottom:0}}>Work Search Activities</div>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-secondary btn-sm" onClick={() => setShowAdd(v => !v)}>{showAdd ? 'Cancel' : '+ Add manually'}</button>
            <button className="btn btn-secondary btn-sm" onClick={printReport} disabled={activities.length === 0}>Print / Save PDF</button>
            <button className="btn btn-primary btn-sm" onClick={copyReport} disabled={activities.length === 0}>Copy Report</button>
          </div>
        </div>

        {/* Manual add form */}
        {showAdd && (
          <div style={{background:'rgba(240,168,32,.05)', border:'1px solid rgba(240,168,32,.18)', borderRadius:10, padding:16, marginBottom:16}}>
            <div className="field-row">
              <div className="field" style={{flex:'0 0 140px'}}>
                <label>Date</label>
                <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date:e.target.value}))} style={{colorScheme:'dark'}} />
              </div>
              <div className="field" style={{flex:2}}>
                <label>Employer / Organization</label>
                <input value={form.employer} onChange={e => setForm(f => ({...f, employer:e.target.value}))} placeholder="Company name" onKeyDown={e => e.key === 'Enter' && saveManual()} />
              </div>
              <div className="field" style={{flex:1}}>
                <label>City, State</label>
                <input value={form.city} onChange={e => setForm(f => ({...f, city:e.target.value}))} placeholder="Boston, MA" />
              </div>
            </div>
            <div className="field-row">
              <div className="field" style={{flex:2}}>
                <label>Contact Method</label>
                <div style={{position:'relative'}}>
                  <select value={form.method} onChange={e => setForm(f => ({...f, method:e.target.value}))}>
                    {METHODS.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                  <span style={{position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', color:'var(--muted-2)', fontSize:11}}>▾</span>
                </div>
              </div>
              <div className="field" style={{flex:2}}>
                <label>Position / Type of Work</label>
                <input value={form.position} onChange={e => setForm(f => ({...f, position:e.target.value}))} placeholder="Principal PM, AI Platform" />
              </div>
              <div className="field" style={{flex:2}}>
                <label>Result</label>
                <input value={form.result} onChange={e => setForm(f => ({...f, result:e.target.value}))} placeholder="Applied, Interview scheduled..." />
              </div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={saveManual} disabled={!form.employer.trim()}>Add to log</button>
          </div>
        )}

        {activities.length === 0 ? (
          <div style={{fontSize:12, fontFamily:'var(--mono)', color:'var(--muted-2)', fontStyle:'italic', padding:'12px 0'}}>
            No activities tracked for this week. Add entries manually, or use the Board, Deep Research, People, and Signal Feed to auto-log activities.
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:11, fontFamily:'var(--mono)'}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border)'}}>
                  {['#','Date','Employer','City / State','Contact Method','Position','Result',''].map((h,i) => (
                    <th key={i} style={{textAlign:'left', padding:'5px 10px', fontSize:9, color:'var(--muted-2)', letterSpacing:'.1em', fontWeight:400, textTransform:'uppercase', whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {activities.map((a, i) => (
                  <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'9px 10px', color:'var(--muted-2)', fontSize:10}}>{i+1}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted)', whiteSpace:'nowrap'}}>{fmt(a.date)}</td>
                    <td style={{padding:'9px 10px', color:'var(--text)', fontWeight:500, maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.employer}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted-2)', whiteSpace:'nowrap'}}>{a.city || '—'}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted)', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.method}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted)', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.position || '—'}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted-2)', maxWidth:140, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.result}</td>
                    <td style={{padding:'9px 6px', whiteSpace:'nowrap'}}>
                      {a.source === 'manual'
                        ? <button onClick={() => removeManual(a.id)} style={{background:'none', border:'none', color:'var(--muted-2)', cursor:'pointer', fontSize:14, padding:'1px 5px', lineHeight:1}}>×</button>
                        : <span style={{fontSize:9, padding:'1px 6px', background:'rgba(240,238,248,.06)', borderRadius:4, color:'var(--muted-2)'}}>{sourceTag(a.source)}</span>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', lineHeight:1.75, padding:'2px'}}>
        Activities are auto-populated from your Board (job applications), Deep Research history, People contacts, and Signal Feed refreshes.
        Add manually for job fairs, phone inquiries, staffing agencies, or anything else not tracked in the app.

  { id: 'interview',  label: 'In the Fixer',  color: 'rgba(208,24,120,.22)'  },

];
const KANBAN_SMB_COLS = [
  { id: 'prospect',   label: 'Spotted',    color: 'rgba(245,240,232,.12)' },
  { id: 'outreach',   label: 'Framed',     color: 'rgba(201,168,76,.18)'  },
  { id: 'meeting',    label: 'Developing', color: 'rgba(139,43,190,.22)'  },

];

function KanbanBoard() {
  const [activeTab, setActiveTab] = useState('jobs');
  const [jobCards, setJobCards] = useState(() => {
    const s = load(); return s && s.kanban && s.kanban.jobCards ? s.kanban.jobCards : {};
  });
  const [smbCards, setSmbCards] = useState(() => {
    const s = load(); return s && s.kanban && s.kanban.smbCards ? s.kanban.smbCards : {};
  });
  const [adding, setAdding]   = useState(null);  // colId or null
  const [addText, setAddText] = useState('');
  const [addSub,  setAddSub]  = useState('');
  const [toast, setToast]     = useState(null);

  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, kanban: { jobCards, smbCards } });
  }, [jobCards, smbCards]);

  const cols    = activeTab === 'jobs' ? KANBAN_JOB_COLS : KANBAN_SMB_COLS;
  const cards   = activeTab === 'jobs' ? jobCards : smbCards;
  const setCards= activeTab === 'jobs' ? setJobCards : setSmbCards;

  function getCol(id) { return cards[id] || []; }

  function addCard(colId) {
    const title = addText.trim();
    if (!title) return;
    const card = { id: Date.now(), title, sub: addSub.trim(), date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) };
    setCards(prev => ({ ...prev, [colId]: [...(prev[colId] || []), card] }));
    setAdding(null); setAddText(''); setAddSub('');
  }

  function removeCard(colId, id) {
    setCards(prev => ({ ...prev, [colId]: (prev[colId] || []).filter(c => c.id !== id) }));
  }

  function moveCard(fromId, toId, card) {
    setCards(prev => ({
      ...prev,
      [fromId]: (prev[fromId] || []).filter(c => c.id !== card.id),
      [toId]:   [...(prev[toId] || []), { ...card }],
    }));
    setToast(`Moved to ${cols.find(c => c.id === toId)?.label}`);
  }

  // Analytics helpers
  const jobColCounts = KANBAN_JOB_COLS.map(c => ({ ...c, count: (jobCards[c.id] || []).length }));
  const smbColCounts = KANBAN_SMB_COLS.map(c => ({ ...c, count: (smbCards[c.id] || []).length }));

  function pct(a, b) { return b === 0 ? 0 : Math.round((a / b) * 100); }

  const jobApps       = jobColCounts.find(c => c.id === 'applied')?.count || 0;
  const jobScreens    = jobColCounts.find(c => c.id === 'screen')?.count || 0;
  const jobInterviews = jobColCounts.find(c => c.id === 'interview')?.count || 0;
  const jobOffers     = jobColCounts.find(c => c.id === 'offer')?.count || 0;
  const jobTotal      = jobColCounts.reduce((s, c) => s + c.count, 0);

  const smbTotal      = smbColCounts.reduce((s, c) => s + c.count, 0);
  const smbOutreach   = smbColCounts.find(c => c.id === 'outreach')?.count || 0;
  const smbMeetings   = smbColCounts.find(c => c.id === 'meeting')?.count || 0;
  const smbWon        = smbColCounts.find(c => c.id === 'won')?.count || 0;

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Develop</div>
        <div className="page-sub">Track your pipeline. Move applications and SMB prospects through each stage, from first contact to close.</div>
      </div>

      <div className="kanban-tabs">
        <button className={`ktab ${activeTab === 'jobs' ? 'active' : ''}`} onClick={() => setActiveTab('jobs')}>Job Hunt</button>
        <button className={`ktab ${activeTab === 'smb' ? 'active' : ''}`} onClick={() => setActiveTab('smb')}>SMB Pipeline</button>
        <button className={`ktab ${activeTab === 'analytics' ? 'active' : ''}`} onClick={() => setActiveTab('analytics')}>Exposure Log</button>
      </div>

      {/* ── Analytics Tab ─────────────────────────────────────────── */}
      {activeTab === 'analytics' && (
        <div>
          <div style={{marginBottom:20}}>
            <div className="card-title" style={{fontSize:9, letterSpacing:'.28em', color:'var(--accent)', fontFamily:'var(--mono)', textTransform:'uppercase', marginBottom:14}}>Job Hunt — Exposure Log</div>
            <div className="analytics-grid">
              <div className="analytics-stat">
                <div className="analytics-stat-val">{jobTotal}</div>
                <div className="analytics-stat-lbl">Total tracked</div>
              </div>
              <div className="analytics-stat">
                <div className="analytics-stat-val">{jobApps}</div>
                <div className="analytics-stat-lbl">Applications</div>
              </div>
              <div className="analytics-stat">
                <div className="analytics-stat-val">{jobOffers}</div>
                <div className="analytics-stat-lbl">Offers</div>
              </div>
              <div className="analytics-stat">
                <div className="analytics-stat-val">{jobApps > 0 ? `${pct(jobOffers, jobApps)}%` : '—'}</div>
                <div className="analytics-stat-lbl">Offer rate</div>
              </div>
            </div>

            <div className="card" style={{marginTop:0}}>
              <div className="card-title">Development Funnel — Jobs</div>
              {[
                { label: 'Applied → Screen',     a: jobScreens,    b: jobApps,       pctVal: pct(jobScreens, jobApps) },
                { label: 'Screen → Interview',   a: jobInterviews, b: jobScreens,    pctVal: pct(jobInterviews, jobScreens) },
                { label: 'Interview → Offer',    a: jobOffers,     b: jobInterviews, pctVal: pct(jobOffers, jobInterviews) },
                { label: 'Applied → Offer',      a: jobOffers,     b: jobApps,       pctVal: pct(jobOffers, jobApps) },
              ].map(row => (
                <div key={row.label} className="funnel-bar-wrap">
                  <div className="funnel-bar-label">
                    <span>{row.label}</span>
                    <span>{row.a} / {row.b} &nbsp;·&nbsp; {row.b > 0 ? `${row.pctVal}%` : '—'}</span>

                  <div className="funnel-bar-track">

                    <div className="kcard-meta">
                      <span>{card.date}</span>
                      <button style={{background:'none',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:12,padding:'0 2px'}} onClick={() => removeCard(col.id, card.id)}>×</button>
                    </div>
                    {otherCols.length > 0 && (
                      <div className="kcard-actions">
                        {otherCols.map(oc => (
                          <button key={oc.id} className="kcard-move-btn" onClick={() => moveCard(col.id, oc.id, card)}>→ {oc.label}</button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}

                {isAdding ? (
                  <div className="kadd-form">
                    <input
                      autoFocus
                      value={addText}
                      onChange={e => setAddText(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') addCard(col.id); if (e.key === 'Escape') { setAdding(null); setAddText(''); setAddSub(''); } }}
                      placeholder={activeTab === 'jobs' ? 'Company · Role…' : 'Company · Contact…'}
                    />
                    <input
                      value={addSub}
                      onChange={e => setAddSub(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') addCard(col.id); if (e.key === 'Escape') { setAdding(null); setAddText(''); setAddSub(''); } }}
                      placeholder="Notes (optional)"
                    />
                    <div className="kadd-form-row">
                      <button className="btn btn-primary btn-sm" onClick={() => addCard(col.id)} disabled={!addText.trim()}>Add</button>
                      <button className="btn btn-secondary btn-sm" onClick={() => { setAdding(null); setAddText(''); setAddSub(''); }}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button className="kadd-btn" onClick={() => { setAdding(col.id); setAddText(''); setAddSub(''); }}>+ Add</button>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [mode, setMode] = useState('jobs');
  const [showSettings, setShowSettings] = useState(false);
  const [shuttering, setShuttering] = useState(false);
  const [showFirstRun, setShowFirstRun] = useState(false);

  // State loaded from localStorage
  const [profile, setProfile] = useState(DEFAULTS.profile);
  const [watchList, setWatchList] = useState(DEFAULTS.watchList);
  const [apiKey, setApiKey] = useState('');
  const [guardrails, setGuardrails] = useState(DEFAULTS.guardrails);

  // Hydrate from storage on mount; show first-run if no saved data
  useEffect(() => {
    const saved = load();
    if (saved) {
      if (saved.profile)    setProfile({...DEFAULTS.profile, ...saved.profile});
      if (saved.watchList)  setWatchList(saved.watchList);
      if (saved.apiKey)     setApiKey(saved.apiKey);
      if (saved.guardrails) setGuardrails(saved.guardrails);
    } else {
      setShowFirstRun(true); // fresh install — show setup modal
    }
  }, []);

  function handleFirstRunComplete(newProfile) {
    setProfile(newProfile);
    setShowFirstRun(false);
  }

  // Persist on changes
  useEffect(() => {
    persist({ profile, watchList, apiKey, guardrails });
  }, [profile, watchList, apiKey, guardrails]);

  function navigate(id) {
    if (id === mode) return;
    setShuttering(true);
    setTimeout(() => { setMode(id); setShuttering(false); }, 100);
  }

  function handlePeopleSearch(company) {
    setShuttering(true);
    setTimeout(() => { setMode('people'); setShuttering(false); window.__coldOpenCompany = company; }, 100);
  }

  const nav = [
    { id: 'jobs', label: 'Shoot' },
    { id: 'board', label: 'Develop' },
    { id: 'people', label: 'Loupe' },
    { id: 'research', label: 'Light Table' },
    { id: 'signals', label: 'Signal Feed' },
    { id: 'report', label: 'Activity Report' },
    { id: 'analytics', label: 'KPI' },
    { id: 'smb', label: 'Field Work' },
    { id: 'networking', label: 'Reach' },
    { id: 'watchlist', label: 'Claims' },
  ];

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <LogoFlask />
          <div>
            <div className="logo-text">Career</div>
            <div className="logo-text">Aperture</div>
            <div className="logo-sub">by Perez Creative Labs</div>
          </div>
        </div>

        <div className="nav-section">
          <div className="nav-label">Darkroom</div>
          {nav.map(n => (
            <button key={n.id} className={`nav-btn ${mode === n.id ? 'active' : ''}`} onClick={() => navigate(n.id)}>
              <span className="nav-icon"><NavIcon id={n.id} /></span>
              {n.label}
            </button>
          ))}
        </div>

        <div className="nav-section" style={{flex:'none', paddingTop:0}}>
          <div className="nav-label">Reports</div>
          <a href="report.html" style={{textDecoration:'none'}}>
            <button className="nav-btn">
              <span className="nav-icon">◈</span>Report
            </button>
          </a>
          <a href="company-fit.html" style={{textDecoration:'none'}}>
            <button className="nav-btn">
              <span className="nav-icon">◎</span>Company Fit
            </button>
          </a>
          <a href="kpi.html" style={{textDecoration:'none'}}>
            <button className="nav-btn">
              <span className="nav-icon">◌</span>KPI
            </button>
          </a>
        </div>

        <div className="sidebar-footer">
          <button className="settings-btn" onClick={() => setShowSettings(true)}>
            <span className="nav-icon"><NavIcon id="settings" /></span>
            Settings
          </button>
        </div>
      </aside>

      <main className={"main" + (shuttering ? " shutter" : "")}>
        <div className="main-content">
          {mode === 'jobs' && <JobSearch />}
          {mode === 'people' && <PeopleContacts watchList={watchList} />}
          {mode === 'research' && <DeepResearch profile={profile} apiKey={apiKey} guardrails={guardrails} onNeedApiKey={() => setShowSettings(true)} />}
          {mode === 'smb' && <SMBProspecting profile={profile} apiKey={apiKey} guardrails={guardrails} onNeedApiKey={() => setShowSettings(true)} />}
          {mode === 'networking' && <Networking profile={profile} apiKey={apiKey} guardrails={guardrails} onNeedApiKey={() => setShowSettings(true)} />}
          {mode === 'board' && <KanbanBoard />}
          {mode === 'watchlist' && <WatchListSummary watchList={watchList} onPeopleSearch={handlePeopleSearch} />}
          {mode === 'claims' && <ClaimsTracker />}
          {mode === 'signals' && <SignalFeed apiKey={apiKey} onNeedApiKey={() => setShowSettings(true)} />}
          {mode === 'report' && <ActivityReport />}
          {mode === 'analytics' && <Analytics />}
        </div>
        <div className="pcl-footer">
          <a href="https://perezcreativelabs.com" target="_blank" rel="noopener noreferrer">
            <PCLBadge />
            <span style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--muted)', letterSpacing:'.18em', textTransform:'uppercase'}}>Perez Creative Labs</span>
          </a>
        </div>
      </main>

      {showSettings && (
        <SettingsModal
          profile={profile} setProfile={setProfile}
          watchList={watchList} setWatchList={setWatchList}
          apiKey={apiKey} setApiKey={setApiKey}
          guardrails={guardrails} setGuardrails={setGuardrails}
          onClose={() => setShowSettings(false)}
        />
      )}
      {showFirstRun && (
        <FirstRunModal onComplete={handleFirstRunComplete} />
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
<script>
(function(){
  var outer = document.getElementById('cur-outer');
  if (!outer) return;
  var mx = window.innerWidth/2, my = window.innerHeight/2;
  var thinking = false, thinkT = null;

  document.addEventListener('mousemove', function(e) {
    mx = e.clientX; my = e.clientY;
    outer.style.left = mx + 'px'; outer.style.top = my + 'px';
  });

  document.addEventListener('mouseover', function(e) {
    var active = e.target.closest('button, a, input, select, textarea, label, [role="button"]');
    document.body.classList.toggle('cur-hovering', !!active);
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('button, a')) return;
    document.body.classList.add('cur-thinking');
    thinking = true;
    if (thinkT) clearTimeout(thinkT);
    thinkT = setTimeout(function() {
      if (!document.querySelector('.loading-row')) {
        document.body.classList.remove('cur-thinking');
        thinking = false;
      }
    }, 500);
  });

  var obs = new MutationObserver(function() {
    if (thinking && !document.querySelector('.loading-row')) {
      if (thinkT) clearTimeout(thinkT);
      thinkT = setTimeout(function() {
        document.body.classList.remove('cur-thinking');
        thinking = false;
      }, 380);
    }
  });
  obs.observe(document.getElementById('root') || document.body, {childList:true, subtree:true});

  document.addEventListener('mouseleave', function() { outer.style.opacity = '0'; });
  document.addEventListener('mouseenter', function() { outer.style.opacity = '1'; });
})();
</script>
</body>
</html>
