<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Aperture — DP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --bg:          #09080A;
      --bg-2:        #100F0C;
      --bg-card:     #16140E;
      --border:      rgba(245,240,232,.08);
      --border-gold: rgba(201,168,76,.24);
      --text:        #EDE5D5;
      --muted:       rgba(237,229,213,.55);
      --muted-2:     rgba(237,229,213,.32);
      --accent:      #C9A84C;
      --accent-dim:  rgba(201,168,76,.10);
      --accent-bdr:  rgba(201,168,76,.30);
      --violet:      #3D1A88;
      --magenta:     #8B2BBE;
      --crimson:     #D01878;
      --ember:       #C9A84C;
      --gradient:    linear-gradient(90deg,#3D1A88,#8B2BBE,#D01878,#E86020,#C9A84C);
      --mono:        'JetBrains Mono', monospace;
      --display:     'Cormorant Garamond', Georgia, serif;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 230px;
      flex-shrink: 0;
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0 0 16px;
    }
    .sidebar-gradient-bar {
      height: 2px;
      background: var(--gradient);
      opacity: .85;
      flex-shrink: 0;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 18px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .logo-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-text { font-size: 14px; font-family: var(--display); color: var(--text); line-height: 1.15; letter-spacing: .28em; text-transform: uppercase; font-weight: 400; display: block; }
    .logo-sub { font-size: 9px; color: var(--muted-2); font-family: var(--mono); letter-spacing: .09em; text-transform: uppercase; margin-top: 4px; display: block; white-space: nowrap; }
    .nav-section { padding: 4px 10px; flex: 1; }
    .nav-label { font-size: 8px; font-weight: 500; color: var(--muted-2); letter-spacing: .3em; text-transform: uppercase; padding: 14px 8px 5px; font-family: var(--mono); opacity: 0.7; }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: .04em;
      color: var(--muted);
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover { background: rgba(240,168,32,.06); color: var(--text); }
    .nav-btn.active { background: rgba(240,168,32,.10); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 8px; }
    .nav-icon { display: flex; align-items: center; justify-content: center; width: 18px; flex-shrink: 0; opacity: 0.8; }
    .sidebar-footer { padding: 12px 10px 0; border-top: 1px solid var(--border); }
    .settings-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      text-align: left;
    }
    .settings-btn:hover { background: rgba(240,168,32,.06); color: var(--text); }

    /* Main */
    .main { flex: 1; overflow: hidden; background: var(--bg); display: flex; flex-direction: column; }
    .main-content { flex: 1; overflow-y: auto; padding: 32px 36px; }
    .pcl-footer { flex-shrink: 0; border-top: 1px solid var(--border); padding: 13px 36px; display: flex; align-items: center; justify-content: flex-end; }
    .pcl-footer a { display: flex; align-items: center; gap: 10px; text-decoration: none; opacity: 0.32; transition: opacity 0.2s; }
    .pcl-footer a:hover { opacity: 0.78; }
    .page-header { margin-bottom: 28px; }
    .page-title {
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      margin-bottom: 6px;
      font-family: var(--display);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .page-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); letter-spacing: .08em; line-height: 1.6; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 9px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .32em;
      font-family: var(--mono);
    }

    /* Chips */
    .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: .04em;
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover { border-color: var(--accent-bdr); color: var(--accent); }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0C0C12;
      font-weight: 500;
    }

    /* Form elements */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 9px;
      font-weight: 500;
      color: var(--muted-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .22em;
      font-family: var(--mono);
    }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: var(--bg-2);
      transition: border-color 0.15s;
      font-family: Georgia, serif;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: var(--accent-bdr);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .field input::placeholder { color: var(--muted-2); font-family: var(--mono); font-size: 12px; }
    .field textarea { resize: vertical; min-height: 70px; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 12px; color: var(--muted); font-family: var(--mono); letter-spacing: .04em; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(240,238,248,.12);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #0C0C12; }

    /* URL output */
    .url-box { margin-top: 12px; }
    .url-box-label { font-size: 9px; font-weight: 500; color: var(--muted-2); letter-spacing: .22em; text-transform: uppercase; margin-bottom: 6px; font-family: var(--mono); }
    .url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-2);
      border: 1px solid var(--border-gold);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .url-text {
      flex: 1;
      font-size: 10px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--mono);
      letter-spacing: .02em;
    }
    .url-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #0C0C12; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent-bdr); color: var(--accent); }
    .btn-sm { padding: 4px 10px; font-size: 10px; }
    .btn-icon { padding: 5px 8px; }
    .btn-danger { background: rgba(208,24,120,0.10); color: rgba(208,24,120,.85); border: 1px solid rgba(208,24,120,.25); }
    .btn-danger:hover { background: rgba(208,24,120,0.18); }

    /* Dossier output */
    .dossier-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 24px;
      margin-top: 12px;
    }
    .dossier-name { font-size: 22px; font-weight: 300; font-style: italic; color: var(--text); font-family: var(--display); letter-spacing: -0.01em; }
    .dossier-meta { font-size: 10px; color: var(--muted); margin-bottom: 16px; font-family: var(--mono); letter-spacing: .08em; }
    .dossier-section { margin-bottom: 14px; }
    .dossier-section-title { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .28em; color: var(--accent); margin-bottom: 6px; font-family: var(--mono); }
    .dossier-text { font-size: 13px; color: var(--muted); line-height: 1.75; font-family: Georgia, serif; }
    .dm-box {
      background: rgba(61,26,136,.14);
      border: 1px solid rgba(139,43,190,.25);
      border-left: 2px solid var(--magenta);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.75;
      font-family: Georgia, serif;
      white-space: pre-wrap;
    }
    .research-note { font-size: 10px; color: var(--muted-2); font-style: italic; margin-top: 8px; font-family: var(--mono); }

    /* Watch list */
    .watch-table { width: 100%; border-collapse: collapse; }
    .watch-table th { text-align: left; font-size: 9px; font-weight: 500; color: var(--muted-2); text-transform: uppercase; letter-spacing: .2em; padding: 6px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
    .watch-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; color: var(--text); font-family: Georgia, serif; }
    .watch-table tr:last-child td { border-bottom: none; }
    .tier-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .tier-1 { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-bdr); }
    .tier-2 { background: rgba(139,43,190,.10); color: rgba(200,140,255,.85); border: 1px solid rgba(139,43,190,.28); }
    .tier-3 { background: rgba(240,238,248,.04); color: var(--muted); border: 1px solid var(--border); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 1;
    }
    .modal-title { font-size: 20px; font-weight: 300; font-style: italic; color: var(--text); font-family: var(--display); letter-spacing: -0.01em; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted); padding: 2px 6px; border-radius: 6px; line-height: 1; }
    .close-btn:hover { color: var(--text); }

    /* Edge meter */
    .edge-meter { margin-top: 8px; }
    .edge-bar-track { height: 2px; background: rgba(240,238,248,.10); border-radius: 1px; overflow: hidden; }
    .edge-bar-fill { height: 100%; border-radius: 1px; transition: width 0.3s, background 0.3s; }
    .edge-score-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted-2); margin-top: 4px; font-family: var(--mono); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--accent-bdr);
      color: var(--accent);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      z-index: 200;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Loading */
    .loading-row { display: flex; align-items: center; gap: 10px; padding: 16px 0; color: var(--muted); font-size: 12px; font-family: var(--mono); }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(240,238,248,.10);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Misc */
    .section-gap { margin-bottom: 20px; }
    .api-key-note { font-size: 10px; color: var(--muted-2); margin-top: 5px; font-family: var(--mono); letter-spacing: .04em; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted-2); font-size: 13px; font-family: Georgia, serif; font-style: italic; }
    .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-row input { flex: 1; }
    .error-msg { color: rgba(208,24,120,.9); font-size: 12px; margin-top: 6px; background: rgba(208,24,120,.08); padding: 9px 12px; border-radius: 8px; border: 1px solid rgba(208,24,120,.22); font-family: var(--mono); font-size: 11px; }
    .separator { height: 1px; background: var(--border); margin: 16px 0; }
    .keyword-input-row input { font-family: Georgia, serif !important; }

    /* Select dropdown */
    select option { background: #16140E; color: #EDE5D5; }
    select { -webkit-appearance: none; appearance: none; }
    .keyword-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .keyword-input-row input { flex: 1; }

    /* Role selector dropdown */
    .role-selector { position: relative; }
    .role-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 9px 12px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: .04em;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
    }
    .role-trigger:hover, .role-trigger.open { border-color: var(--accent-bdr); color: var(--text); }
    .role-trigger .caret { font-size: 9px; color: var(--muted-2); transition: transform 0.15s; }
    .role-trigger.open .caret { transform: rotate(180deg); }
    .role-panel {
      position: absolute;
      z-index: 100;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: 10px;
      padding: 8px 0;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .role-group-hdr {
      font-size: 8px;
      font-family: var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 8px 14px 4px;
      font-weight: 500;
    }
    .role-group-hdr.other { color: var(--muted-2); margin-top: 4px; border-top: 1px solid var(--border); padding-top: 10px; }
    .role-option {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .role-option:hover { background: rgba(240,168,32,.06); color: var(--text); }
    .role-option input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }
    .role-option input[type=checkbox]:checked + span { color: var(--accent); }
    .role-rec-badge {
      margin-left: auto;
      font-size: 8px;
      font-family: var(--mono);
      letter-spacing: .1em;
      color: var(--accent);
      opacity: 0.7;
      text-transform: uppercase;
    }
    .role-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .role-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      background: var(--accent);
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      color: #0C0C12;
      font-weight: 500;
      letter-spacing: .02em;
    }
    .role-pill-x {
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      opacity: 0.6;
      background: none;
      border: none;
      color: #0C0C12;
      padding: 0;
      font-weight: 700;
    }
    .role-pill-x:hover { opacity: 1; }
    .role-pill.must {
      background: var(--crimson);
      color: #fff;
    }
    .role-pill.must .role-pill-x { color: #fff; }
    .role-option-mode {
      margin-left: auto;
      font-size: 8px;
      font-family: var(--mono);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .role-option-mode.opt  { color: var(--accent); border-color: var(--accent-bdr); background: var(--accent-dim); }
    .role-option-mode.must { color: #ff88b0; border-color: rgba(208,24,120,.35); background: rgba(208,24,120,.12); }
    .kw-hint { font-size: 9px; font-family: var(--mono); color: var(--muted-2); margin-top: 8px; letter-spacing: .04em; line-height: 1.6; }
    .kw-hint span { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 8px; margin-right: 4px; vertical-align: middle; }
    .kw-hint .h-opt  { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-bdr); }
    .kw-hint .h-must { background: rgba(208,24,120,.12); color: #ff88b0; border: 1px solid rgba(208,24,120,.35); }

    /* Kanban board */
    .kanban-tabs { display: flex; gap: 4px; margin-bottom: 22px; }
    .ktab {
      padding: 6px 18px;
      border-radius: 8px;

(function() {
  var SESSION_KEY = 'aperture_preview_ok';
  var PASS_KEY    = 'aperture_gate_password';
  // Skip gate on localhost or file:// (local dev)
  var host = window.location.hostname;
  var isLocal = (host === 'localhost' || host === '127.0.0.1' || host === '' || window.location.protocol === 'file:');
  if (isLocal) return;
  // Skip if already authenticated this session
  if (sessionStorage.getItem(SESSION_KEY) === '1') return;
  // Skip if no password has been configured
  var storedPw = localStorage.getItem(PASS_KEY);
  if (!storedPw) return; // no gate configured — open access
  // Show gate
  var gate = document.getElementById('aperture-gate');
  gate.style.display = 'flex';
  function attempt() {
    var val = document.getElementById('aperture-gate-input').value;
    if (val === storedPw) {
      sessionStorage.setItem(SESSION_KEY, '1');
      gate.style.display = 'none';
      document.getElementById('aperture-gate-error').style.display = 'none';
    } else {
      document.getElementById('aperture-gate-error').style.display = 'block';
      document.getElementById('aperture-gate-input').value = '';
      document.getElementById('aperture-gate-input').focus();
    }
  }
  document.getElementById('aperture-gate-btn').addEventListener('click', attempt);
  document.getElementById('aperture-gate-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') attempt();
    document.getElementById('aperture-gate-error').style.display = 'none';
  });
})();
</script>

function quoteIfPhrase(term) {
  const t = term.trim();
  return t.includes(' ') && !t.startsWith('"') ? `"${t}"` : t;
}

function buildJobURL({ roles, mustKeywords, optKeywords, customKeyword, location, locationRadius, dateRange, expLevels, workplaceTypes, jobTypes, networkOnly }) {
  const roleTerms = roles.map(quoteIfPhrase);
  const optTerms  = [...(optKeywords || []).map(quoteIfPhrase), customKeyword ? quoteIfPhrase(customKeyword) : null].filter(Boolean);
  const mustTerms = (mustKeywords || []).map(quoteIfPhrase);

  const orPart = [...roleTerms, ...optTerms];
  let keywordStr = '';
  if (orPart.length > 0 && mustTerms.length > 0) {
    keywordStr = `(${orPart.join(' OR ')}) AND ${mustTerms.join(' AND ')}`;
  } else if (orPart.length > 0) {
    keywordStr = orPart.join(' OR ');
  } else {
    keywordStr = mustTerms.join(' AND ');
  }

  const params = new URLSearchParams();
  params.set('keywords', keywordStr);
  if (location) params.set('location', location);
  if (locationRadius && location && location !== 'United States') params.set('distance', locationRadius);
  if (dateRange) params.set('f_TPR', dateRange);
  if (expLevels.length) params.set('f_E', expLevels.join(','));
  if (workplaceTypes.length) params.set('f_WT', workplaceTypes.join(','));
  if (jobTypes && jobTypes.length) params.set('f_JT', jobTypes.join(','));
  if (networkOnly) params.set('f_JIYN', 'true');

  return `https://www.linkedin.com/jobs/search/?${params.toString()}`;
}

function buildLaddersURL({ roles, mustKeywords, optKeywords, customKeyword, location }) {
  const terms = [
    ...roles,
    ...(mustKeywords || []),
    ...(optKeywords || []),
    customKeyword ? customKeyword.trim() : null,
  ].filter(Boolean);

  const params = new URLSearchParams();
  params.set('searchKeywords', terms.join(' '));
  if (location && location !== 'United States') params.set('locationName', location);
  params.set('radius', '50');

  return `https://www.theladders.com/jobs/search-jobs?${params.toString()}`;
}

function buildPeopleURLs(company, contactRole) {
  const roleQ = contactRole ? quoteIfPhrase(contactRole) : '';

  // 1st/2nd degree LinkedIn
  const liParams = new URLSearchParams();
  liParams.set('keywords', roleQ || 'product');
  liParams.set('facetCurrentCompany', `["${company}"]`);
  liParams.set('facetNetwork', '["F","S"]');
  const linkedin = `https://www.linkedin.com/search/results/people/?${liParams.toString()}`;

  // Google X-ray
  const xrayQ = [
    `site:linkedin.com/in`,
    `"${company}"`,
    roleQ,
  ].filter(Boolean).join(' ');
  const xray = `https://www.google.com/search?q=${encodeURIComponent(xrayQ)}`;

  // Open network LinkedIn
  const openParams = new URLSearchParams();
  openParams.set('keywords', [quoteIfPhrase(company), roleQ].filter(Boolean).join(' '));
  openParams.set('facetNetwork', '["O"]');
  const open = `https://www.linkedin.com/search/results/people/?${openParams.toString()}`;

  return { linkedin, xray, open };
}

function scoreEdge(text) {
  if (!text || text.length < 20) return 0;
  const abstractNouns = ['passion', 'passionate', 'innovative', 'innovation', 'strategic', 'impact', 'driven', 'enthusiastic', 'excellence', 'synergy', 'leverage', 'transformative'];
  const words = text.toLowerCase().split(/\s+/);
  let score = 50;
  // Penalise abstract nouns
  abstractNouns.forEach(w => { if (words.includes(w)) score -= 10; });
  // Reward numbers/metrics
  const numbers = (text.match(/\d+/g) || []).length;
  score += Math.min(numbers * 6, 24);
  // Reward named proper nouns (words starting with capital not at sentence start)
  const properNouns = (text.match(/(?<=[a-z\s])[A-Z][a-z]+/g) || []).length;
  score += Math.min(properNouns * 4, 20);
  // Reward length up to a point
  score += Math.min(Math.floor(text.length / 60), 10);
  return Math.max(0, Math.min(100, score));
}

function buildGuardrailsStr(guardrails) {
  if (!guardrails || guardrails.length === 0) return '';
  return `\n\nGUARANTEED GUARDRAILS — apply to every word of output:\n${guardrails.map(r => `• ${r}`).join('\n')}`;
}

function persist(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('dp_cold_open_v1');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function haversineMi(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function JobSearch() {
  const [selectedRoles, setSelectedRoles] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch && saved.jobSearch.roles
      ? saved.jobSearch.roles
      : JOB_ROLES.filter(r => r.recommended).map(r => r.label);
  });
  const [mustKeywords, setMustKeywords] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch && saved.jobSearch.mustKeywords ? saved.jobSearch.mustKeywords : [];
  });
  const [optKeywords, setOptKeywords] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch && saved.jobSearch.optKeywords ? saved.jobSearch.optKeywords : [];
  });
  const [selectedLocations, setSelectedLocations] = useState(() => {
    const saved = load();
    // migrate old locationCity string to array
    if (saved && saved.jobSearch) {
      if (saved.jobSearch.selectedLocations) return saved.jobSearch.selectedLocations;
      if (saved.jobSearch.locationCity) return [saved.jobSearch.locationCity];
    }
    return [];
  });
  const [nearbyLocations, setNearbyLocations] = useState([]); // {label, dist}
  const [locPanelOpen, setLocPanelOpen] = useState(false);
  const [locSearch, setLocSearch] = useState('');
  const [geoLoading, setGeoLoading] = useState(false);
  const [geoDetected, setGeoDetected] = useState(false);

  function applyGeoCoords(latitude, longitude, openPanel) {
    const nearby = GEO_CITIES
      .filter(c => c.lat !== null)
      .map(c => ({ ...c, dist: Math.round(haversineMi(latitude, longitude, c.lat, c.lon)) }))
      .filter(c => c.dist <= 25)
      .sort((a, b) => a.dist - b.dist);
    const special = GEO_CITIES.filter(c => c.lat === null);
    setNearbyLocations([...nearby, ...special]);
    setGeoDetected(true);
    if (selectedLocations.length === 0 && nearby.length > 0) {
      setSelectedLocations([nearby[0].label]);
    }
    if (openPanel) setLocPanelOpen(true);
  }

  function detectLocation() {
    if (!navigator.geolocation) return;
    // Use cached coords — avoids re-prompting for permission every visit
    const stored = load();
    if (stored && stored.geoCoords) {
      applyGeoCoords(stored.geoCoords.lat, stored.geoCoords.lon, true);
      return;
    }
    setGeoLoading(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        // Cache coords so we never need to prompt again
        const s = load() || {};
        persist({ ...s, geoCoords: { lat: latitude, lon: longitude } });
        applyGeoCoords(latitude, longitude, true);
        setGeoLoading(false);
      },
      () => { setGeoLoading(false); setGeoDetected(false); },
      { timeout: 8000 }
    );
  }

  // Filtered list for the dropdown (when no geo, show all; when geo, show nearby)
  const locListBase = geoDetected ? nearbyLocations : GEO_CITIES;
  const locListFiltered = locSearch.trim()
    ? GEO_CITIES.filter(c => c.label.toLowerCase().includes(locSearch.toLowerCase()))
    : locListBase;

  function toggleLocation(label) {
    setSelectedLocations(prev =>
      prev.includes(label) ? prev.filter(l => l !== label) : [...prev, label]
    );
  }

  // On load: apply cached coords silently, or prompt once on first visit
  React.useEffect(() => {
    const saved = load();
    const hasSaved = saved && saved.jobSearch && (saved.jobSearch.selectedLocations || saved.jobSearch.locationCity);
    if (saved && saved.geoCoords) {
      applyGeoCoords(saved.geoCoords.lat, saved.geoCoords.lon, false);
    } else if (!hasSaved) {
      detectLocation();
    }
  }, []);

  // Close location panel on outside click
  const locPanelRef = React.useRef(null);
  React.useEffect(() => {
    if (!locPanelOpen) return;
    function handler(e) {
      if (locPanelRef.current && !locPanelRef.current.contains(e.target)) {
        setLocPanelOpen(false);
        setLocSearch('');
      }
    }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [locPanelOpen]);

  const [locationRadius, setLocationRadius] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch ? (saved.jobSearch.locationRadius || '25') : '25';
  });
  const [dateRange, setDateRange] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch ? (saved.jobSearch.dateRange || '') : '';
  });
  const [expLevels, setExpLevels] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch ? (saved.jobSearch.expLevels || []) : [];
  });
  const [workplaceTypes, setWorkplaceTypes] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch ? (saved.jobSearch.workplaceTypes || []) : [];
  });
  const [jobTypes, setJobTypes] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch ? (saved.jobSearch.jobTypes || []) : [];
  });
  const [networkOnly, setNetworkOnly] = useState(() => {
    const saved = load();
    return saved && saved.jobSearch ? (saved.jobSearch.networkOnly || false) : false;
  });
  const [toast, setToast] = useState(null);
  const [savedSearches, setSavedSearches] = useState(() => {
    const saved = load();
    return saved && saved.savedSearches ? saved.savedSearches : [];
  });
  const [saveSearchName, setSaveSearchName] = useState('');
  const [showSaveSearch, setShowSaveSearch] = useState(false);
  const [urlsOpen, setUrlsOpen] = useState(true);
  const [customEngines, setCustomEngines] = useState(() => {
    const saved = load();
    return saved && saved.customEngines ? saved.customEngines : [];
  });
  const [showAddEngine, setShowAddEngine] = useState(false);
  const [newEngineName, setNewEngineName] = useState('');
  const [newEngineUrl, setNewEngineUrl] = useState('');

  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, customEngines });
  }, [customEngines]);

  function addCustomEngine() {
    const name = newEngineName.trim();
    const url  = newEngineUrl.trim();
    if (!name || !url) return;
    setCustomEngines(prev => [...prev, { id: Date.now(), name, urlTemplate: url }]);
    setNewEngineName('');
    setNewEngineUrl('');
    setShowAddEngine(false);
    setToast(`${name} added`);
  }
  function removeCustomEngine(id) {
    setCustomEngines(prev => prev.filter(e => e.id !== id));
  }
  function buildCustomUrl(template) {
    // Replace {{keywords}} with the built keyword string
    const kw = [...selectedRoles, ...mustKeywords, ...optKeywords].join(' ');
    return template.replace(/\{\{keywords\}\}/g, encodeURIComponent(kw));
  }

  // Persist job search state on every change
  useEffect(() => {
    const stored = load() || {};
    persist({
      ...stored,
      jobSearch: { roles: selectedRoles, mustKeywords, optKeywords, selectedLocations, locationRadius, dateRange, expLevels, workplaceTypes, jobTypes, networkOnly },
    });
  }, [selectedRoles, mustKeywords, optKeywords, selectedLocations, locationRadius, dateRange, expLevels, workplaceTypes, jobTypes, networkOnly]);

  // Persist saved searches
  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, savedSearches });
  }, [savedSearches]);

  function toggleArr(arr, setArr, val) {
    setArr(arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);
  }

  const isRemoteOnly = workplaceTypes.length > 0 && workplaceTypes.every(w => w === '2');
  const effectiveLocations = isRemoteOnly
    ? ['United States']
    : selectedLocations.length > 0
      ? selectedLocations
      : [''];
  const effectiveRadius = isRemoteOnly ? '' : locationRadius;

  // Build one URL set per selected location
  const locationUrls = effectiveLocations.map(loc => ({
    loc,
    linkedIn: buildJobURL({ roles: selectedRoles, mustKeywords, optKeywords, customKeyword: '', location: loc, locationRadius: effectiveRadius, dateRange, expLevels, workplaceTypes, jobTypes, networkOnly }),
    ladders:  buildLaddersURL({ roles: selectedRoles, mustKeywords, optKeywords, customKeyword: '', location: loc }),
  }));
  // Keep single url/laddersUrl for legacy references
  const url = locationUrls[0]?.linkedIn || '';
  const laddersUrl = locationUrls[0]?.ladders || '';
  const hasTerms = selectedRoles.length > 0 || mustKeywords.length > 0 || optKeywords.length > 0;
  const broadKw = [...selectedRoles, ...mustKeywords, ...optKeywords].join(' ');
  const QUICK_FIRE = hasTerms ? [
    { name: 'Indeed',    url: `https://www.indeed.com/jobs?q=${encodeURIComponent(broadKw)}`,                    color: '#2557d6' },
    { name: 'Glassdoor', url: `https://www.glassdoor.com/Job/jobs.htm?sc.keyword=${encodeURIComponent(broadKw)}`, color: '#0caa41' },
    { name: 'BuiltIn',   url: `https://builtin.com/jobs?search=${encodeURIComponent(broadKw)}`,                   color: '#e0431b' },
    { name: 'Wellfound', url: `https://wellfound.com/jobs?query=${encodeURIComponent(broadKw)}`,                  color: '#1a1a1a' },
  ] : [];

  function saveCurrentSearch() {
    const name = saveSearchName.trim() || `Search ${new Date().toLocaleDateString()}`;
    const entry = {
      id: Date.now(),
      name,
      roles: selectedRoles,
      mustKeywords,
      optKeywords,
      selectedLocations,
      locationRadius,
      dateRange,
      expLevels,
      workplaceTypes,
      jobTypes,
      networkOnly,
    };
    setSavedSearches(prev => [entry, ...prev.slice(0, 9)]);
    setSaveSearchName('');
    setShowSaveSearch(false);
    setToast('Search saved');
  }

  function loadSavedSearch(entry) {
    setSelectedRoles(entry.roles || []);
    setMustKeywords(entry.mustKeywords || []);
    setOptKeywords(entry.optKeywords || []);
    setSelectedLocations(entry.selectedLocations || (entry.locationCity ? [entry.locationCity] : []));
    setLocationRadius(entry.locationRadius || '25');
    setDateRange(entry.dateRange || '');
    setExpLevels(entry.expLevels || []);
    setWorkplaceTypes(entry.workplaceTypes || []);
    setJobTypes(entry.jobTypes || []);
    setNetworkOnly(entry.networkOnly || false);
    setToast(`Loaded: ${entry.name}`);
  }

  function deleteSavedSearch(id) {
    setSavedSearches(prev => prev.filter(s => s.id !== id));
  }

  function copyUrl() {
    navigator.clipboard.writeText(url).then(() => setToast('URL copied'));
  }
  function copyLaddersUrl() {
    navigator.clipboard.writeText(laddersUrl).then(() => setToast('Ladders URL copied'));
  }

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Shoot</div>
        <div className="page-sub">Select your target roles and keywords to build a precision job search URL for LinkedIn and The Ladders.</div>
      </div>

      <div className="card">
        <div className="card-title">Target Roles</div>
        <RoleSelector selected={selectedRoles} setSelected={setSelectedRoles} />
      </div>

      <div className="card">
        <div className="card-title">Domain Keywords</div>
        <KeywordSelector mustKws={mustKeywords} setMustKws={setMustKeywords} optKws={optKeywords} setOptKws={setOptKeywords} />
      </div>

      <div className="card">
        <div className="card-title">Filters</div>
        {isRemoteOnly ? (
          <div className="field">
            <label>Location</label>
            <div style={{padding:'9px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8, fontSize:12, color:'var(--muted)', fontFamily:'var(--mono)', letterSpacing:'.04em'}}>
              🌐 Remote — searching United States
            </div>
          </div>
        ) : (
          <div className="field-row" style={{alignItems:'flex-start'}}>
            {/* Location multi-select */}
            <div className="field" style={{flex:2}}>
              <label style={{display:'flex',alignItems:'center',gap:6,justifyContent:'space-between'}}>
                <span>Locations</span>
                <button
                  onClick={detectLocation}
                  title={geoDetected ? 'Re-detect my location' : 'Detect nearby cities'}
                  style={{background:'none',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',
                    padding:'2px 7px',color:geoLoading?'var(--accent)':'var(--muted)',fontSize:10,
                    fontFamily:'var(--mono)',letterSpacing:'.04em',transition:'color .2s'}}
                >
                  {geoLoading ? '⟳ detecting…' : geoDetected ? '⌖ re-detect' : '⌖ detect nearby'}
                </button>
              </label>
              {/* Selected location chips */}
              {selectedLocations.length > 0 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
                  {selectedLocations.map(loc => (
                    <span key={loc} style={{
                      display:'inline-flex',alignItems:'center',gap:4,
                      background:'var(--accent-dim)',border:'1px solid var(--accent-bdr)',
                      borderRadius:14,padding:'3px 8px',fontSize:11,color:'var(--accent)',
                      fontFamily:'var(--mono)',
                    }}>
                      {loc}
                      <span onClick={() => toggleLocation(loc)} style={{cursor:'pointer',opacity:.7,fontSize:10,marginLeft:1}}>×</span>
                    </span>
                  ))}
                </div>
              )}
              {/* Dropdown trigger */}
              <div ref={locPanelRef} style={{position:'relative'}}>
                <div
                  onClick={() => setLocPanelOpen(o => !o)}
                  style={{
                    display:'flex',alignItems:'center',justifyContent:'space-between',
                    padding:'8px 12px',background:'var(--bg-2)',
                    border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',
                    fontSize:12,color:selectedLocations.length?'var(--text)':'var(--muted)',
                    userSelect:'none',
                  }}
                >
                  <span>
                    {selectedLocations.length === 0
                      ? geoDetected ? 'Select from nearby cities…' : 'Select cities…'
                      : `${selectedLocations.length} location${selectedLocations.length>1?'s':''} selected`}
                  </span>
                  <span style={{fontSize:9,color:'var(--muted-2)'}}>{locPanelOpen?'▴':'▾'}</span>
                </div>
                {locPanelOpen && (
                  <div style={{
                    position:'absolute',top:'100%',left:0,right:0,zIndex:300,
                    background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,
                    marginTop:3,boxShadow:'0 12px 32px rgba(0,0,0,.6)',overflow:'hidden',
                  }}>
                    {/* Search within list */}
                    <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)'}}>
                      <input
                        value={locSearch}
                        onChange={e => setLocSearch(e.target.value)}
                        placeholder="Search cities…"
                        onClick={e => e.stopPropagation()}
                        style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:5,
                          padding:'5px 9px',fontSize:12,color:'var(--text)'}}
                        autoFocus
                      />
                    </div>
                    {/* City list */}
                    <div style={{maxHeight:220,overflowY:'auto'}}>
                      {locListFiltered.length === 0 && (
                        <div style={{padding:'10px 14px',fontSize:12,color:'var(--muted)'}}>No matches</div>
                      )}
                      {locListFiltered.map(city => {
                        const checked = selectedLocations.includes(city.label);
                        return (
                          <div
                            key={city.label}
                            onClick={() => toggleLocation(city.label)}
                            style={{
                              display:'flex',alignItems:'center',gap:10,
                              padding:'8px 14px',cursor:'pointer',fontSize:12,
                              background: checked ? 'var(--accent-dim)' : 'transparent',
                              borderBottom:'1px solid var(--border)',
                              color: checked ? 'var(--accent)' : 'var(--text)',
                              transition:'background .1s',
                            }}
                            onMouseEnter={e => { if(!checked) e.currentTarget.style.background='rgba(255,255,255,.04)'; }}
                            onMouseLeave={e => { if(!checked) e.currentTarget.style.background='transparent'; }}
                          >
                            <span style={{fontSize:10, color: checked?'var(--accent)':'var(--muted-2)'}}>
                              {checked ? '☑' : '☐'}
                            </span>
                            <span style={{flex:1}}>{city.label}</span>
                            {city.dist != null && (
                              <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>
                                {city.dist} mi
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {/* Footer */}
                    <div style={{padding:'8px 14px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:10,color:'var(--muted)'}}>
                        {geoDetected ? `Showing cities within 25 mi · ` : ''}
                        {selectedLocations.length} selected
                      </span>
                      <button
                        onClick={(e) => { e.stopPropagation(); setLocPanelOpen(false); setLocSearch(''); }}
                        style={{background:'var(--accent)',border:'none',borderRadius:5,padding:'3px 10px',
                          fontSize:11,color:'#0C0C12',cursor:'pointer',fontFamily:'var(--mono)'}}
                      >
                        done
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            {/* Radius */}
            <div className="field" style={{flex:1}}>
              <label>Radius</label>
              <div style={{position:'relative'}}>
                <select value={locationRadius} onChange={e => setLocationRadius(e.target.value)} style={{paddingRight:28}}>
                  {[5,10,15,25,50,75,100].map(r => <option key={r} value={String(r)}>{r} mi</option>)}
                </select>
                <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#5a5a6e',fontSize:11}}>▾</span>
              </div>
            </div>
          </div>
        )}

        <div className="field">
          <label>Date Posted</label>
          <div style={{position:'relative'}}>
            <select value={dateRange} onChange={e => setDateRange(e.target.value)} style={{paddingRight: 28}}>
              {DATE_RANGES.map(d => <option key={d.value} value={d.value}>{d.label}</option>)}
            </select>
            <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#5a5a6e',fontSize:11}}>▾</span>
          </div>
        </div>

        <div className="field">
          <label>Experience Level</label>
          <div className="chips-wrap">
            {EXP_LEVELS.map(e => (
              <button key={e.value} className={`chip ${expLevels.includes(e.value) ? 'active' : ''}`}
                onClick={() => toggleArr(expLevels, setExpLevels, e.value)}>{e.label}</button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Workplace Type</label>
          <div className="chips-wrap">
            {WORKPLACE_TYPES.map(w => (
              <button key={w.value} className={`chip ${workplaceTypes.includes(w.value) ? 'active' : ''}`}
                onClick={() => toggleArr(workplaceTypes, setWorkplaceTypes, w.value)}>{w.label}</button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Job Type</label>
          <div className="chips-wrap">
            {JOB_TYPES.map(j => (
              <button key={j.value} className={`chip ${jobTypes.includes(j.value) ? 'active' : ''}`}
                onClick={() => toggleArr(jobTypes, setJobTypes, j.value)}>{j.label}</button>
            ))}
          </div>
        </div>

        <div className="toggle-row">
          <span className="toggle-label">Jobs in my network only</span>
          <label className="toggle">
            <input type="checkbox" checked={networkOnly} onChange={e => setNetworkOnly(e.target.checked)} />
            <span className="toggle-slider"></span>
          </label>
        </div>
      </div>

      {/* Quick Search — save/load */}
      <div className="card">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: savedSearches.length > 0 ? 14 : 0}}>
          <div className="card-title" style={{marginBottom:0}}>Quick Searches</div>
          <button className="btn btn-secondary btn-sm" onClick={() => setShowSaveSearch(s => !s)}>
            {showSaveSearch ? 'Cancel' : '+ Save current'}
          </button>
        </div>

        {showSaveSearch && (
          <div style={{display:'flex', gap:8, marginTop:12, marginBottom:savedSearches.length > 0 ? 14 : 0}}>
            <input
              value={saveSearchName}
              onChange={e => setSaveSearchName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') saveCurrentSearch(); }}
              placeholder="Name this search…"
              style={{flex:1, padding:'7px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', fontSize:12, fontFamily:'var(--mono)'}}
            />
            <button className="btn btn-primary btn-sm" onClick={saveCurrentSearch}>Save</button>
          </div>
        )}

        {savedSearches.length === 0 && !showSaveSearch && (
          <div style={{fontSize:11, color:'var(--muted-2)', fontFamily:'var(--mono)', fontStyle:'italic', paddingTop:2}}>
            No saved searches yet — build a search and save it for quick reuse.
          </div>
        )}

        {savedSearches.length > 0 && (
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {savedSearches.map(s => (
              <div key={s.id} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8}}>
                <div style={{flex:1, fontSize:12, fontFamily:'var(--mono)', color:'var(--text)', letterSpacing:'.02em'}}>{s.name}</div>
                <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)'}}>
                  {s.roles.length > 0 && `${s.roles.length}r`}
                  {s.roles.length > 0 && (s.mustKeywords||[]).length + (s.optKeywords||[]).length > 0 && ' · '}
                  {(s.mustKeywords||[]).length > 0 && `${(s.mustKeywords||[]).length}m`}
                  {(s.mustKeywords||[]).length > 0 && (s.optKeywords||[]).length > 0 && '+'}
                  {(s.optKeywords||[]).length > 0 && `${(s.optKeywords||[]).length}k`}
                </div>
                <button className="btn btn-secondary btn-sm" onClick={() => loadSavedSearch(s)}>Load</button>
                <button className="btn btn-sm" style={{background:'transparent',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:14,padding:'2px 6px'}} onClick={() => deleteSavedSearch(s.id)}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: urlsOpen ? 14 : 0, cursor:'pointer'}} onClick={() => setUrlsOpen(o => !o)}>
          <div className="card-title" style={{marginBottom:0}}>Search URLs</div>
          <div style={{display:'flex', gap:6, alignItems:'center'}}>
            {!urlsOpen && !hasTerms && <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)'}}>select roles to generate</span>}
            <span style={{fontSize:12, color:'var(--muted-2)', fontFamily:'var(--mono)'}}>{urlsOpen ? '▴' : '▾'}</span>
          </div>
        </div>

        {urlsOpen && (
          <>
            {!hasTerms && (
              <div style={{fontSize:11, color:'var(--muted-2)', fontFamily:'var(--mono)', fontStyle:'italic'}}>Select at least one role or keyword to generate URLs.</div>
            )}

            {hasTerms && (
              <>
                {locationUrls.map(({ loc, linkedIn, ladders }, i) => (
                  <div key={loc || i}>
                    {/* Location label when multiple cities */}
                    {locationUrls.length > 1 && loc && (
                      <div style={{
                        marginBottom:8,marginTop: i > 0 ? 14 : 0,
                        padding:'4px 10px',background:'rgba(240,168,32,.07)',
                        border:'1px solid var(--accent-bdr)',borderRadius:5,
                        fontSize:10,color:'var(--accent)',fontFamily:'var(--mono)',
                        letterSpacing:'.06em',display:'inline-block',
                      }}>
                        📍 {loc}
                      </div>
                    )}
                    <div style={{marginBottom:4, fontSize:10, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>LinkedIn</div>
                    <div className="url-row" style={{marginBottom:8}}>
                      <div className="url-text">{linkedIn}</div>
                      <div className="url-actions">
                        <a href={linkedIn} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
                        <button className="btn btn-primary btn-sm" onClick={() => navigator.clipboard.writeText(linkedIn).then(() => setToast('URL copied'))}>Copy</button>
                      </div>
                    </div>
                    <div style={{marginBottom:4, fontSize:10, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>The Ladders</div>
                    <div className="url-row" style={{marginBottom:12}}>
                      <div className="url-text">{ladders}</div>
                      <div className="url-actions">
                        <a href={ladders} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
                        <button className="btn btn-primary btn-sm" onClick={() => navigator.clipboard.writeText(ladders).then(() => setToast('URL copied'))}>Copy</button>
                      </div>
                    </div>
                  </div>
                ))}

                {/* ── Quick Fire — Indeed / Glassdoor / BuiltIn / Wellfound ── */}
                {QUICK_FIRE.length > 0 && (
                  <div style={{marginTop:10, paddingTop:10, borderTop:'1px solid var(--border)'}}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                      <div style={{fontSize:10, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>Quick Fire</div>
                      <button
                        className="btn btn-primary btn-sm"
                        onClick={() => QUICK_FIRE.forEach(e => window.open(e.url, '_blank'))}
                      >
                        Shoot all 4 ↗
                      </button>
                    </div>
                    <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                      {QUICK_FIRE.map(eng => (
                        <a key={eng.name} href={eng.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}>
                          <button style={{
                            padding:'5px 14px', borderRadius:6, border:'none',
                            background:eng.color, color:'white',
                            fontSize:10, fontFamily:'var(--mono)', fontWeight:600,
                            letterSpacing:'.06em', cursor:'pointer',
                          }}>
                            {eng.name} ↗
                          </button>
                        </a>
                      ))}
                    </div>
                  </div>
                )}

                {customEngines.map(eng => {
                  const cUrl = buildCustomUrl(eng.urlTemplate);
                  return (
                    <div key={eng.id}>
                      <div style={{marginBottom:4, display:'flex', alignItems:'center', gap:6}}>
                        <span style={{fontSize:10, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>{eng.name}</span>
                        <button style={{background:'none',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:11,padding:'0 2px'}} onClick={() => removeCustomEngine(eng.id)} title="Remove">×</button>
                      </div>
                      <div className="url-row" style={{marginBottom:12}}>
                        <div className="url-text">{cUrl}</div>
                        <div className="url-actions">
                          <a href={cUrl} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
                          <button className="btn btn-primary btn-sm" onClick={() => navigator.clipboard.writeText(cUrl).then(() => setToast('URL copied'))}>Copy</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            <div style={{borderTop: hasTerms ? '1px solid var(--border)' : 'none', paddingTop: hasTerms ? 12 : 0, marginTop: hasTerms ? 4 : 0}}>
              {!showAddEngine ? (
                <button className="btn btn-secondary btn-sm" onClick={(e) => { e.stopPropagation(); setShowAddEngine(true); }}>+ Add search engine</button>
              ) : (
                <div style={{display:'flex', flexDirection:'column', gap:7}} onClick={e => e.stopPropagation()}>
                  <input
                    value={newEngineName}
                    onChange={e => setNewEngineName(e.target.value)}
                    placeholder="Engine name (e.g. Indeed)"
                    style={{padding:'7px 10px', fontSize:12, fontFamily:'var(--mono)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:7, color:'var(--text)'}}
                  />
                  <input
                    value={newEngineUrl}
                    onChange={e => setNewEngineUrl(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') addCustomEngine(); }}
                    placeholder="URL template — use {{keywords}} for search terms"
                    style={{padding:'7px 10px', fontSize:12, fontFamily:'var(--mono)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:7, color:'var(--text)'}}
                  />
                  <div style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'.04em'}}>
                    Example: https://www.indeed.com/jobs?q=&#123;&#123;keywords&#125;&#125;
                  </div>
                  <div style={{display:'flex', gap:6}}>
                    <button className="btn btn-primary btn-sm" onClick={addCustomEngine} disabled={!newEngineName.trim() || !newEngineUrl.trim()}>Save engine</button>
                    <button className="btn btn-secondary btn-sm" onClick={() => { setShowAddEngine(false); setNewEngineName(''); setNewEngineUrl(''); }}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>

    </div>
  );
}

// ── People & Contacts Mode ────────────────────────────────────────────────────

const REL_TYPES = ['Former colleague', 'Friend', 'Acquaintance', 'Met at event', 'LinkedIn connection', 'Recruiter', 'Other'];

function PeopleContacts({ watchList }) {
  const [selectedCompany, setSelectedCompany] = useState('');
  const [customCompany, setCustomCompany]     = useState('');
  const [contactRole, setContactRole]         = useState('Head of Product');
  const [toast, setToast]                     = useState(null);

  // Network contacts stored in localStorage
  const [contacts, setContacts] = useState(() => {
    const s = load(); return s && s.networkContacts ? s.networkContacts : [];
  });
  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, networkContacts: contacts });
  }, [contacts]);

  // Add contact form
  const blankForm = { name:'', company:'', title:'', relationship:'Former colleague', linkedin:'', notes:'' };
  const [showAdd, setShowAdd]   = useState(false);
  const [form, setForm]         = useState(blankForm);
  const [editId, setEditId]     = useState(null);

  // Search
  const [searchQ, setSearchQ] = useState('');

  const company = selectedCompany || customCompany.trim();
  const urls    = company ? buildPeopleURLs(company, contactRole) : null;

  // Contacts filtered to current company (if selected) OR global search
  const displayContacts = contacts.filter(c => {
    if (company) return c.company.toLowerCase() === company.toLowerCase();
    if (searchQ)  return (
      c.name.toLowerCase().includes(searchQ.toLowerCase()) ||
      c.company.toLowerCase().includes(searchQ.toLowerCase()) ||
      c.title.toLowerCase().includes(searchQ.toLowerCase())
    );
    return true;
  });

  function copy(url) {
    navigator.clipboard.writeText(url).then(() => setToast('URL copied'));
  }

  function saveContact() {
    if (!form.name.trim() || !form.company.trim()) return;
    if (editId) {
      setContacts(cs => cs.map(c => c.id === editId ? { ...form, id: editId } : c));
      setEditId(null);
    } else {
      setContacts(cs => [...cs, { ...form, id: Date.now() }]);
    }
    setForm(blankForm);
    setShowAdd(false);
    setToast(editId ? 'Contact updated' : 'Contact added');
  }

  function deleteContact(id) {
    setContacts(cs => cs.filter(c => c.id !== id));
    setToast('Contact removed');
  }

  function startEdit(c) {
    setForm({ name: c.name, company: c.company, title: c.title, relationship: c.relationship, linkedin: c.linkedin || '', notes: c.notes || '' });
    setEditId(c.id);
    setShowAdd(true);
  }

  function cancelAdd() {
    setForm(blankForm);
    setEditId(null);
    setShowAdd(false);
  }

  const inp = (extra={}) => ({
    style:{ width:'100%', padding:'8px 10px', border:'1px solid #1e1e2a', borderRadius:6,
            fontSize:13, background:'#111118', color:'#e8e8f0', fontFamily:'inherit',
            boxSizing:'border-box' },
    ...extra
  });

  const UrlRow = ({ label, url }) => (
    <div className="url-box" style={{marginBottom: 10}}>
      <div className="url-box-label">{label}</div>
      <div className="url-row">
        <div className="url-text">{url}</div>

          <a href={url} target="_blank" rel="noopener noreferrer">
            <button className="btn btn-secondary btn-sm">Open ↗</button>
          </a>
          <button className="btn btn-primary btn-sm" onClick={() => copy(url)}>Copy</button>
        </div>
      </div>
    </div>
  );

  const relColor = { 'Former colleague':'#3b82f6', 'Friend':'#22c55e', 'Acquaintance':'#a78bfa',
    'Met at event':'#f59e0b', 'LinkedIn connection':'#0ea5e9', 'Recruiter':'#f43f5e', 'Other':'#6b7280' };

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Contact Sheet</div>
        <div className="page-sub">Your full network, organized by company. Add contacts and filter to find the warm path.</div>
      </div>

      {/* ── My Network ── */}
      <div className="card">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
          <div className="card-title" style={{margin:0}}>My Network ({contacts.length})</div>
          <button className="btn btn-primary btn-sm" onClick={() => { setShowAdd(!showAdd); setEditId(null); setForm(blankForm); }}>
            {showAdd && !editId ? 'Cancel' : '+ Add Contact'}
          </button>
        </div>

        {/* Search all contacts when no company selected */}
        {!company && (
          <input {...inp({marginBottom:12})} placeholder="Search by name, company, or title…"
            value={searchQ} onChange={e => setSearchQ(e.target.value)} />
        )}

        {/* Add / Edit form */}
        {showAdd && (
          <div style={{background:'#0d0d14', border:'1px solid #1e1e2a', borderRadius:8, padding:14, marginBottom:14}}>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8}}>
              <div>
                <label style={{fontSize:11, color:'#666', display:'block', marginBottom:3}}>Name *</label>
                <input {...inp()} value={form.name} onChange={e => setForm({...form, name:e.target.value})} placeholder="Jane Smith" />
              </div>
              <div>
                <label style={{fontSize:11, color:'#666', display:'block', marginBottom:3}}>Company *</label>
                <input {...inp()} value={form.company}
                  onChange={e => setForm({...form, company:e.target.value})}
                  placeholder={company || 'Salesforce'} />
              </div>
              <div>
                <label style={{fontSize:11, color:'#666', display:'block', marginBottom:3}}>Title</label>
                <input {...inp()} value={form.title} onChange={e => setForm({...form, title:e.target.value})} placeholder="VP of Product" />
              </div>
              <div>
                <label style={{fontSize:11, color:'#666', display:'block', marginBottom:3}}>Relationship</label>
                <select {...inp()} value={form.relationship} onChange={e => setForm({...form, relationship:e.target.value})}>
                  {REL_TYPES.map(r => <option key={r}>{r}</option>)}
                </select>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <label style={{fontSize:11, color:'#666', display:'block', marginBottom:3}}>LinkedIn URL</label>
              <input {...inp()} value={form.linkedin} onChange={e => setForm({...form, linkedin:e.target.value})} placeholder="https://linkedin.com/in/…" />
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11, color:'#666', display:'block', marginBottom:3}}>Notes</label>
              <textarea {...inp()} rows={2} value={form.notes} onChange={e => setForm({...form, notes:e.target.value})} placeholder="How you know them, last contact, best approach…" />
            </div>
            <div style={{display:'flex', gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={saveContact}>{editId ? 'Save Changes' : 'Add to Network'}</button>
              <button className="btn btn-secondary btn-sm" onClick={cancelAdd}>Cancel</button>
            </div>

        )}

        {/* Contact cards */}
        {displayContacts.length === 0 && (
          <div style={{fontSize:13, color:'#444', padding:'10px 0'}}>
            {contacts.length === 0 ? 'No contacts yet. Add people from your network.' : `No contacts at ${company || 'matching that search'}.`}
          </div>
        )}
        {displayContacts.map(c => (
          <div key={c.id} style={{display:'flex', alignItems:'flex-start', gap:12, padding:'10px 0', borderBottom:'1px solid #111'}}>
            <div style={{flex:1, minWidth:0}}>
              <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                <span style={{fontWeight:600, fontSize:14, color:'#e8e8f0'}}>{c.name}</span>
                <span style={{fontSize:11, padding:'2px 7px', borderRadius:10, background:'rgba(255,255,255,.06)',
                  color: relColor[c.relationship] || '#aaa', border:`1px solid ${relColor[c.relationship] || '#333'}22`}}>
                  {c.relationship}
                </span>
              </div>
              <div style={{fontSize:12, color:'#888', marginTop:2}}>
                {c.title && <span>{c.title}</span>}
                {c.title && c.company && <span> · </span>}

              </div>
              {c.notes && <div style={{fontSize:12, color:'#555', marginTop:4, fontStyle:'italic'}}>{c.notes}</div>}
            </div>
            <div style={{display:'flex', gap:6, flexShrink:0}}>
              {c.linkedin && (
                <a href={c.linkedin} target="_blank" rel="noopener noreferrer">
                  <button className="btn btn-secondary btn-sm">LI ↗</button>

              <button className="btn btn-secondary btn-sm" onClick={() => startEdit(c)}>Edit</button>

      {/* ── Company Filter + Search URLs ── */}
      <div className="card">
        <div className="card-title">Filter by Company</div>

          <div className="chips-wrap" style={{marginBottom: 8}}>

                {w.company}

                  <span style={{marginLeft:5, background:'var(--accent)', color:'#fff', borderRadius:8, padding:'0 5px', fontSize:10}}>
                    {contacts.filter(c => c.company.toLowerCase() === w.company.toLowerCase()).length}

                )}

            ))}
          </div>
          <input
            value={customCompany}
            onChange={e => { setCustomCompany(e.target.value); setSelectedCompany(''); setSearchQ(''); }}
            placeholder="Or type any company…"
            style={{width:'100%', padding:'8px 10px', border:'1px solid #1e1e2a', borderRadius:6, fontSize:13, background:'#111118', color:'#e8e8f0', fontFamily:'inherit'}}
          />

        <div className="field" style={{marginBottom: 0}}>
          <label>Contact Role (for search URLs)</label>
          <div className="chips-wrap">
            {CONTACT_ROLES.map(r => (
              <button key={r} className={`chip ${contactRole === r ? 'active' : ''}`}
                onClick={() => setContactRole(r)}>{r}</button>
            ))}
          </div>
        </div>
      </div>

      {urls && (
        <div className="card">
          <div className="card-title">Search URLs — {company}</div>
          <UrlRow label="LinkedIn (1st & 2nd degree)" url={urls.linkedin} />
          <UrlRow label="Google X-ray" url={urls.xray} />
          <UrlRow label="LinkedIn Open Network" url={urls.open} />
        </div>
      )}
    </div>
  );
}

// ── Deep Research Mode ────────────────────────────────────────────────────────

function DeepResearch({ profile, apiKey, guardrails, onNeedApiKey }) {
  const [name, setName] = useState('');
  const [company, setCompany] = useState('');
  const [loading, setLoading] = useState(false);
  const [dossier, setDossier] = useState(null);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);
  const [watchList] = useState(DEFAULTS.watchList);

  async function runResearch() {
    if (!name.trim()) return;
    setLoading(true);
    setDossier(null);
    setError('');
    try {
      const res = await fetch('/.netlify/functions/research', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1500,
          system: buildSystemPrompt(profile, guardrails),
          messages: [{ role: 'user', content: `Research ${name.trim()}${company.trim() ? ` at ${company.trim()}` : ''}.` }],
        }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `API error ${res.status}`);
      }
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const parsed = JSON.parse(text);
      setDossier(parsed);
    } catch(e) {
      setError(e.message || 'Something went wrong. Check your API key.');
    } finally {
      setLoading(false);
    }
  }

  function copyDM() {
    if (!dossier?.suggestedDM) return;
    navigator.clipboard.writeText(dossier.suggestedDM).then(() => setToast('DM copied'));
  }

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Loupe</div>
        <div className="page-sub">Research any contact. Get their background, where you share ground, and a suggested first message — ready to send.</div>
      </div>

      <div className="card">
        <div className="field-row">
          <div className="field">
            <label>Person's Name</label>
            <input value={name} onChange={e => setName(e.target.value)}
              placeholder="Jane Smith"
              onKeyDown={e => e.key === 'Enter' && runResearch()} />
          </div>
          <div className="field">
            <label>Company (optional)</label>
            <input value={company} onChange={e => setCompany(e.target.value)}
              placeholder="Salesforce"
              onKeyDown={e => e.key === 'Enter' && runResearch()} />
          </div>
        </div>
        <button className="btn btn-primary" onClick={runResearch} disabled={loading || !name.trim()}>
          {loading ? 'Researching…' : 'Run Research'}
        </button>
      </div>

      {loading && (
        <div className="card">
          <FlaskLoader text="Finding shared ground with your profile…" />
        </div>
      )}

      {error && <div className="error-msg">{error}</div>}

      {dossier && (
        <div className="dossier-card">
          <div className="dossier-name">{dossier.name}</div>
          <div className="dossier-meta">{[dossier.title, dossier.company].filter(Boolean).join(' · ')}</div>

          <div className="dossier-section">
            <div className="dossier-section-title">Background</div>
            <div className="dossier-text">{dossier.background}</div>
          </div>

          <div className="dossier-section">
            <div className="dossier-section-title">Shared Ground</div>
            <div className="dossier-text">{dossier.sharedGround}</div>
          </div>

          <div className="dossier-section">
            <div className="dossier-section-title">Outreach Angle</div>
            <div className="dossier-text">{dossier.outreachAngle}</div>
          </div>

          <div className="dossier-section">
            <div className="dossier-section-title">Suggested DM</div>
            <div className="dm-box">{dossier.suggestedDM}</div>
            <div style={{marginTop: 8}}>
              <button className="btn btn-secondary btn-sm" onClick={copyDM}>Copy DM</button>
            </div>
          </div>

          {dossier.researchNote && (
            <div className="research-note">{dossier.researchNote}</div>
          )}
        </div>
      )}
    </div>
  );
}
