<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Aperture · KPI</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0C0C12; --bg-2: #14102A; --bg-card: #18142C;
      --border: rgba(240,168,32,.07); --border-gold: rgba(240,168,32,.22);
      --text: #F0EEF8; --muted: rgba(240,238,248,.65); --muted-2: rgba(240,238,248,.38);
      --accent: #F0A820; --accent-dim: rgba(240,168,32,.10); --accent-bdr: rgba(240,168,32,.28);
      --green: #22C55E; --red: #EF4444; --yellow: #F59E0B; --violet: #3D1A88; --magenta: #8B2BBE; --crimson: #D01878; --ember: #E86020;
      --gradient: linear-gradient(90deg,#3D1A88,#8B2BBE,#D01878,#E86020,#F0A820);
      --mono: 'JetBrains Mono', monospace;
      --sans: -apple-system, 'Helvetica Neue', sans-serif;
    }
    body { font-family: Georgia, serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.75; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 0% 0%, rgba(61,26,136,.14) 0%, transparent 42%), radial-gradient(ellipse at 100% 100%, rgba(208,24,120,.07) 0%, transparent 38%); pointer-events:none; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 28px; position: relative; }
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .header-left { display:flex; align-items:center; gap:16px; }
    .logo { font-family:var(--mono); font-size:16px; font-weight:500; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-sub { font-family:var(--mono); font-size:9px; color:rgba(240,168,32,.55); letter-spacing:.34em; text-transform:uppercase; margin-top:2px; }
    .env-badge { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:4px 12px; border-radius:20px; border:1px solid; }
    .env-dev     { color:#60A5FA; border-color:rgba(96,165,250,.3); background:rgba(96,165,250,.08); }
    .env-preview { color:var(--yellow); border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.08); }
    .env-public  { color:var(--green); border-color:rgba(34,197,94,.3); background:rgba(34,197,94,.08); }
    .env-local   { color:var(--muted); border-color:rgba(240,238,248,.15); background:rgba(240,238,248,.04); }
    .section { margin-bottom:28px; }
    .section-title { font-family:var(--mono); font-size:9px; letter-spacing:.38em; text-transform:uppercase; color:rgba(240,168,32,.6); margin-bottom:14px; display:flex; align-items:center; gap:12px; }
    .section-title::after { content:''; flex:1; height:1px; background:rgba(240,168,32,.12); }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .card { background:rgba(22,17,40,.82); border:1px solid rgba(240,168,32,.07); border-top:1px solid rgba(240,168,32,.16); border-radius:12px; padding:18px 20px; }
    .card-accent { border-color:var(--border-gold); }
    .stat-val { font-family:var(--mono); font-size:26px; font-weight:500; color:var(--accent); line-height:1.1; }
    .stat-lbl { font-family:var(--mono); font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-2); margin-top:5px; }
    .stat-sub { font-size:11px; color:var(--muted); margin-top:4px; font-family:var(--mono); }
    .score-ring { width:64px; height:64px; flex-shrink:0; }
    .score-row { display:flex; align-items:center; gap:14px; }
    .score-label { font-family:var(--mono); font-size:11px; color:var(--text); }
    .score-sub { font-size:10px; color:var(--muted); margin-top:2px; }
    .bar-row { margin-bottom:10px; }
    .bar-label { display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:4px; }
    .bar-track { height:5px; background:rgba(240,238,248,.08); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; transition:width .4s; }
    .btn { font-family:var(--mono); font-size:11px; letter-spacing:.08em; padding:8px 18px; border-radius:8px; border:none; cursor:pointer; transition:all .15s; }
    .btn-primary { background:linear-gradient(90deg,var(--violet),var(--crimson)); color:#F0EEF8; font-family:var(--sans); font-weight:500; letter-spacing:.02em; text-transform:none; box-shadow:0 0 18px rgba(61,26,136,.3), 0 2px 8px rgba(0,0,0,.4); }
    .btn-primary:hover { background:linear-gradient(90deg,#4d22a8,#e01e88); box-shadow:0 0 28px rgba(61,26,136,.45), 0 2px 8px rgba(0,0,0,.4); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
    .btn-ghost { background:rgba(240,238,248,.04); color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover { border-color:var(--accent-bdr); color:var(--accent); }
    .btn-danger { background:rgba(239,68,68,.08); color:#EF4444; border:1px solid rgba(239,68,68,.2); }
    .tag { display:inline-block; font-family:var(--mono); font-size:9px; letter-spacing:.1em; padding:2px 8px; border-radius:20px; }
    .tag-pass { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.25); }
    .tag-caution { background:rgba(245,158,11,.1); color:var(--yellow); border:1px solid rgba(245,158,11,.25); }
    .tag-fail { background:rgba(239,68,68,.1); color:var(--red); border:1px solid rgba(239,68,68,.25); }
    .tag-haiku { background:rgba(96,165,250,.08); color:#93C5FD; border:1px solid rgba(96,165,250,.2); }
    .tag-sonnet { background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent-bdr); }
    .env-link { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-radius:10px; background:rgba(240,238,248,.03); border:1px solid var(--border); margin-bottom:8px; transition:border-color .15s; text-decoration:none; }
    .env-link:hover { border-color:var(--accent-bdr); }
    .env-link-name { font-family:var(--mono); font-size:12px; color:var(--text); }
    .env-link-url { font-family:var(--mono); font-size:10px; color:var(--muted-2); }
    .env-link-arrow { font-size:12px; color:var(--muted-2); }
    .bench-result { padding:14px 16px; border-radius:10px; background:rgba(240,238,248,.03); border:1px solid var(--border); margin-bottom:8px; }
    .bench-result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .bench-result-name { font-family:var(--mono); font-size:11px; color:var(--text); }
    .bench-flags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .flag { font-family:var(--mono); font-size:9px; padding:2px 8px; border-radius:20px; background:rgba(239,68,68,.08); color:#FCA5A5; border:1px solid rgba(239,68,68,.15); }
    .hist-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:10px; color:var(--muted); }
    .hist-row:last-child { border-bottom:none; }
    .hist-type { color:var(--text); width:130px; flex-shrink:0; }
    .hist-model { width:60px; flex-shrink:0; }
    .hist-cost { color:var(--accent); width:60px; flex-shrink:0; text-align:right; }
    .hist-tokens { width:80px; flex-shrink:0; text-align:right; }
    .hist-dur { width:55px; flex-shrink:0; text-align:right; }
    .hist-status { width:40px; flex-shrink:0; text-align:center; }
    textarea { width:100%; background:rgba(240,238,248,.03); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--mono); font-size:11px; padding:12px; resize:vertical; outline:none; line-height:1.5; }
    textarea:focus { border-color:var(--accent-bdr); }
    .verify-output { margin-top:12px; padding:14px 16px; background:rgba(240,238,248,.03); border:1px solid var(--border); border-radius:10px; font-family:var(--mono); font-size:11px; }
    .input-row { display:flex; gap:10px; align-items:center; margin-bottom:12px; }
    input[type=password], input[type=text] { flex:1; background:rgba(240,238,248,.04); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--mono); font-size:12px; padding:9px 13px; outline:none; }
    input:focus { border-color:var(--accent-bdr); }
    .gradient-bar { height:2px; background:var(--gradient); opacity:.85; border-radius:0 0 2px 2px; }
    .tabs { display:flex; gap:4px; margin-bottom:20px; }
    .tab { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:6px 14px; border-radius:6px; border:none; cursor:pointer; background:none; color:var(--muted-2); transition:all .15s; }
    .tab.active { background:var(--accent-dim); color:var(--accent); }
    .tab:hover { color:var(--text); }
    .drift-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .drift-row:last-child { border-bottom:none; }
    .drift-metric { font-family:var(--mono); font-size:11px; color:var(--text); flex:1; }
    .drift-baseline { font-family:var(--mono); font-size:10px; color:var(--muted-2); width:80px; text-align:right; }
    .drift-current { font-family:var(--mono); font-size:10px; width:80px; text-align:right; }
    .drift-delta { font-family:var(--mono); font-size:10px; width:70px; text-align:right; }
    .delta-pos { color:var(--green); }
    .delta-neg { color:var(--red); }
    .delta-neutral { color:var(--muted-2); }
    .empty { text-align:center; padding:40px 20px; color:var(--muted-2); font-family:var(--mono); font-size:11px; }

    /* ── Custom Cursor ── */
    html,body,*{cursor:none!important}
    #cur-outer{position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:opacity .2s}
    .cur-ring{transition:stroke .18s}
    .cur-ring-inner{transition:opacity .18s;opacity:0}
    .cur-center-dot{transition:fill .15s}
    body.cur-hovering .cur-ring-inner{opacity:1}
    body.cur-hovering .cur-center-dot{fill:#F0EEF8}
    @keyframes cur-ticks-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes cur-bk-nw{0%,100%{transform:translate(0,0)}50%{transform:translate(3.5px,3.5px)}}
    @keyframes cur-bk-ne{0%,100%{transform:translate(0,0)}50%{transform:translate(-3.5px,3.5px)}}
    @keyframes cur-bk-sw{0%,100%{transform:translate(0,0)}50%{transform:translate(3.5px,-3.5px)}}
    @keyframes cur-bk-se{0%,100%{transform:translate(0,0)}50%{transform:translate(-3.5px,-3.5px)}}
    body.cur-thinking .cur-ring{stroke:#F0A820!important}
    body.cur-thinking .cur-ring-inner{opacity:1}
    body.cur-thinking .cur-ticks-g{animation:cur-ticks-spin 2.2s linear infinite;transform-box:fill-box;transform-origin:center}
    body.cur-thinking .cur-nw{animation:cur-bk-nw 1.1s ease-in-out infinite}
    body.cur-thinking .cur-ne{animation:cur-bk-ne 1.1s ease-in-out infinite .13s}
    body.cur-thinking .cur-sw{animation:cur-bk-sw 1.1s ease-in-out infinite .26s}
    body.cur-thinking .cur-se{animation:cur-bk-se 1.1s ease-in-out infinite .39s}
  </style>
</head>

<script>
(function() {
  var h = window.location.hostname;
  var isLocal = ['localhost', '127.0.0.1', ''].indexOf(h) !== -1;
  var isPreview = h.indexOf('preview--') !== -1;
  if (isLocal || !isPreview) return;
  var KEY = 'aperture_preview_ok';
  if (sessionStorage.getItem(KEY) === '1') return;
  var gate = document.getElementById('preview-gate');
  gate.style.display = 'flex';
  document.getElementById('preview-gate-btn').addEventListener('click', function() {
    var val = document.getElementById('preview-gate-input').value;
    if (val === 'LensOn.PCL26') {
      sessionStorage.setItem(KEY, '1');
      gate.style.display = 'none';
    } else {
      document.getElementById('preview-gate-error').style.display = 'block';
      document.getElementById('preview-gate-input').value = '';
    }
  });
  document.getElementById('preview-gate-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('preview-gate-btn').click();
  });
})();
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const KPI_KEY    = 'aperture_kpi';
const APP_KEY    = 'aperture_v1';

const MODEL_PRICING = {
  'claude-haiku-4-5-20251001': { input: 0.80,  output: 4.00 },
  'claude-sonnet-4-6':         { input: 3.00,  output: 15.00 },
};

// Pre-optimisation baseline (manual entry — what each call cost before)
const BASELINE = {
  person_research:  { model: 'claude-sonnet-4-6', avgInput: 420, avgOutput: 580, maxTokens: 1800 },
  company_research: { model: 'claude-sonnet-4-6', avgInput: 580, avgOutput: 820, maxTokens: 2400 },
  interview_prep:   { model: 'claude-sonnet-4-6', avgInput: 540, avgOutput: 760, maxTokens: 2800 },
  smb_pitch:        { model: 'claude-sonnet-4-6', avgInput: 310, avgOutput: 220, maxTokens: 800  },
  networking:       { model: 'claude-sonnet-4-6', avgInput: 340, avgOutput: 260, maxTokens: 900  },
  job_search:       { model: 'claude-haiku-4-5-20251001', avgInput: 320, avgOutput: 680, maxTokens: 2500 },
  top_5_jobs:       { model: 'claude-haiku-4-5-20251001', avgInput: 240, avgOutput: 480, maxTokens: 1800 },
  signal_feed:      { model: 'claude-haiku-4-5-20251001', avgInput: 280, avgOutput: 180, maxTokens: 700  },
};

function calcCost(model, inp, out) {
  const p = MODEL_PRICING[model] || { input: 3.00, output: 15.00 };
  return (inp * p.input + out * p.output) / 1_000_000;
}

function fmtCost(c) {
  if (c < 0.001) return `$${(c * 1000).toFixed(3)}m`;
  return `$${c.toFixed(4)}`;
}

function fmtMs(ms) {
  if (!ms) return '—';
  return ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
}

function detectEnv() {
  const h = window.location.hostname;
  if (!h || h === 'localhost' || h === '127.0.0.1') return { label: 'LOCAL', cls: 'env-local', branch: 'dev (local)' };
  if (h.includes('preview--')) return { label: 'PREVIEW', cls: 'env-preview', branch: 'preview' };
  if (h.includes('dev--'))     return { label: 'DEV',     cls: 'env-dev',     branch: 'dev' };
  return { label: 'PRODUCTION', cls: 'env-public', branch: 'public' };
}

const ENV_URLS = {
  production: 'https://career-aperture-pcl.netlify.app',
  preview:    'https://preview--career-aperture-pcl.netlify.app',
  dev:        'https://dev--career-aperture-pcl.netlify.app',
};

// Benchmark test cases — standardised across all environments
const BENCH_CASES = [
  {
    id: 'person_known',

    user: 'Research Satya Nadella at Microsoft.',
    requiredFields: ['name','company','title','background','matchScore','sources'],
    checks: ['sources', 'no_fabrication', 'null_handling'],
  },
  {
    id: 'person_obscure',
    name: 'Person — obscure (hallucination test)',
    callType: 'person_research',
    model: 'claude-haiku-4-5-20251001',
    maxTokens: 800,
    system: 'Research the named person. Return valid JSON only: {"name":"full name","company":"company or null","title":"title or null","background":"2-3 sentences or null","matchScore":"integer 1-10","researchNote":"data freshness caveat","sources":[{"label":"source","url":"URL or null"}]}\nGUARDRAILS: Use null for unverifiable fields. Never fabricate. If person not publicly known, populate name only and use null for everything else.',

    callType: 'company_research',

    user: 'Research Salesforce.',
    requiredFields: ['name','industry','stage','headcount','overview','competitors','sources'],
    checks: ['sources', 'completeness', 'no_fabrication'],
  },
  {
    id: 'format_validity',
    name: 'Format — JSON strict compliance',
    callType: 'person_research',
    model: 'claude-haiku-4-5-20251001',
    maxTokens: 600,
    system: 'Return valid JSON only — no markdown fences, no prose, no explanation: {"status":"ok","echo":"repeat the word I give you exactly","ts":"current year only"}',
    user: 'The word is: LIGHTHOUSE',
    requiredFields: ['status','echo','ts'],
    checks: ['format_strict'],
  },
];

function scoreResult(result, testCase) {
  const flags = [];
  let completeness = 0;
  let hallucination_risk = 'LOW';

  // Field completeness
  const present = testCase.requiredFields.filter(f => result[f] !== undefined);
  completeness = Math.round((present.length / testCase.requiredFields.length) * 100);
  if (completeness < 100) flags.push(`Missing fields: ${testCase.requiredFields.filter(f => result[f] === undefined).join(', ')}`);

  // Sources check
  if (testCase.checks.includes('sources')) {
    const sources = result.sources || [];
    if (!sources.length) { flags.push('No sources returned'); hallucination_risk = 'MED'; }
    const fakeUrls = sources.filter(s => s.url && !s.url.startsWith('http'));
    if (fakeUrls.length) { flags.push(`Potentially invalid URL format (${fakeUrls.length})`); hallucination_risk = 'HIGH'; }
  }

  // Null handling for obscure test
  if (testCase.id === 'person_obscure') {
    const nonNull = ['company','title','background'].filter(f => result[f] !== null && result[f] !== undefined && result[f] !== '');
    if (nonNull.length > 0) { flags.push(`Fabrication risk: populated fields for unknown person (${nonNull.join(', ')})`); hallucination_risk = 'HIGH'; }
    else flags.push(null); // expected — good
  }

  // Format strict
  if (testCase.checks.includes('format_strict')) {
    if (result.echo !== 'LIGHTHOUSE') { flags.push(`Echo mismatch: expected LIGHTHOUSE, got ${result.echo}`); }
    if (result.status !== 'ok') { flags.push(`Status not "ok"`); }
  }

  const cleanFlags = flags.filter(Boolean);
  const verdict = cleanFlags.length === 0 ? 'PASS' : hallucination_risk === 'HIGH' ? 'FAIL' : 'CAUTION';

  return { completeness, hallucination_risk, flags: cleanFlags, verdict };
}

// ── Donut/ring chart ─────────────────────────────────────────────────────────
function Donut({ pct, color, size = 64, stroke = 6 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} className="score-ring" style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(240,238,248,.08)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
      <text x={size/2} y={size/2+4} textAnchor="middle" fill={color}
        style={{transform:`rotate(90deg) translate(0,-${size}px)`,fontSize:12,fontFamily:'JetBrains Mono',fontWeight:500,transformOrigin:`${size/2}px ${size/2}px`}}>
        {pct}%
      </text>
    </svg>
  );
}

  // Cost by type
  const byType = {};
  calls.forEach(c => {
    if (!byType[c.callType]) byType[c.callType] = { count:0, cost:0, tokens:0 };
    byType[c.callType].count++;
    byType[c.callType].cost += c.cost || 0;
    byType[c.callType].tokens += (c.inputTokens||0)+(c.outputTokens||0);
  });

  // Drift: compare current avg cost vs baseline
  const driftRows = Object.entries(BASELINE).map(([type, base]) => {
    const baseCost = calcCost(base.model, base.avgInput, base.avgOutput);
    const cur = byType[type];
    const curCost = cur ? cur.cost / cur.count : null;
    const delta = curCost !== null ? ((curCost - baseCost) / baseCost * 100) : null;
    return { type, baseCost, curCost, delta, count: cur?.count || 0 };
  });

  const totalBaselineCost = driftRows.reduce((s,r) => s + r.baseCost, 0);
  const totalCurrentCost  = driftRows.filter(r=>r.curCost).reduce((s,r) => s + r.curCost, 0);

  async function runBenchmark() {
    if (!apiKey) { alert('Enter your Anthropic API key first.'); return; }
    setBenchRunning(true);
    setBenchResults([]);
    const results = [];
    for (const tc of BENCH_CASES) {
      const t0 = Date.now();
      let parsed = null, inputTokens = 0, outputTokens = 0, error = null;
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method:'POST',
          headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:tc.model,max_tokens:tc.maxTokens,system:tc.system,messages:[{role:'user',content:tc.user}]}),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        inputTokens  = data.usage?.input_tokens  || 0;
        outputTokens = data.usage?.output_tokens || 0;
        parsed = JSON.parse(data.content[0].text.trim());
      } catch(e) { error = e.message; }
      const durationMs = Date.now() - t0;
      const cost = calcCost(tc.model, inputTokens, outputTokens);
      const score = parsed ? scoreResult(parsed, tc) : { verdict:'FAIL', flags:[error || 'Parse failed'], completeness:0, hallucination_risk:'HIGH' };
      results.push({ ...tc, parsed, inputTokens, outputTokens, durationMs, cost, score, error });
      setBenchResults([...results]);
    }
    setBenchRunning(false);
    // Store benchmark run
    try {
      const raw = localStorage.getItem(KPI_KEY);
      const kpi = raw ? JSON.parse(raw) : { calls:[] };
      const bench_history = kpi.bench_history || [];

                <div className="card">
                  <div style={{display:'grid',gridTemplateColumns:'130px 60px 80px 80px 55px 40px',gap:8,fontFamily:'var(--mono)',fontSize:9,color:'var(--muted-2)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
                    <span>Type</span><span>Model</span><span style={{textAlign:'right'}}>Cost</span><span style={{textAlign:'right'}}>Tokens</span><span style={{textAlign:'right'}}>Time</span><span style={{textAlign:'center'}}>OK</span>
                  </div>
                  <div style={{maxHeight:480,overflowY:'auto'}}>
                    {calls.map((c,i) => (
                      <div className="hist-row" key={i}>
                        <div className="hist-type">{(c.callType||'unknown').replace(/_/g,' ')}</div>
                        <div className="hist-model">
                          <span className={`tag ${c.model?.includes('haiku')?'tag-haiku':'tag-sonnet'}`} style={{fontSize:8}}>
                            {c.model?.includes('haiku')?'HK':'SN'}
                          </span>
                        </div>
                        <div className="hist-cost">{fmtCost(c.cost||0)}</div>
                        <div className="hist-tokens">{((c.inputTokens||0)+(c.outputTokens||0)).toLocaleString()}</div>
                        <div className="hist-dur">{fmtMs(c.durationMs)}</div>
                        <div className="hist-status" style={{color:c.success?'var(--green)':'var(--red)'}}>{c.success?'✓':'✗'}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )
            }
          </div>
        </>
      )}

      {/* ── VERIFY ── */}
      {tab === 'verify' && (
        <>
          <div className="section">
            <div className="section-title">Manual Verification · Paste Any Research Output</div>
            <div className="card" style={{marginBottom:12}}>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:14,lineHeight:1.7}}>
                Paste any Career Aperture JSON output. A verification pass checks for hallucination risk, source legitimacy, fabricated data, and internal consistency — scored PASS / CAUTION / FAIL.
              </div>
              <textarea rows={8} value={verifyInput} onChange={e => setVerifyInput(e.target.value)}
                placeholder='{"name":"...","company":"...","sources":[...]}' />
              <div style={{marginTop:10,display:'flex',gap:10,alignItems:'center'}}>
                <button className="btn btn-primary" onClick={runVerify} disabled={verifyRunning || !apiKey || !verifyInput.trim()}>
                  {verifyRunning ? 'Verifying…' : '🔍 Verify Output'}
                </button>
                {!apiKey && <span style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--mono)'}}>Enter API key in header</span>}
              </div>
            </div>

            {verifyResult && (
              <div className="verify-output">
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <span className={`tag tag-${verifyResult.verdict==='PASS'?'pass':verifyResult.verdict==='CAUTION'?'caution':'fail'}`} style={{fontSize:11,padding:'4px 12px'}}>
                    {verifyResult.verdict}
                  </span>
                  <span style={{fontSize:11,color:'var(--text)'}}>{verifyResult.summary}</span>
                </div>
                {verifyResult.hallucination_flags?.length > 0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9,color:'var(--muted-2)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:6}}>Hallucination Flags</div>
                    {verifyResult.hallucination_flags.map((f,i) => <div key={i} className="flag" style={{display:'inline-block',marginRight:6,marginBottom:4}}>{f}</div>)}
                  </div>
                )}
                {verifyResult.source_flags?.length > 0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9,color:'var(--muted-2)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:6}}>Source Flags</div>
                    {verifyResult.source_flags.map((f,i) => <div key={i} className="flag" style={{display:'inline-block',marginRight:6,marginBottom:4}}>{f}</div>)}
                  </div>
                )}
                {verifyResult.consistency_flags?.length > 0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9,color:'var(--muted-2)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:6}}>Consistency Flags</div>
                    {verifyResult.consistency_flags.map((f,i) => <div key={i} className="flag" style={{display:'inline-block',marginRight:6,marginBottom:4}}>{f}</div>)}
                  </div>
                )}
                {verifyResult.recommendation && (
                  <div style={{marginTop:10,fontSize:11,color:'var(--muted)',borderTop:'1px solid var(--border)',paddingTop:10}}>
                    <span style={{color:'var(--accent)'}}>→ </span>{verifyResult.recommendation}
                  </div>
                )}
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
<script>
(function(){
  var outer = document.getElementById('cur-outer');
  if (!outer) return;
  var thinking = false, thinkT = null;
  document.addEventListener('mousemove', function(e) {
    outer.style.left = e.clientX + 'px'; outer.style.top = e.clientY + 'px';
  });
  document.addEventListener('mouseover', function(e) {
    var active = e.target.closest('button, a, input, select, textarea, label, [role="button"]');
    document.body.classList.toggle('cur-hovering', !!active);
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('button, a')) return;
    document.body.classList.add('cur-thinking');
    thinking = true;
    if (thinkT) clearTimeout(thinkT);
    thinkT = setTimeout(function() {
      if (!document.querySelector('.spinner, .loading-row')) {
        document.body.classList.remove('cur-thinking');
        thinking = false;
      }
    }, 500);
  });
  document.addEventListener('mouseleave', function() { outer.style.opacity = '0'; });
  document.addEventListener('mouseenter', function() { outer.style.opacity = '1'; });
})();
</script>
</body>
</html>
