<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Aperture — Career Intelligence · Perez Creative Labs</title>
  <meta name="description" content="Career Aperture — AI-powered career intelligence for job seekers and SMB prospecting. A Perez Creative Labs product." />
  <meta property="og:title" content="Career Aperture — Career Intelligence" />
  <meta property="og:description" content="Your background is the intelligence. Set your context once — every search, brief, and outreach runs on it." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" integrity="sha384-aGlMNK3U/x0wl4lEH5jD1PGhJlX9hApuPmIiA5gtiYCOQ1J8ejIdC0btaU/TMoBD" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --bg:          #09080A;
      --bg-2:        #100F0C;
      --bg-card:     #16140E;
      --border:      rgba(245,240,232,.08);
      --border-gold: rgba(201,168,76,.24);
      --text:        #EDE5D5;
      --muted:       rgba(237,229,213,.55);
      --muted-2:     rgba(237,229,213,.32);
      --accent:      #C9A84C;
      --accent-dim:  rgba(201,168,76,.10);
      --accent-bdr:  rgba(201,168,76,.30);
      --violet:      #3D1A88;
      --magenta:     #8B2BBE;
      --crimson:     #D01878;
      --ember:       #E86020;
      --gradient:    linear-gradient(90deg,#3D1A88,#8B2BBE,#D01878,#E86020,#C9A84C);
      --mono:        'JetBrains Mono', monospace;
      --sans:        -apple-system, 'Helvetica Neue', sans-serif;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(61,26,136,.14) 0%, transparent 42%),
        radial-gradient(ellipse at 100% 100%, rgba(208,24,120,.07) 0%, transparent 38%);
      color: var(--text);
      font-size: 15px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 230px;
      flex-shrink: 0;
      background: rgba(18,14,36,.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid rgba(240,238,248,.07);
      display: flex;
      flex-direction: column;
      padding: 0 0 16px;
    }
    .sidebar-gradient-bar {
      height: 2px;
      background: var(--gradient);
      opacity: .85;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(201,168,76,.28);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 18px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .logo-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 15px;
      font-family: var(--mono);
      background: linear-gradient(90deg,#B07AE8,#E84CA0,#C9A84C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      letter-spacing: .06em;
      font-weight: 500;
    }
    .logo-sub { font-size: 9px; color: var(--muted-2); font-family: var(--mono); letter-spacing: .32em; text-transform: uppercase; }
    .nav-section { padding: 4px 10px; flex: 1; }
    .nav-label {
      font-size: 9px; font-weight: 500; color: rgba(201,168,76,.55);
      letter-spacing: .38em; text-transform: uppercase; padding: 14px 8px 6px;
      font-family: var(--mono);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,.15); }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: .04em;
      color: var(--muted);
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover { background: rgba(201,168,76,.06); color: var(--text); }
    .nav-btn.active { background: rgba(201,168,76,.10); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 8px; box-shadow: inset 0 0 18px rgba(201,168,76,.04); }
    .nav-icon { display: flex; align-items: center; justify-content: center; width: 18px; flex-shrink: 0; opacity: 0.8; }
    .sidebar-footer { padding: 12px 10px 0; border-top: 1px solid var(--border); }
    .settings-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      text-align: left;
    }
    .settings-btn:hover { background: rgba(201,168,76,.06); color: var(--text); }

    /* Main */
    .main { flex: 1; overflow-y: auto; padding: 32px 36px; background: var(--bg); position: relative; }
    .main::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.014) 3px,
        rgba(0,0,0,.014) 4px
      );
      pointer-events: none;
      z-index: 9997;
    }
    .page-header { margin-bottom: 28px; }
    .page-title {
      font-size: 22px;
      font-weight: normal;
      font-style: italic;
      color: var(--text);
      margin-bottom: 5px;
      font-family: Georgia, serif;
      text-shadow: 0 0 28px rgba(240,238,248,.12);
    }
    .page-sub { font-size: 10px; color: rgba(201,168,76,.6); font-family: var(--mono); letter-spacing: .28em; text-transform: uppercase; }

    /* Cards */
    .card {
      background: rgba(22,17,40,.82);
      border: 1px solid rgba(201,168,76,.07);
      border-top: 1px solid rgba(201,168,76,.16);
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 1px 0 0 rgba(240,238,248,.04) inset, 0 8px 28px rgba(0,0,0,.22);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: rgba(240,238,248,.11);
      border-top-color: rgba(240,238,248,.22);
    }
    .card-title {
      font-size: 9px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .32em;
      font-family: var(--mono);
    }

    /* Chips */
    .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: .04em;
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover { border-color: var(--accent-bdr); color: var(--accent); }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #09080A;
      font-weight: 500;
      box-shadow: 0 0 10px rgba(201,168,76,.25);
    }

    /* Form elements */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 9px;
      font-weight: 500;
      color: var(--muted-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .22em;
      font-family: var(--mono);
    }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: var(--bg-2);
      transition: border-color 0.15s;
      font-family: Georgia, serif;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: rgba(201,168,76,.45);
      box-shadow: 0 0 0 3px rgba(201,168,76,.07), 0 0 14px rgba(201,168,76,.07);
    }
    .field input::placeholder { color: var(--muted-2); font-family: var(--mono); font-size: 12px; }
    .field textarea { resize: vertical; min-height: 70px; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 12px; color: var(--muted); font-family: var(--mono); letter-spacing: .04em; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(240,238,248,.12);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #09080A; }

    /* URL output */
    .url-box { margin-top: 12px; }
    .url-box-label { font-size: 9px; font-weight: 500; color: var(--muted-2); letter-spacing: .22em; text-transform: uppercase; margin-bottom: 6px; font-family: var(--mono); }
    .url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(14,10,28,.7);
      border: 1px solid rgba(201,168,76,.22);
      border-top: 1px solid rgba(201,168,76,.36);
      border-radius: 9px;
      padding: 10px 12px;
      box-shadow: 0 0 10px rgba(201,168,76,.04) inset;
    }
    .url-text {
      flex: 1;
      font-size: 10px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--mono);
      letter-spacing: .02em;
    }
    .url-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: linear-gradient(90deg, var(--violet), var(--crimson)); color: #F0EEF8; box-shadow: 0 0 18px rgba(61,26,136,.35), 0 2px 8px rgba(0,0,0,.4); font-family: var(--sans); letter-spacing: .04em; text-transform: none; }
    .btn-primary:hover { background: linear-gradient(90deg, #4d22a8, #e01e88); box-shadow: 0 0 28px rgba(61,26,136,.5), 0 2px 8px rgba(0,0,0,.4); }
    .btn-secondary { background: rgba(240,238,248,.03); color: var(--muted); border: 1px solid rgba(240,238,248,.1); backdrop-filter: blur(4px); }
    .btn-secondary:hover { border-color: var(--accent-bdr); color: var(--accent); background: rgba(201,168,76,.05); }
    .btn-sm { padding: 4px 10px; font-size: 10px; }
    .btn-icon { padding: 5px 8px; }
    .btn-danger { background: rgba(208,24,120,0.10); color: rgba(208,24,120,.85); border: 1px solid rgba(208,24,120,.25); }
    .btn-danger:hover { background: rgba(208,24,120,0.18); }

    /* Dossier output */
    .dossier-card {
      background: rgba(22,17,40,.88);
      border: 1px solid rgba(201,168,76,.16);
      border-top: 1px solid rgba(201,168,76,.32);
      border-radius: 12px;
      padding: 22px 24px;
      margin-top: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 0 0 1px rgba(201,168,76,.04) inset, 0 12px 40px rgba(0,0,0,.28);
    }
    .dossier-name { font-size: 18px; font-weight: normal; font-style: italic; color: var(--text); font-family: Georgia, serif; }
    .dossier-meta { font-size: 10px; color: var(--muted); margin-bottom: 16px; font-family: var(--mono); letter-spacing: .08em; }
    .dossier-section { margin-bottom: 14px; }
    .dossier-section-title { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .28em; color: var(--accent); margin-bottom: 6px; font-family: var(--mono); }
    .dossier-text { font-size: 13px; color: var(--muted); line-height: 1.75; font-family: Georgia, serif; }
    .dm-box {
      background: rgba(61,26,136,.14);
      border: 1px solid rgba(139,43,190,.25);
      border-left: 2px solid var(--magenta);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.75;
      font-family: Georgia, serif;
      white-space: pre-wrap;
    }
    .research-note { font-size: 10px; color: var(--muted-2); font-style: italic; margin-top: 8px; font-family: var(--mono); }

    /* Watch list */
    .watch-table { width: 100%; border-collapse: collapse; }
    .watch-table th { text-align: left; font-size: 9px; font-weight: 500; color: var(--muted-2); text-transform: uppercase; letter-spacing: .2em; padding: 6px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
    .watch-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; color: var(--text); font-family: Georgia, serif; }
    .watch-table tr:last-child td { border-bottom: none; }
    .tier-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .tier-1 { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-bdr); }
    .tier-2 { background: rgba(139,43,190,.10); color: rgba(200,140,255,.85); border: 1px solid rgba(139,43,190,.28); }
    .tier-3 { background: rgba(240,238,248,.04); color: var(--muted); border: 1px solid var(--border); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal {
      background: rgba(22,17,40,.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(240,238,248,.1);
      border-top: 1px solid rgba(240,238,248,.2);
      border-radius: 14px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(240,238,248,.04) inset;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: normal; font-style: italic; color: var(--text); font-family: Georgia, serif; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted); padding: 2px 6px; border-radius: 6px; line-height: 1; }
    .close-btn:hover { color: var(--text); }

    /* Edge meter */
    .edge-meter { margin-top: 8px; }
    .edge-bar-track { height: 2px; background: rgba(240,238,248,.10); border-radius: 1px; overflow: hidden; }
    .edge-bar-fill { height: 100%; border-radius: 1px; transition: width 0.3s, background 0.3s; }
    .edge-score-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted-2); margin-top: 4px; font-family: var(--mono); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(22,17,40,.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(201,168,76,.35);
      border-top: 1px solid rgba(201,168,76,.55);
      color: var(--accent);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      z-index: 200;
      animation: slideUp 0.2s ease;
      box-shadow: 0 0 20px rgba(201,168,76,.18), 0 4px 20px rgba(0,0,0,.45);
    }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Loading */
    .loading-row { display: flex; align-items: center; gap: 10px; padding: 16px 0; color: var(--muted); font-size: 12px; font-family: var(--mono); }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(240,238,248,.10);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Misc */
    .section-gap { margin-bottom: 20px; }
    .api-key-note { font-size: 10px; color: var(--muted-2); margin-top: 5px; font-family: var(--mono); letter-spacing: .04em; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted-2); font-size: 13px; font-family: Georgia, serif; font-style: italic; }
    .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-row input { flex: 1; }
    .error-msg { color: rgba(208,24,120,.9); font-size: 12px; margin-top: 6px; background: rgba(208,24,120,.08); padding: 9px 12px; border-radius: 8px; border: 1px solid rgba(208,24,120,.22); font-family: var(--mono); font-size: 11px; }
    .separator { height: 1px; background: var(--border); margin: 16px 0; }
    .keyword-input-row input { font-family: Georgia, serif !important; }

    /* Select dropdown */
    select option { background: #18142C; color: #F0EEF8; }
    select { -webkit-appearance: none; appearance: none; }
    .keyword-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .keyword-input-row input { flex: 1; }

    /* Role selector dropdown */
    .role-selector { position: relative; }
    .role-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 9px 12px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: .04em;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
    }
    .role-trigger:hover, .role-trigger.open { border-color: var(--accent-bdr); color: var(--text); }
    .role-trigger .caret { font-size: 9px; color: var(--muted-2); transition: transform 0.15s; }
    .role-trigger.open .caret { transform: rotate(180deg); }
    .role-panel {
      position: absolute;
      z-index: 100;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: rgba(22,17,40,.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(201,168,76,.28);
      border-top: 1px solid rgba(201,168,76,.45);
      border-radius: 12px;
      padding: 8px 0;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: 0 12px 32px rgba(0,0,0,.6), 0 0 16px rgba(201,168,76,.06);
    }
    .role-group-hdr {
      font-size: 8px;
      font-family: var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 8px 14px 4px;
      font-weight: 500;
    }
    .role-group-hdr.other { color: var(--muted-2); margin-top: 4px; border-top: 1px solid var(--border); padding-top: 10px; }
    .role-option {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .role-option:hover { background: rgba(201,168,76,.06); color: var(--text); }
    .role-option input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }

  'claude-sonnet-4-6':         { input: 3.00, output: 15.00 },
};

function calcCost(model, inputTokens, outputTokens) {
  const p = MODEL_PRICING[model] || { input: 3.00, output: 15.00 };
  return (inputTokens * p.input + outputTokens * p.output) / 1_000_000;
}

// ── Owner token helper ───────────────────────────────────────────────────────
function ownerHash(name) {
  return btoa(unescape(encodeURIComponent((name || '').toLowerCase().trim())));
}

// ── Calendar ─────────────────────────────────────────────────────────────────
const CALENDAR_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

// ── Multi-provider AI helper ─────────────────────────────────────────────────
function detectProvider(key) {
  if (!key) return null;
  if (key.startsWith('sk-ant-')) return 'anthropic';
  if (key.startsWith('sk-')) return 'openai';
  if (key.startsWith('AIzaSy')) return 'google';
  return 'anthropic';
}

function classifyCalendarEvent(event) {
  const text = ((event.summary || '') + ' ' + (event.description || '') + ' ' + ((event.attendees || []).map(a => a.email).join(' '))).toLowerCase();
  if (/interview|phone screen|technical screen|hiring|onsite|coding.*challenge|take.home|recruiter.*call|call.*recruiter/.test(text))
    return { type: 'Interview', board: 'jobs', col: 'screen', icon: '🎯' };
  if (/career coach|coaching session|lhh|outplacement|job.*coach|coach.*session/.test(text))
    return { type: 'Career Coaching', board: 'jobs', col: 'watching', icon: '🧭' };
  if (/coffee chat|informational|intro call|networking|connect with|meet.*about.*role|linkedin.*connect|referral/.test(text))
    return { type: 'Networking', board: 'jobs', col: 'watching', icon: '🤝' };
  if (/prospect|smb|small business|client.*call|discovery call|demo.*call|proposal|sales.*call|business.*development|new.*client/.test(text))
    return { type: 'SMB Development', board: 'smb', col: 'outreach', icon: '📈' };
  if (/follow.up|check.in|status.*update|hiring.*manager|talent.*partner|hr.*call/.test(text))
    return { type: 'Interview Follow-up', board: 'jobs', col: 'screen', icon: '📞' };
  return null;
}

async function callAI(apiKey, prompt, maxTokens = 1000) {
  const provider = detectProvider(apiKey);
  const stored = load();
  if (stored?.ownerToken) {
    const profile = stored.profile;
    if (stored.ownerToken !== ownerHash(profile?.name)) {
      throw new Error('API key is profile-locked. Open Settings and verify your profile to use AI features.');
    }
  }
  if (provider === 'openai') {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.choices[0].message.content.trim();
  } else {
    // Anthropic (default)
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text.trim();
  }
}

function trackCall({ callType, model, inputTokens, outputTokens, durationMs, success, error }) {
  try {
    const cost = calcCost(model, inputTokens || 0, outputTokens || 0);
    const entry = {
      ts: Date.now(),
      callType,
      model,
      inputTokens: inputTokens || 0,
      outputTokens: outputTokens || 0,
      cost,
      durationMs,
      success,
      error: error || null,
    };
    const raw = localStorage.getItem(KPI_KEY);
    const kpi = raw ? JSON.parse(raw) : { calls: [] };
    kpi.calls = [entry, ...(kpi.calls || [])].slice(0, 500); // keep last 500
    localStorage.setItem(KPI_KEY, JSON.stringify(kpi));
  } catch(e) {}
}

function quoteIfPhrase(term) {
  const t = term.trim();
  return t.includes(' ') && !t.startsWith('"') ? `"${t}"` : t;
}

function buildJobURL({ roles, mustKeywords, optKeywords, customKeyword, location, locationRadius, dateRange, expLevels, workplaceTypes, jobTypes, networkOnly }) {
  const roleTerms = roles.map(quoteIfPhrase);
  const optTerms  = [...(optKeywords || []).map(quoteIfPhrase), customKeyword ? quoteIfPhrase(customKeyword) : null].filter(Boolean);
  const mustTerms = (mustKeywords || []).map(quoteIfPhrase);

  const orPart = [...roleTerms, ...optTerms];
  let keywordStr = '';
  if (orPart.length > 0 && mustTerms.length > 0) {
    keywordStr = `(${orPart.join(' OR ')}) AND ${mustTerms.join(' AND ')}`;
  } else if (orPart.length > 0) {
    keywordStr = orPart.join(' OR ');
  } else {
    keywordStr = mustTerms.join(' AND ');
  }

  const params = new URLSearchParams();
  params.set('keywords', keywordStr);
  if (location) params.set('location', location);
  if (locationRadius && location && location !== 'United States') params.set('distance', locationRadius);
  if (dateRange) params.set('f_TPR', dateRange);
  if (expLevels.length) params.set('f_E', expLevels.join(','));
  if (workplaceTypes.length) params.set('f_WT', workplaceTypes.join(','));
  if (jobTypes && jobTypes.length) params.set('f_JT', jobTypes.join(','));
  if (networkOnly) params.set('f_JIYN', 'true');

  return `https://www.linkedin.com/jobs/search/?${params.toString()}`;
}

function buildLaddersURL({ roles, mustKeywords, optKeywords, customKeyword, location }) {
  const terms = [
    ...roles,
    ...(mustKeywords || []),
    ...(optKeywords || []),
    customKeyword ? customKeyword.trim() : null,
  ].filter(Boolean);

  const params = new URLSearchParams();
  params.set('searchKeywords', terms.join(' '));
  if (location && location !== 'United States') params.set('locationName', location);
  params.set('radius', '50');

  return `https://www.theladders.com/jobs/search-jobs?${params.toString()}`;
}

function buildPeopleURLs(company, contactRole) {
  const roleQ = contactRole ? quoteIfPhrase(contactRole) : '';

  // 1st/2nd degree LinkedIn
  const liParams = new URLSearchParams();
  liParams.set('keywords', roleQ || 'product');
  liParams.set('facetCurrentCompany', `["${company}"]`);
  liParams.set('facetNetwork', '["F","S"]');
  const linkedin = `https://www.linkedin.com/search/results/people/?${liParams.toString()}`;

  // Google X-ray
  const xrayQ = [
    `site:linkedin.com/in`,
    `"${company}"`,
    roleQ,
  ].filter(Boolean).join(' ');
  const xray = `https://www.google.com/search?q=${encodeURIComponent(xrayQ)}`;

  // Open network LinkedIn
  const openParams = new URLSearchParams();
  openParams.set('keywords', [quoteIfPhrase(company), roleQ].filter(Boolean).join(' '));
  openParams.set('facetNetwork', '["O"]');
  const open = `https://www.linkedin.com/search/results/people/?${openParams.toString()}`;

  return { linkedin, xray, open };
}

function scoreEdge(text) {
  if (!text || text.length < 20) return 0;
  const abstractNouns = ['passion', 'passionate', 'innovative', 'innovation', 'strategic', 'impact', 'driven', 'enthusiastic', 'excellence', 'synergy', 'leverage', 'transformative'];
  const words = text.toLowerCase().split(/\s+/);
  let score = 50;
  // Penalise abstract nouns
  abstractNouns.forEach(w => { if (words.includes(w)) score -= 10; });
  // Reward numbers/metrics
  const numbers = (text.match(/\d+/g) || []).length;
  score += Math.min(numbers * 6, 24);
  // Reward named proper nouns (words starting with capital not at sentence start)
  const properNouns = (text.match(/(?<=[a-z\s])[A-Z][a-z]+/g) || []).length;
  score += Math.min(properNouns * 4, 20);
  // Reward length up to a point
  score += Math.min(Math.floor(text.length / 60), 10);
  return Math.max(0, Math.min(100, score));
}

function persist(data) {
  try {
    const out = { ...data };
    if (out.apiKey && out.profile?.name) {
      out.ownerToken = ownerHash(out.profile.name);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

// One-time migration: carry forward data from prior key versions
(function migrateStorage() {
  const OLD_KEYS = ['dp_aperture_v1', 'dp_cold_open_v1'];
  try {
    OLD_KEYS.forEach(function(oldKey) {
      if (!localStorage.getItem(STORAGE_KEY) && localStorage.getItem(oldKey)) {
        localStorage.setItem(STORAGE_KEY, localStorage.getItem(oldKey));
        localStorage.removeItem(oldKey);
      }
    });
  } catch(e) {}
})();

function haversineMi(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

      (pos) => {
        const { latitude, longitude } = pos.coords;
        // Find all GEO_CITIES within 25mi, sorted by distance
        const nearby = GEO_CITIES
          .filter(c => c.lat !== null)
          .map(c => ({ ...c, dist: Math.round(haversineMi(latitude, longitude, c.lat, c.lon)) }))
          .filter(c => c.dist <= 25)
          .sort((a, b) => a.dist - b.dist);
        // Always include Remote + United States at end
        const special = GEO_CITIES.filter(c => c.lat === null);
        setNearbyLocations([...nearby, ...special]);
        setGeoDetected(true);
        // Auto-select the closest city if nothing selected yet
        if (selectedLocations.length === 0 && nearby.length > 0) {
          setSelectedLocations([nearby[0].label]);
        }
        setGeoLoading(false);
        setLocPanelOpen(true);
        // Mark as asked so we never auto-prompt again
        const stored = load() || {};
        persist({ ...stored, jobSearch: { ...(stored.jobSearch || {}), geoAsked: true } });
      },
      () => {
        setGeoLoading(false);
        setGeoDetected(false);
        // Mark as asked even on denial/error so we don't re-prompt on reload
        const stored = load() || {};
        persist({ ...stored, jobSearch: { ...(stored.jobSearch || {}), geoAsked: true } });
      },
      { timeout: 8000 }
    );
  }

  // Filtered list for the dropdown (when no geo, show all; when geo, show nearby)
  const locListBase = geoDetected ? nearbyLocations : GEO_CITIES;
  const locListFiltered = locSearch.trim()
    ? GEO_CITIES.filter(c => c.label.toLowerCase().includes(locSearch.toLowerCase()))
    : locListBase;

  function toggleLocation(label) {
    setSelectedLocations(prev =>
      prev.includes(label) ? prev.filter(l => l !== label) : [...prev, label]
    );
  }

  // Auto-detect on first load if nothing saved
  React.useEffect(() => {

    const hasSaved = saved && saved.jobSearch && (saved.jobSearch.selectedLocations || saved.jobSearch.locationCity);
    const geoAsked = saved && saved.jobSearch && saved.jobSearch.geoAsked;
    if (!hasSaved && !geoAsked) detectLocation();
  }, []);

  // Close location panel on outside click
  const locPanelRef = React.useRef(null);
  React.useEffect(() => {
    if (!locPanelOpen) return;

  }, [locPanelOpen]);

  const [workplaceTypes, setWorkplaceTypes] = useState(() => {

    return saved && saved.jobSearch ? (saved.jobSearch.workplaceTypes || []) : [];

  const [jobTypes, setJobTypes] = useState(() => {

    return saved && saved.jobSearch ? (saved.jobSearch.jobTypes || []) : [];

  const [networkOnly, setNetworkOnly] = useState(() => {

  useEffect(() => {

    const name = newEngineName.trim();

    setNewEngineUrl('');

  function removeCustomEngine(id) {
    setCustomEngines(prev => prev.filter(e => e.id !== id));
  }
  function buildCustomUrl(template) {
    // Replace {{keywords}} with the built keyword string
    const kw = [...selectedRoles, ...mustKeywords, ...optKeywords].join(' ');
    return template.replace(/\{\{keywords\}\}/g, encodeURIComponent(kw));
  }

  // Persist job search state on every change
  useEffect(() => {
    const stored = load() || {};

  }, [selectedRoles, mustKeywords, optKeywords, selectedLocations, locationRadius, dateRange, expLevels, workplaceTypes, jobTypes, networkOnly]);

  // Persist saved searches
  useEffect(() => {
    const stored = load() || {};

    setArr(arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);

  // Build one URL set per selected location
  const locationUrls = effectiveLocations.map(loc => ({
    loc,

  // Keep single url/laddersUrl for legacy references
  const url = locationUrls[0]?.linkedIn || '';
  const laddersUrl = locationUrls[0]?.ladders || '';
  const hasTerms = selectedRoles.length > 0 || mustKeywords.length > 0 || optKeywords.length > 0;

  async function runJobSearch() {
    const apiKey = load()?.apiKey;
    if (!apiKey) { setSearchError('Set your Anthropic API key in Settings first.'); return; }
    setSearching(true);
    setSearchError(null);
    setSearchResults([]);
    setAddedCards({});

    const criteria = [
      selectedRoles.length > 0    ? `Roles: ${selectedRoles.join(', ')}` : null,
      mustKeywords.length > 0     ? `Required keywords: ${mustKeywords.join(', ')}` : null,
      optKeywords.length > 0      ? `Preferred keywords: ${optKeywords.join(', ')}` : null,
      selectedLocations.length > 0 ? `Locations: ${selectedLocations.join(', ')}` : null,
      expLevels.length > 0        ? `Experience level: ${expLevels.join(', ')}` : null,
      workplaceTypes.length > 0   ? `Workplace type: ${workplaceTypes.join(', ')}` : null,
      jobTypes.length > 0         ? `Job type: ${jobTypes.join(', ')}` : null,
      dateRange                   ? `Posted within: ${dateRange}` : null,
    ].filter(Boolean).join('\n');

    const prompt = `You are a job search assistant. Generate 8 realistic job listings that match this search criteria. These should reflect roles you'd actually find on LinkedIn or similar boards today.

${criteria}

Return ONLY a valid JSON array with exactly 8 objects. No markdown, no explanation, no code fences — just the raw JSON array. Each object must have these exact keys:
- "title": job title string
- "company": realistic company name string
- "location": city/state or "Remote" string
- "type": one of "Full-time", "Part-time", "Contract", "Temporary"
- "level": one of "Senior", "Mid-Level", "Director", "VP", "Principal", "Staff", "Manager"
- "posted": string like "Today", "2 days ago", "1 week ago", "3 weeks ago"
- "salary": realistic range string like "$140,000 – $175,000/yr" or "Competitive"
- "snippet": 1-2 sentence job description excerpt, max 180 characters
- "linkedinUrl": a realistic LinkedIn jobs search URL`;

    try {
      if (demoMode) {
        setSearchResults(DEMO_DATA.topJobs.concat([
          { title:'Head of AI Product', company:'Veeva Systems', location:'Remote', type:'Full-time', level:'Director', posted:'2 weeks ago', salary:'$195,000 – $235,000/yr', snippet:'Lead AI product for life sciences cloud used by 1,000+ pharma and biotech companies.', linkedinUrl:'https://www.linkedin.com/jobs/search/?keywords=Head+AI+Product&location=Remote' },
          { title:'Principal PM — Workforce AI', company:'Kronos/UKG', location:'Lowell, MA / Remote', type:'Full-time', level:'Principal', posted:'1 week ago', salary:'$160,000 – $190,000/yr', snippet:'Drive next-gen AI features for WFM and HCM platform serving 70,000+ organizations.', linkedinUrl:'https://www.linkedin.com/jobs/search/?keywords=Principal+PM+Workforce+AI' },
          { title:'Staff PM, Enterprise AI Platform', company:'Box', location:'Redwood City, CA / Remote', type:'Full-time', level:'Staff', posted:'4 days ago', salary:'$170,000 – $205,000/yr', snippet:'Own the AI platform product surface for Box\'s 100,000+ enterprise customers.', linkedinUrl:'https://www.linkedin.com/jobs/search/?keywords=Staff+PM+Enterprise+AI+Platform' },
        ]));
        setSearching(false);
        return;
      }
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1400,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content[0].text.trim();
      const jobs = JSON.parse(text);
      setSearchResults(Array.isArray(jobs) ? jobs : []);
    } catch (e) {
      setSearchError('Search failed — ' + e.message);
    } finally {
      setSearching(false);
    }
  }

  // General save-to-any-board-column helper (used by both Top 5 and Search Results)
  function saveToBoardCol(job, colId, colLabel, idx, addedCards, setAddedCards, idPfx) {

      setToast(`Already in ${colLabel}`); return false;
    }
    persist({ ...stored, kanban: { ...kanban, jobCards: { ...jobCards, [colId]: [{
      id: (idPfx || '') + Date.now() + idx,
      title: job.title, company: job.company,
      notes: [job.location, job.type, job.salary].filter(Boolean).join(' · ') + (job.snippet ? '\n\n' + job.snippet : ''),
      url: job.linkedinUrl || '', created: new Date().toISOString(),
    }, ...colArr] } } });
    setAddedCards(prev => ({ ...prev, [idx]: colLabel }));
    setToast(`${job.company} → ${colLabel}`);
    return true;
  }

  // Auto-fetch top 5 whenever core criteria change (debounced 2s)
  React.useEffect(() => {

    topDebounceRef.current = setTimeout(async () => {
      if (demoMode) {
        setTopJobs(DEMO_DATA.topJobs);
        setTopJobsLoading(false);
        return;
      }
      const apiKey = load()?.apiKey;
      if (!apiKey) return;
      setTopJobsLoading(true);
      setTopAddedCards({});
      const criteria = [
        selectedRoles.length > 0     ? `Roles: ${selectedRoles.join(', ')}` : null,
        mustKeywords.length > 0      ? `Required keywords: ${mustKeywords.join(', ')}` : null,
        optKeywords.length > 0       ? `Preferred keywords: ${optKeywords.join(', ')}` : null,
        selectedLocations.length > 0 ? `Locations: ${selectedLocations.join(', ')}` : null,
      ].filter(Boolean).join('\n');
      const prompt = `You are a job search assistant. Generate the top 5 best-fit job listings for this search. These should be the most relevant, high-quality matches.

${criteria}

Return ONLY a valid JSON array of exactly 5 objects, no markdown, no explanation. Each object:
- "title": job title
- "company": realistic company name
- "location": city/state or "Remote"
- "type": "Full-time", "Part-time", "Contract", or "Temporary"
- "level": "Senior", "Mid-Level", "Director", "VP", "Principal", "Staff", or "Manager"
- "posted": e.g. "Today", "2 days ago", "1 week ago"
- "salary": realistic range like "$140,000 – $175,000/yr" or "Competitive"
- "snippet": 1–2 sentence job excerpt, max 160 chars
- "linkedinUrl": realistic LinkedIn jobs search URL`;
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 900,
            messages: [{ role: 'user', content: prompt }],
          }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        const jobs = JSON.parse(data.content[0].text.trim());
        if (Array.isArray(jobs)) {
          setTopJobs(jobs);
          const stored = load() || {};
          persist({ ...stored, jobSearch: { ...(stored.jobSearch || {}), topJobs: jobs } });
        }
      } catch (e) {
        // silent fail — top 5 is best-effort
      } finally {
        setTopJobsLoading(false);
      }
    }, 2000);
    return () => { if (topDebounceRef.current) clearTimeout(topDebounceRef.current); };
  }, [selectedRoles, mustKeywords, optKeywords, selectedLocations]);

  // Close board dropdowns on any outside click
  React.useEffect(() => {
    if (openBoardDD === null && topOpenBoardDD === null) return;
    function h() { setOpenBoardDD(null); setTopOpenBoardDD(null); }
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, [openBoardDD, topOpenBoardDD]);

  function saveCurrentSearch() {
    const name = saveSearchName.trim() || `Search ${new Date().toLocaleDateString()}`;
    const entry = {
      id: Date.now(),
      name,
      roles: selectedRoles,
      mustKeywords,
      optKeywords,
      selectedLocations,
      locationRadius,
      dateRange,
      expLevels,
      workplaceTypes,
      jobTypes,

    setSavedSearches(prev => [entry, ...prev.slice(0, 9)]);

    setShowSaveSearch(false);

    setSelectedLocations(entry.selectedLocations || (entry.locationCity ? [entry.locationCity] : []));

    setExpLevels(entry.expLevels || []);
    setWorkplaceTypes(entry.workplaceTypes || []);
    setJobTypes(entry.jobTypes || []);
    setNetworkOnly(entry.networkOnly || false);
    setToast(`Loaded: ${entry.name}`);

    setSavedSearches(prev => prev.filter(s => s.id !== id));
  }

  function copyUrl() {
    navigator.clipboard.writeText(url).then(() => setToast('URL copied'));

  return (
    <div>

      </div>

      {/* ── Top 5 Matches ─────────────────────────────────────────────── */}
      {(topJobs.length > 0 || topJobsLoading) && (

                            onMouseEnter={e => e.currentTarget.style.background='rgba(240,238,248,.06)'}

        </div>

      </div>

      <div className="card">
        <div className="card-title">Filters</div>
        {isRemoteOnly ? (
          <div className="field">
            <label>Location</label>
            <div style={{padding:'9px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8, fontSize:12, color:'var(--muted)', fontFamily:'var(--mono)', letterSpacing:'.04em'}}>
              🌐 Remote — searching United States

              <label style={{display:'flex',alignItems:'center',gap:6,justifyContent:'space-between'}}>
                <span>Locations</span>
                <button
                  onClick={detectLocation}
                  title={geoDetected ? 'Re-detect my location' : 'Detect nearby cities'}
                  style={{background:'none',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',
                    padding:'2px 7px',color:geoLoading?'var(--accent)':'var(--muted)',fontSize:10,
                    fontFamily:'var(--mono)',letterSpacing:'.04em',transition:'color .2s'}}
                >
                  {geoLoading ? '⟳ detecting…' : geoDetected ? '⌖ re-detect' : '⌖ detect nearby'}
