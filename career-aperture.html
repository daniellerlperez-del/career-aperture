function CalendarImportModal({ events, onImport, onClose }) {
  const [selected, setSelected] = useState(() => Object.fromEntries(events.map(e => [e.id, true])));

  function toggle(id) { setSelected(s => ({ ...s, [id]: !s[id] })); }
  function toggleAll() {
    const allOn = Object.values(selected).every(Boolean);
    setSelected(Object.fromEntries(events.map(e => [e.id, !allOn])));
  }

  function fmtEventDate(e) {
    const d = new Date(e.start?.dateTime || e.start?.date);
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  }

  const selectedEvents = events.filter(e => selected[e.id]);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:720}}>
        <div className="modal-header">
          <div className="modal-title">Import Calendar Events</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.65}}>
            {events.length} relevant event{events.length !== 1 ? 's' : ''} detected. Select which to import as board cards.
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <button onClick={toggleAll} style={{fontSize:11,fontFamily:'var(--mono)',background:'none',border:'1px solid var(--border)',borderRadius:4,padding:'3px 10px',cursor:'pointer',color:'var(--muted)'}}>
              {Object.values(selected).every(Boolean) ? 'Deselect all' : 'Select all'}
            </button>
            <span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--muted-2)'}}>{selectedEvents.length} selected</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:380,overflowY:'auto'}}>
            {events.map(e => {
              const cls = e._classification;
              const isChecked = selected[e.id];
              return (
                <label key={e.id} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',background: isChecked ? 'rgba(201,168,76,.05)' : 'rgba(255,255,255,.02)',border:`1px solid ${isChecked ? 'rgba(201,168,76,.2)' : 'var(--border)'}`,borderRadius:7,cursor:'pointer'}}>
                  <input type="checkbox" checked={isChecked} onChange={() => toggle(e.id)} style={{marginTop:3,flexShrink:0,accentColor:'var(--accent)'}} />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}}>
                      <span style={{fontSize:13,color:'var(--text)',fontWeight:500,lineHeight:1.3}}>{e.summary || '(No title)'}</span>
                      <span style={{fontSize:10,fontFamily:'var(--mono)',padding:'2px 7px',borderRadius:3,background:'rgba(201,168,76,.1)',color:'var(--accent)',border:'1px solid rgba(201,168,76,.2)',whiteSpace:'nowrap'}}>
                        {cls.icon} {cls.type}
                      </span>
                      <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted-2)'}}>→ {cls.board === 'smb' ? 'SMB Board' : 'Jobs Board'}</span>
                    </div>
                    <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--muted-2)'}}>{fmtEventDate(e)} &nbsp;·&nbsp; {e._account}</div>
                    {e.description && <div style={{fontSize:11,color:'var(--muted)',marginTop:3,lineHeight:1.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:520}}>{e.description.replace(/<[^>]+>/g,'').slice(0,120)}</div>}
                  </div>
                </label>
              );
            })}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => onImport(selectedEvents)} disabled={selectedEvents.length === 0}>
            Import {selectedEvents.length > 0 ? `${selectedEvents.length} event${selectedEvents.length !== 1 ? 's' : ''}` : ''}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [mode, setMode] = useState('jobs');
  const [showSettings, setShowSettings] = useState(false);
  const [isDemoMode, setIsDemoMode] = useState(false);
  const [calTokens, setCalTokens] = useState(() => { const s = load(); return s?.calTokens || []; });
  const [googleClientId, setGoogleClientId] = useState(() => { const s = load(); return s?.googleClientId || ''; });
  const [showCalImport, setShowCalImport] = useState(false);
  const [calEvents, setCalEvents] = useState([]);
  const [calLoading, setCalLoading] = useState(false);
  const [calError, setCalError] = useState(null);

  // Persist calendar tokens + client ID
  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, calTokens, googleClientId });
  }, [calTokens, googleClientId]);

  // State loaded from localStorage
  const [profile, setProfile] = useState(DEFAULTS.profile);
  const [watchList, setWatchList] = useState(DEFAULTS.watchList);
  const [apiKey, setApiKey] = useState('');
  const [isFirstRun, setIsFirstRun] = useState(false);

  // Hydrate from storage on mount
  useEffect(() => {
    const saved = load();
    if (saved) {
      if (saved.profile) setProfile({...DEFAULTS.profile, ...saved.profile});
      if (saved.watchList) setWatchList(saved.watchList);
      if (saved.apiKey && (!saved.ownerToken || saved.ownerToken === ownerHash(saved.profile?.name))) {
        setApiKey(saved.apiKey);
      }
      // First run if no name set
      if (!saved.profile?.name) setIsFirstRun(true);
    } else {
      setIsFirstRun(true);
    }
  }, []);

  // Persist on changes
  useEffect(() => {
    persist({ profile, watchList, apiKey });
  }, [profile, watchList, apiKey]);

  function handlePeopleSearch(company) {
    setMode('people');
    // Small delay to let mode switch render, then we'd set company — handled in child
    window.__apertureCompany = company;
  }

  async function fetchCalendarEvents(token, accountEmail) {
    const now = new Date();
    const pastDate = new Date(now); pastDate.setDate(now.getDate() - 14);
    const futureDate = new Date(now); futureDate.setDate(now.getDate() + 30);
    const params = new URLSearchParams({
      timeMin: pastDate.toISOString(),
      timeMax: futureDate.toISOString(),
      maxResults: '100',
      singleEvents: 'true',
      orderBy: 'startTime',
    });
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) throw new Error(`Calendar API error: ${res.status}`);
    const data = await res.json();
    return (data.items || []).map(e => ({ ...e, _account: accountEmail }));
  }

  function connectGoogleAccount() {
    if (!googleClientId.trim()) {
      setCalError('Enter your Google OAuth Client ID in the Calendar settings first.');
      return;
    }
    if (!window.google?.accounts?.oauth2) {
      setCalError('Google Identity Services failed to load. Check your internet connection.');
      return;
    }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: googleClientId.trim(),
      scope: CALENDAR_SCOPES,
      callback: async (resp) => {
        if (resp.error) { setCalError('Google sign-in failed: ' + resp.error); return; }
        try {
          const infoRes = await fetch(`https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=${resp.access_token}`);
          const info = await infoRes.json();
          const email = info.email || 'unknown@gmail.com';
          setCalTokens(prev => {
            const filtered = prev.filter(t => t.email !== email);
            return [...filtered, { email, token: resp.access_token, expires: Date.now() + (resp.expires_in * 1000) }];
          });
          setCalError(null);
        } catch(e) { setCalError('Failed to get account info: ' + e.message); }
      },
      prompt: 'select_account',
    });
    client.requestAccessToken();
  }

  async function scanCalendarEvents() {
    const validTokens = calTokens.filter(t => t.token && t.expires > Date.now());
    if (validTokens.length === 0) {
      setCalError('No active calendar connections. Connect a Google account first.');
      return;
    }
    setCalLoading(true); setCalError(null);
    try {
      const allEvents = [];
      for (const tok of validTokens) {
        try {
          const events = await fetchCalendarEvents(tok.token, tok.email);
          allEvents.push(...events);
        } catch(e) {
          if (e.message.includes('401')) {
            setCalTokens(prev => prev.filter(t => t.email !== tok.email));
            setCalError(`Token expired for ${tok.email} — please reconnect.`);
          }
        }
      }
      const classified = allEvents
        .map(e => ({ ...e, _classification: classifyCalendarEvent(e) }))
        .filter(e => e._classification !== null)
        .sort((a, b) => new Date(a.start?.dateTime || a.start?.date) - new Date(b.start?.dateTime || b.start?.date));
      setCalEvents(classified);
      if (classified.length === 0) setCalError('No matching events found in the past 14 days or next 30 days.');
      else setShowCalImport(true);
    } finally {
      setCalLoading(false);
    }
  }

  function importCalendarEvents(events) {
    const stored = load() || {};
    const kanban = stored.kanban || {};
    let jobCards = { ...(kanban.jobCards || {}) };
    let smbCards = { ...(kanban.smbCards || {}) };
    const actManual = stored.activityReport?.manual || [];
    const newActs = [];

    events.forEach(ev => {
      const cls = ev._classification;
      const startDt = ev.start?.dateTime || ev.start?.date;
      const created = startDt ? new Date(startDt).toISOString() : new Date().toISOString();
      const dateDisplay = startDt ? new Date(startDt).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : 'Imported';
      const title = ev.summary || 'Calendar event';
      const notes = [ev._account, ev.description ? ev.description.replace(/<[^>]+>/g,'').slice(0,120) : ''].filter(Boolean).join('\n');
      const card = { id: Date.now() + Math.random(), title, sub: cls.type, date: dateDisplay, created, notes, source: 'calendar' };

      if (cls.board === 'smb') {
        smbCards = { ...smbCards, [cls.col]: [...(smbCards[cls.col] || []), card] };
      } else {
        jobCards = { ...jobCards, [cls.col]: [...(jobCards[cls.col] || []), card] };
      }

      newActs.push({
        id: Date.now() + Math.random(),
        date: startDt ? new Date(startDt).toISOString().slice(0,10) : new Date().toISOString().slice(0,10),
        employer: title,
        city: '',
        method: cls.type === 'Interview' || cls.type === 'Interview Follow-up' ? 'Interview (video)' : cls.type === 'Networking' ? 'Professional networking (LinkedIn)' : cls.type === 'Career Coaching' ? 'Career center services' : 'Employer phone screen',
        position: cls.type,
        result: 'Scheduled',
      });
    });

    persist({ ...stored, kanban: { ...kanban, jobCards, smbCards }, activityReport: { ...(stored.activityReport || {}), manual: [...actManual, ...newActs] } });
    setShowCalImport(false);
    setCalEvents([]);
  }

  const nav = [
    { id: 'jobs', label: 'Job Search' },
    { id: 'board', label: 'Board' },
    { id: 'analytics', label: 'Analytics' },
    { id: 'people', label: 'People & Contacts' },
    { id: 'research', label: 'Deep Research' },
    { id: 'signals', label: 'Signal Feed' },
    { id: 'report', label: 'Activity Report' },
    { id: 'smb', label: 'SMB Prospecting' },
    { id: 'networking', label: 'Networking' },
    { id: 'watchlist', label: 'Watch List' },
    { id: 'value', label: 'Job Fit' },
  ];

  // First-run screen — shown until user saves a profile
  if (isFirstRun && !showSettings) {
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
        background:'var(--bg)',
        backgroundImage:'radial-gradient(ellipse at 0% 0%, rgba(61,26,136,.14) 0%, transparent 42%), radial-gradient(ellipse at 100% 100%, rgba(208,24,120,.07) 0%, transparent 38%)'}}>
        <div style={{textAlign:'center', maxWidth:440, padding:40}}>
          <div style={{fontFamily:'var(--mono)', fontSize:18, fontWeight:500, letterSpacing:'.06em', marginBottom:8,
            background:'linear-gradient(90deg,#B07AE8,#E84CA0,#C9A84C)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>
            Career Aperture
          </div>
          <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--muted-2)', letterSpacing:'.18em', textTransform:'uppercase', marginBottom:36}}>
            Career Intelligence · a Perez Creative Labs product
          </div>
          <div style={{fontSize:16, color:'var(--text)', marginBottom:12, lineHeight:1.6, fontFamily:'Georgia, serif', letterSpacing:'.01em'}}>
            Your background is the intelligence.
          </div>
          <div style={{fontSize:13, color:'var(--muted)', marginBottom:8, lineHeight:1.75}}>
            Set your career context once. Every search, brief, and outreach runs on it — with your signal as the competitive advantage.
          </div>
          <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', marginBottom:32, lineHeight:1.6}}>
            All data stays in your browser. Nothing is stored externally. Bring your own Anthropic API key.
          </div>
          <button className="btn btn-primary" style={{padding:'12px 32px', fontSize:14}}
            onClick={() => setShowSettings(true)}>
            Build My Profile
          </button>
        </div>
        {showSettings && (
          <SettingsModal
            profile={profile} setProfile={p => { setProfile(p); if (p.name) setIsFirstRun(false); }}
            watchList={watchList} setWatchList={setWatchList}
            apiKey={apiKey} setApiKey={setApiKey}
            onClose={() => { setShowSettings(false); if (profile.name) setIsFirstRun(false); }}
          />
        )}
      </div>
    );
  }

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <LogoFlask />
          <div>
            <div className="logo-text">Career Aperture</div>
            <div className="logo-sub">Career Intelligence</div>
            <div style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'.08em', marginTop:5, opacity:.6}}>a Perez Creative Labs product</div>
          </div>
        </div>

        <div className="nav-section">
          <div className="nav-label">Modes</div>
          {nav.map(n => (
            <button key={n.id} className={`nav-btn ${mode === n.id ? 'active' : ''}`} onClick={() => setMode(n.id)}>
              <span className="nav-icon"><NavIcon id={n.id} /></span>
              {n.label}
            </button>
          ))}
        </div>


        <div className="sidebar-footer">
          <button
            onClick={() => setIsDemoMode(d => !d)}
            style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'var(--mono)',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',
              background: isDemoMode ? 'rgba(91,184,112,.1)' : 'none',
              color: isDemoMode ? '#5BB870' : 'rgba(237,229,213,.3)',
              marginBottom:2}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            {isDemoMode ? 'Demo On' : 'Demo Mode'}
          </button>
          <button
            onClick={scanCalendarEvents}
            disabled={calLoading}
            style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'var(--mono)',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',
              background:'none', color: calTokens.length > 0 ? 'rgba(91,143,208,.8)' : 'rgba(237,229,213,.3)', marginBottom:2}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            {calLoading ? 'Scanning…' : calTokens.length > 0 ? `Cal (${calTokens.length})` : 'Calendar'}
          </button>
          {calError && (
            <div style={{fontSize:10,color:'rgba(208,24,120,.7)',padding:'3px 14px 6px',fontFamily:'var(--mono)',lineHeight:1.5}}>{calError}</div>
          )}
          <a href="kpi.html" target="_blank" rel="noopener"
            style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 14px',borderRadius:8,textDecoration:'none',color:'var(--muted-2)',fontFamily:'var(--mono)',fontSize:12,letterSpacing:'.04em',marginBottom:2}}
            onMouseEnter={e=>{e.currentTarget.style.color='var(--accent)';e.currentTarget.style.background='rgba(201,168,76,.04)'}}
            onMouseLeave={e=>{e.currentTarget.style.color='var(--muted-2)';e.currentTarget.style.background='none'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            KPI Dashboard ↗
          </a>
          <button className="settings-btn" onClick={() => setShowSettings(true)}>
            <span className="nav-icon"><NavIcon id="settings" /></span>
            Settings
          </button>
        </div>
      </aside>

      <main className="main">
        {isDemoMode && (
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',background:'rgba(91,184,112,.08)',border:'1px solid rgba(91,184,112,.2)',borderRadius:7,marginBottom:20,fontSize:12,fontFamily:'var(--mono)',color:'rgba(91,184,112,.9)'}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>Demo mode — showing sample data. No API key required.</span>
            <button onClick={() => setIsDemoMode(false)} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'rgba(91,184,112,.6)',fontSize:16,lineHeight:1}}>×</button>
          </div>
        )}
        {mode === 'jobs' && <JobSearch demoMode={isDemoMode} />}
        {mode === 'people' && <PeopleContacts watchList={watchList} />}
        {mode === 'research' && <DeepResearch profile={profile} apiKey={apiKey} onNeedApiKey={() => setShowSettings(true)} demoMode={isDemoMode} />}
        {mode === 'signals' && <SignalFeed apiKey={apiKey} onNeedApiKey={() => setShowSettings(true)} demoMode={isDemoMode} />}
        {mode === 'report' && <ActivityReport />}
        {mode === 'smb' && <SMBProspecting profile={profile} apiKey={apiKey} onNeedApiKey={() => setShowSettings(true)} />}
        {mode === 'networking' && <Networking profile={profile} apiKey={apiKey} onNeedApiKey={() => setShowSettings(true)} />}
        {mode === 'board' && (
          apiKey
            ? <KanbanBoard />
            : <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:320, gap:16, textAlign:'center', padding:40}}>
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--muted-2)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <div style={{fontSize:13, fontFamily:'var(--mono)', color:'var(--text)', letterSpacing:'.04em', textTransform:'uppercase'}}>API Key Required</div>
                <div style={{fontSize:12, fontFamily:'var(--mono)', color:'var(--muted-2)', maxWidth:300, lineHeight:1.6}}>Add your Anthropic key in Settings to activate the Board.</div>
                <button className="btn btn-primary" onClick={() => setShowSettings(true)}>Add API Key</button>
              </div>
        )}
        {mode === 'analytics' && (
          apiKey
            ? <Analytics />
            : <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:320, gap:16, textAlign:'center', padding:40}}>
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--muted-2)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <div style={{fontSize:13, fontFamily:'var(--mono)', color:'var(--text)', letterSpacing:'.04em', textTransform:'uppercase'}}>API Key Required</div>
                <div style={{fontSize:12, fontFamily:'var(--mono)', color:'var(--muted-2)', maxWidth:300, lineHeight:1.6}}>Add your Anthropic key in Settings to activate Analytics.</div>
                <button className="btn btn-primary" onClick={() => setShowSettings(true)}>Add API Key</button>
              </div>
        )}
        {mode === 'watchlist' && <WatchListSummary watchList={watchList} onPeopleSearch={handlePeopleSearch} />}
        {mode === 'value' && <JobValue />}
      </main>

      {showSettings && (
        <SettingsModal
          profile={profile} setProfile={p => { setProfile(p); if (p.name) setIsFirstRun(false); }}
          watchList={watchList} setWatchList={setWatchList}
          apiKey={apiKey} setApiKey={setApiKey}
          calTokens={calTokens} setCalTokens={setCalTokens}
          googleClientId={googleClientId} setGoogleClientId={setGoogleClientId}
          onConnectCalendar={connectGoogleAccount}
          onClose={() => { setShowSettings(false); if (profile.name) setIsFirstRun(false); }}
        />
      )}
      {showCalImport && calEvents.length > 0 && (
        <CalendarImportModal
          events={calEvents}
          onImport={importCalendarEvents}
          onClose={() => { setShowCalImport(false); setCalEvents([]); }}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
