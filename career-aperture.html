                </div>
              )}
              {/* Dropdown trigger */}
              <div ref={locPanelRef} style={{position:'relative'}}>
                <div
                  onClick={() => setLocPanelOpen(o => !o)}
                  style={{
                    display:'flex',alignItems:'center',justifyContent:'space-between',
                    padding:'8px 12px',background:'var(--bg-2)',
                    border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',
                    fontSize:12,color:selectedLocations.length?'var(--text)':'var(--muted)',
                    userSelect:'none',
                  }}
                >
                  <span>
                    {selectedLocations.length === 0
                      ? geoDetected ? 'Select from nearby cities…' : 'Select cities…'
                      : `${selectedLocations.length} location${selectedLocations.length>1?'s':''} selected`}
                  </span>
                  <span style={{fontSize:9,color:'var(--muted-2)'}}>{locPanelOpen?'▴':'▾'}</span>
                </div>
                {locPanelOpen && (
                  <div style={{
                    position:'absolute',top:'100%',left:0,right:0,zIndex:300,
                    background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,
                    marginTop:3,boxShadow:'0 12px 32px rgba(0,0,0,.6)',overflow:'hidden',
                  }}>
                    {/* Search within list */}
                    <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)'}}>
                      <input
                        value={locSearch}
                        onChange={e => setLocSearch(e.target.value)}
                        placeholder="Search cities…"
                        onClick={e => e.stopPropagation()}
                        style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:5,
                          padding:'5px 9px',fontSize:12,color:'var(--text)'}}
                        autoFocus
                      />
                    </div>
                    {/* City list */}
                    <div style={{maxHeight:220,overflowY:'auto'}}>
                      {locListFiltered.length === 0 && (
                        <div style={{padding:'10px 14px',fontSize:12,color:'var(--muted)'}}>No matches</div>
                      )}
                      {locListFiltered.map(city => {
                        const checked = selectedLocations.includes(city.label);
                        return (
                          <div
                            key={city.label}
                            onClick={() => toggleLocation(city.label)}
                            style={{
                              display:'flex',alignItems:'center',gap:10,
                              padding:'8px 14px',cursor:'pointer',fontSize:12,
                              background: checked ? 'var(--accent-dim)' : 'transparent',
                              borderBottom:'1px solid var(--border)',
                              color: checked ? 'var(--accent)' : 'var(--text)',
                              transition:'background .1s',
                            }}
                            onMouseEnter={e => { if(!checked) e.currentTarget.style.background='rgba(255,255,255,.04)'; }}
                            onMouseLeave={e => { if(!checked) e.currentTarget.style.background='transparent'; }}
                          >
                            <span style={{fontSize:10, color: checked?'var(--accent)':'var(--muted-2)'}}>
                              {checked ? '☑' : '☐'}
                            </span>
                            <span style={{flex:1}}>{city.label}</span>
                            {city.dist != null && (
                              <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>
                                {city.dist} mi
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {/* Footer */}
                    <div style={{padding:'8px 14px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:10,color:'var(--muted)'}}>
                        {geoDetected ? `Showing cities within 25 mi · ` : ''}
                        {selectedLocations.length} selected
                      </span>
                      <button
                        onClick={(e) => { e.stopPropagation(); setLocPanelOpen(false); setLocSearch(''); }}
                        style={{background:'var(--accent)',border:'none',borderRadius:5,padding:'3px 10px',
                          fontSize:11,color:'#09080A',cursor:'pointer',fontFamily:'var(--mono)'}}
                      >
                        done
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            {/* Radius */}
            <div className="field" style={{flex:1}}>
              <label>Radius</label>
              <div style={{position:'relative'}}>
                <select value={locationRadius} onChange={e => setLocationRadius(e.target.value)} style={{paddingRight:28}}>
                  {[5,10,15,25,50,75,100].map(r => <option key={r} value={String(r)}>{r} mi</option>)}
                </select>
                <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#5a5a6e',fontSize:11}}>▾</span>
              </div>
            </div>
          </div>
        )}

        <div className="field">
          <label>Date Posted</label>
          <div style={{position:'relative'}}>
            <select value={dateRange} onChange={e => setDateRange(e.target.value)} style={{paddingRight: 28}}>
              {DATE_RANGES.map(d => <option key={d.value} value={d.value}>{d.label}</option>)}
            </select>
            <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#5a5a6e',fontSize:11}}>▾</span>
          </div>
        </div>

        <div className="field">
          <label>Experience Level</label>
          <div className="chips-wrap">
            {EXP_LEVELS.map(e => (
              <button key={e.value} className={`chip ${expLevels.includes(e.value) ? 'active' : ''}`}
                onClick={() => toggleArr(expLevels, setExpLevels, e.value)}>{e.label}</button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Workplace Type</label>
          <div className="chips-wrap">
            {WORKPLACE_TYPES.map(w => (
              <button key={w.value} className={`chip ${workplaceTypes.includes(w.value) ? 'active' : ''}`}
                onClick={() => toggleArr(workplaceTypes, setWorkplaceTypes, w.value)}>{w.label}</button>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Job Type</label>
          <div className="chips-wrap">
            {JOB_TYPES.map(j => (
              <button key={j.value} className={`chip ${jobTypes.includes(j.value) ? 'active' : ''}`}
                onClick={() => toggleArr(jobTypes, setJobTypes, j.value)}>{j.label}</button>
            ))}
          </div>
        </div>

        <div className="toggle-row">
          <span className="toggle-label">Jobs in my network only</span>
          <label className="toggle">
            <input type="checkbox" checked={networkOnly} onChange={e => setNetworkOnly(e.target.checked)} />
            <span className="toggle-slider"></span>
          </label>
        </div>

        <button
          className="btn btn-primary"
          disabled={!hasTerms || searching}
          onClick={runJobSearch}
          style={{width:'100%', marginTop:16, fontSize:13, padding:'10px', letterSpacing:'.05em'}}
        >
          {searching ? '⟳ Searching…' : '⚡ Search Jobs'}
        </button>
      </div>

      {/* Quick Search — save/load */}
      <div className="card">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: savedSearches.length > 0 ? 14 : 0}}>
          <div className="card-title" style={{marginBottom:0}}>Quick Searches</div>
          <button className="btn btn-secondary btn-sm" onClick={() => setShowSaveSearch(s => !s)}>
            {showSaveSearch ? 'Cancel' : '+ Save current'}
          </button>
        </div>

        {showSaveSearch && (
          <div style={{display:'flex', gap:8, marginTop:12, marginBottom:savedSearches.length > 0 ? 14 : 0}}>
            <input
              value={saveSearchName}
              onChange={e => setSaveSearchName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') saveCurrentSearch(); }}
              placeholder="Name this search…"
              style={{flex:1, padding:'7px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', fontSize:12, fontFamily:'var(--mono)'}}
            />
            <button className="btn btn-primary btn-sm" onClick={saveCurrentSearch}>Save</button>
          </div>
        )}

        {savedSearches.length === 0 && !showSaveSearch && (
          <div style={{fontSize:11, color:'var(--muted-2)', fontFamily:'var(--mono)', fontStyle:'italic', paddingTop:2}}>
            No saved searches yet — build a search and save it for quick reuse.
          </div>
        )}

        {savedSearches.length > 0 && (
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {savedSearches.map(s => (
              <div key={s.id} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8}}>
                <div style={{flex:1, fontSize:12, fontFamily:'var(--mono)', color:'var(--text)', letterSpacing:'.02em'}}>{s.name}</div>
                <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)'}}>
                  {s.roles.length > 0 && `${s.roles.length}r`}
                  {s.roles.length > 0 && (s.mustKeywords||[]).length + (s.optKeywords||[]).length > 0 && ' · '}
                  {(s.mustKeywords||[]).length > 0 && `${(s.mustKeywords||[]).length}m`}
                  {(s.mustKeywords||[]).length > 0 && (s.optKeywords||[]).length > 0 && '+'}
                  {(s.optKeywords||[]).length > 0 && `${(s.optKeywords||[]).length}k`}
                </div>
                <button className="btn btn-secondary btn-sm" onClick={() => loadSavedSearch(s)}>Load</button>
                <button className="btn btn-sm" style={{background:'transparent',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:14,padding:'2px 6px'}} onClick={() => deleteSavedSearch(s.id)}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: urlsOpen ? 14 : 0, cursor:'pointer'}} onClick={() => setUrlsOpen(o => !o)}>
          <div className="card-title" style={{marginBottom:0}}>Search URLs</div>
          <div style={{display:'flex', gap:6, alignItems:'center'}}>
            {!urlsOpen && !hasTerms && <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)'}}>select roles to generate</span>}
            <span style={{fontSize:12, color:'var(--muted-2)', fontFamily:'var(--mono)'}}>{urlsOpen ? '▴' : '▾'}</span>
          </div>
        </div>

        {urlsOpen && (
          <>
            {!hasTerms && (
              <div style={{fontSize:11, color:'var(--muted-2)', fontFamily:'var(--mono)', fontStyle:'italic'}}>Select at least one role or keyword to generate URLs.</div>
            )}

            {hasTerms && (
              <>
                {locationUrls.map(({ loc, linkedIn, ladders }, i) => (
                  <div key={loc || i}>
                    {/* Location label when multiple cities */}
                    {locationUrls.length > 1 && loc && (
                      <div style={{
                        marginBottom:8,marginTop: i > 0 ? 14 : 0,
                        padding:'4px 10px',background:'rgba(201,168,76,.07)',
                        border:'1px solid var(--accent-bdr)',borderRadius:5,
                        fontSize:10,color:'var(--accent)',fontFamily:'var(--mono)',
                        letterSpacing:'.06em',display:'inline-block',
                      }}>
                        📍 {loc}
                      </div>
                    )}
                    <div style={{marginBottom:4, fontSize:10, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>LinkedIn</div>
                    <div className="url-row" style={{marginBottom:8}}>
                      <div className="url-text">{linkedIn}</div>
                      <div className="url-actions">
                        <a href={linkedIn} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
                        <button className="btn btn-primary btn-sm" onClick={() => navigator.clipboard.writeText(linkedIn).then(() => setToast('URL copied'))}>Copy</button>
                      </div>
                    </div>
                    <div style={{marginBottom:4, fontSize:10, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>The Ladders</div>
                    <div className="url-row" style={{marginBottom:12}}>
                      <div className="url-text">{ladders}</div>
                      <div className="url-actions">
                        <a href={ladders} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
                        <button className="btn btn-primary btn-sm" onClick={() => navigator.clipboard.writeText(ladders).then(() => setToast('URL copied'))}>Copy</button>
                      </div>
                    </div>
                  </div>
                ))}

                {customEngines.map(eng => {
                  const cUrl = buildCustomUrl(eng.urlTemplate);
                  return (
                    <div key={eng.id}>
                      <div style={{marginBottom:4, display:'flex', alignItems:'center', gap:6}}>
                        <span style={{fontSize:10, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.12em', color:'#8888a0', fontFamily:'var(--mono)'}}>{eng.name}</span>
                        <button style={{background:'none',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:11,padding:'0 2px'}} onClick={() => removeCustomEngine(eng.id)} title="Remove">×</button>
                      </div>
                      <div className="url-row" style={{marginBottom:12}}>
                        <div className="url-text">{cUrl}</div>
                        <div className="url-actions">
                          <a href={cUrl} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
                          <button className="btn btn-primary btn-sm" onClick={() => navigator.clipboard.writeText(cUrl).then(() => setToast('URL copied'))}>Copy</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            <div style={{borderTop: hasTerms ? '1px solid var(--border)' : 'none', paddingTop: hasTerms ? 12 : 0, marginTop: hasTerms ? 4 : 0}}>
              {!showAddEngine ? (
                <button className="btn btn-secondary btn-sm" onClick={(e) => { e.stopPropagation(); setShowAddEngine(true); }}>+ Add search engine</button>
              ) : (
                <div style={{display:'flex', flexDirection:'column', gap:7}} onClick={e => e.stopPropagation()}>
                  <input
                    value={newEngineName}
                    onChange={e => setNewEngineName(e.target.value)}
                    placeholder="Engine name (e.g. Indeed)"
                    style={{padding:'7px 10px', fontSize:12, fontFamily:'var(--mono)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:7, color:'var(--text)'}}
                  />
                  <input
                    value={newEngineUrl}
                    onChange={e => setNewEngineUrl(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') addCustomEngine(); }}
                    placeholder="URL template — use {{keywords}} for search terms"
                    style={{padding:'7px 10px', fontSize:12, fontFamily:'var(--mono)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:7, color:'var(--text)'}}
                  />
                  <div style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'.04em'}}>
                    Example: https://www.indeed.com/jobs?q=&#123;&#123;keywords&#125;&#125;
                  </div>
                  <div style={{display:'flex', gap:6}}>
                    <button className="btn btn-primary btn-sm" onClick={addCustomEngine} disabled={!newEngineName.trim() || !newEngineUrl.trim()}>Save engine</button>
                    <button className="btn btn-secondary btn-sm" onClick={() => { setShowAddEngine(false); setNewEngineName(''); setNewEngineUrl(''); }}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>

      {/* ── Job Search Results ─────────────────────────────────────────── */}
      {(searching || searchError || searchResults.length > 0) && (
        <div className="card">
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
            <div className="card-title" style={{marginBottom:0}}>
              {searching ? 'Searching…' : `Results${searchResults.length > 0 ? ` · ${searchResults.length}` : ''}`}
            </div>
            {searchResults.length > 0 && (
              <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'.06em'}}>
                AI curated · based on your criteria
              </span>
            )}
          </div>

          {searching && (
            <div style={{display:'flex', alignItems:'center', gap:10, padding:'18px 0', color:'var(--muted-2)', fontFamily:'var(--mono)', fontSize:12}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{animation:'spin 1s linear infinite'}} aria-hidden="true" focusable="false">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
              Curating matches…
            </div>
          )}

          {searchError && !searching && (
            <div style={{fontSize:12, fontFamily:'var(--mono)', color:'#e06060', padding:'8px 0'}}>{searchError}</div>
          )}

          {!searching && searchResults.length > 0 && searchResults.map((job, idx) => (
            <div key={idx} style={{
              padding:'14px 16px',
              marginBottom: idx < searchResults.length - 1 ? 10 : 0,
              background:'var(--bg-2)',
              borderRadius:8,
              border:'1px solid var(--border)',
              display:'flex',
              flexDirection:'column',
              gap:7,
            }}>
              <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:13, fontWeight:600, fontFamily:'var(--mono)', color:'var(--text)', letterSpacing:'.01em', marginBottom:2}}>{job.title}</div>
                  <div style={{fontSize:12, fontFamily:'var(--mono)', color:'var(--accent)', letterSpacing:'.02em'}}>{job.company}</div>
                </div>
                <div style={{position:'relative', flexShrink:0}} onClick={e => e.stopPropagation()}>
                  {addedCards[idx] ? (
                    <button className="btn btn-secondary btn-sm" disabled style={{fontSize:11, padding:'4px 12px', letterSpacing:'.04em', whiteSpace:'nowrap'}}>✓ {addedCards[idx]}</button>
                  ) : (
                    <>
                      <button
                        className="btn btn-primary btn-sm"
                        onClick={() => setOpenBoardDD(openBoardDD === idx ? null : idx)}
                        style={{fontSize:11, padding:'4px 12px', letterSpacing:'.04em', display:'flex', alignItems:'center', gap:5}}
                      >
                        + Board <span style={{fontSize:8, opacity:.8}}>▾</span>
                      </button>
                      {openBoardDD === idx && (
                        <div style={{position:'absolute', right:0, top:'calc(100% + 4px)', zIndex:400, background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:7, minWidth:130, boxShadow:'0 6px 24px rgba(0,0,0,.55)', overflow:'hidden'}}>
                          {KANBAN_JOB_COLS.map(col => (
                            <div key={col.id}
                              onClick={() => { if (saveToBoardCol(job, col.id, col.label, idx, addedCards, setAddedCards, 's')) setOpenBoardDD(null); }}
                              style={{padding:'8px 14px', cursor:'pointer', fontSize:12, fontFamily:'var(--mono)', color:'var(--text)', borderBottom:'1px solid var(--border)'}}
                              onMouseEnter={e => e.currentTarget.style.background='rgba(240,238,248,.06)'}
                              onMouseLeave={e => e.currentTarget.style.background='transparent'}
                            >{col.label}</div>
                          ))}
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>

              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted)', padding:'2px 8px', background:'rgba(255,255,255,.05)', borderRadius:4, border:'1px solid var(--border)'}}>
                  📍 {job.location}
                </span>
                <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted)', padding:'2px 8px', background:'rgba(255,255,255,.05)', borderRadius:4, border:'1px solid var(--border)'}}>
                  {job.level}
                </span>
                <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted)', padding:'2px 8px', background:'rgba(255,255,255,.05)', borderRadius:4, border:'1px solid var(--border)'}}>
                  {job.type}
                </span>
                <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', padding:'2px 8px', background:'rgba(255,255,255,.03)', borderRadius:4, border:'1px solid var(--border)'}}>
                  {job.posted}
                </span>
                {job.salary && job.salary !== 'Competitive' && (
                  <span style={{fontSize:10, fontFamily:'var(--mono)', color:'rgba(201,168,76,.85)', padding:'2px 8px', background:'rgba(201,168,76,.07)', borderRadius:4, border:'1px solid rgba(201,168,76,.15)'}}>
                    {job.salary}
                  </span>
                )}
              </div>

              {job.snippet && (
                <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', lineHeight:1.6, letterSpacing:'.01em'}}>
                  {job.snippet}
                </div>
              )}

              {job.linkedinUrl && (
                <a href={job.linkedinUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', textDecoration:'none', letterSpacing:'.04em', marginTop:2}}>
                  View on LinkedIn ↗
                </a>
              )}
            </div>
          ))}
        </div>
      )}

    </div>
  );
}

// ── People & Contacts Mode ────────────────────────────────────────────────────

function PeopleContacts({ watchList }) {
  const [selectedCompany, setSelectedCompany] = useState('');
  const [customCompany, setCustomCompany] = useState('');
  const [contactRole, setContactRole] = useState('Head of Product');
  const [toast, setToast] = useState(null);

  const company = selectedCompany || customCompany.trim();
  const urls = company ? buildPeopleURLs(company, contactRole) : null;

  function copy(url) {
    navigator.clipboard.writeText(url).then(() => setToast('URL copied'));
  }

  const UrlRow = ({ label, url }) => (
    <div className="url-box" style={{marginBottom: 10}}>
      <div className="url-box-label">{label}</div>
      <div className="url-row">
        <div className="url-text">{url}</div>
        <div className="url-actions">
          <a href={url} target="_blank" rel="noopener noreferrer">
            <button className="btn btn-secondary btn-sm">Open ↗</button>
          </a>
          <button className="btn btn-primary btn-sm" onClick={() => copy(url)}>Copy</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">People & Contacts</div>
        <div className="page-sub">Generate three search URLs per company: LinkedIn network, Google X-ray, and open connections.</div>
      </div>

      <div className="card">
        <div className="card-title">Select Company</div>
        <div style={{marginBottom: 10}}>
          <div className="chips-wrap" style={{marginBottom: 8}}>
            {watchList.map(w => (
              <button key={w.id}
                className={`chip ${selectedCompany === w.company ? 'active' : ''}`}
                onClick={() => { setSelectedCompany(selectedCompany === w.company ? '' : w.company); setCustomCompany(''); }}>
                {w.company}
              </button>
            ))}
          </div>
          <input
            value={customCompany}
            onChange={e => { setCustomCompany(e.target.value); setSelectedCompany(''); }}
            placeholder="Or type any company…"
            style={{width: '100%', padding: '8px 10px', border: '1px solid #1e1e2a', borderRadius: 6, fontSize: 13, background: '#111118', color: '#e8e8f0', fontFamily: 'inherit'}}
          />
        </div>

        <div className="field" style={{marginBottom: 0}}>
          <label>Contact Role</label>
          <div className="chips-wrap">
            {CONTACT_ROLES.map(r => (
              <button key={r} className={`chip ${contactRole === r ? 'active' : ''}`}
                onClick={() => setContactRole(r)}>{r}</button>
            ))}
          </div>
        </div>
      </div>

      {urls && (
        <div className="card">
          <div className="card-title">Search URLs: {company}</div>
          <UrlRow label="LinkedIn (1st & 2nd degree)" url={urls.linkedin} />
          <UrlRow label="Google X-ray" url={urls.xray} />
          <UrlRow label="LinkedIn Open Network" url={urls.open} />
        </div>
      )}

      {!company && (
        <div className="empty-state">Select or type a company to generate search URLs.</div>
      )}
    </div>
  );
}

// ── Deep Research Mode ────────────────────────────────────────────────────────

function DeepResearch({ profile, apiKey, onNeedApiKey, demoMode = false }) {
  const [researchType, setResearchType] = useState(() => {
    const s = load(); return s?.deepResearch?.lastType || 'person';
  });
  const [personName, setPersonName] = useState('');
  const [personCompany, setPersonCompany] = useState('');
  const [companyName, setCompanyName] = useState('');
  const [roleConsidering, setRoleConsidering] = useState('');
  const [focusCompany, setFocusCompany] = useState('');
  const [focusRole, setFocusRole] = useState('');
  const [loading, setLoading] = useState(false);
  const [streamLen, setStreamLen] = useState(0);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);
  const [history, setHistory] = useState(() => {
    const s = load(); return s?.deepResearch?.history || [];
  });
  const [showHistory, setShowHistory] = useState(false);

  // Load last result + restore inputs when type tab changes
  React.useEffect(() => {
    const s = load();
    const saved = s?.deepResearch?.[`last_${researchType}`];
    setResult(saved || null);
    if (researchType === 'person') {
      const q = s?.deepResearch?.lastPersonQuery;
      if (q) { setPersonName(q.name || ''); setPersonCompany(q.company || ''); }
    } else {
      const q = s?.deepResearch?.lastCompanyQuery;
      if (q) { setCompanyName(q.company || ''); setRoleConsidering(q.role || ''); }
    }
    setError('');
  }, [researchType]);

  async function callApiStreaming(systemPrompt, userMsg, maxTokens, model = 'claude-sonnet-4-6', callType = 'research') {
    if (!apiKey) { onNeedApiKey(); return null; }
    setStreamLen(0);
    const t0 = Date.now();
    let inputTokens = 0, outputTokens = 0;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }],
        stream: true,
      }),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      trackCall({ callType, model, inputTokens: 0, outputTokens: 0, durationMs: Date.now()-t0, success: false, error: e.error?.message });
      throw new Error(e.error?.message || `API error ${res.status}`);
    }
    let fullText = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === 'message_start') inputTokens = ev.message?.usage?.input_tokens || 0;
          if (ev.type === 'message_delta') outputTokens = ev.usage?.output_tokens || 0;
          if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            fullText += ev.delta.text;
            setStreamLen(fullText.length);
          }
        } catch(_) {}
      }
    }
    trackCall({ callType, model, inputTokens, outputTokens, durationMs: Date.now()-t0, success: true });
    return JSON.parse(fullText);
  }

  function saveResult(type, data, query) {
    const stored = load() || {};
    const dr = stored.deepResearch || {};
    const hist = dr.history || [];
    const label = type === 'person'
      ? `${query.name}${query.company ? ` · ${query.company}` : ''}`
      : query.company;
    const entry = { id: Date.now(), type, label, ts: new Date().toLocaleDateString(), data };
    const newHist = [entry, ...hist.filter(h => h.label !== label)].slice(0, 10);
    const queryKey = type === 'person' ? 'lastPersonQuery' : 'lastCompanyQuery';
    persist({
      ...stored,
      deepResearch: {
        ...dr,
        lastType: type,
        [`last_${type}`]: { type, data },
        [queryKey]: query,
        history: newHist,
      }
    });
    setHistory(newHist);
  }

  async function runResearch() {
    if (demoMode) {
      setLoading(false);
      setResult({ type: 'company', data: DEMO_DATA.companyResearch });
      return;
    }
    setLoading(true); setResult(null); setError('');
    try {
      if (researchType === 'person') {
        if (!personName.trim()) return;
        const query = { name: personName.trim(), company: personCompany.trim() };
        const parsed = await callApiStreaming(buildSystemPrompt(profile), `Research ${query.name}${query.company ? ` at ${query.company}` : ''}.`, 800, 'claude-haiku-4-5-20251001', 'person_research');
        const r = { type: 'person', data: parsed };
        setResult(r);
        saveResult('person', parsed, query);
      } else if (researchType === 'company') {
        if (!companyName.trim()) return;
        const query = { company: companyName.trim(), role: roleConsidering.trim() };
        const msg = `Research the company: ${query.company}${query.role ? `. Role I am considering: ${query.role}` : ''}.`;
        const parsed = await callApiStreaming(buildCompanyPrompt(profile), msg, 1400, 'claude-sonnet-4-6', 'company_research');
        const r = { type: 'company', data: parsed };
        setResult(r);
        saveResult('company', parsed, query);
      } else {
        if (!focusCompany.trim() || !focusRole.trim()) return;
        const query = { company: focusCompany.trim(), role: focusRole.trim() };
        const msg = `Company: ${query.company}. Role: ${query.role}.`;
        const parsed = await callApiStreaming(buildFocusPrompt(profile), msg, 1400, 'claude-sonnet-4-6', 'interview_prep');
        const r = { type: 'focus', data: parsed };
        setResult(r);
        saveResult('focus', parsed, query);
      }
    } catch(e) {
      setError(e.message || 'Something went wrong. Check your API key.');
    } finally {
      setLoading(false); setStreamLen(0);
    }
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => setToast('Copied'));
  }

  function copyFullBrief() {
    if (!result) return;
    const d = result.data;
    let lines = [];
    if (result.type === 'person') {
      lines = [
        `PERSON BRIEF: ${d.name}`,
        [d.title, d.company].filter(Boolean).join(' at '),
        ...(d.matchScore ? [`Match: ${d.matchScore}/10 — ${d.matchRationale || ''}`] : []),
        '',
        'BACKGROUND', d.background,
        '', 'HOW YOU FIT', d.howYouFit,
        '', 'SHARED GROUND', d.sharedGround,
        '', 'SUGGESTED FIRST MESSAGE', d.suggestedDM,
        ...(d.interviewQuestions && d.interviewQuestions.length
          ? ['', 'CONVERSATION STARTERS', ...d.interviewQuestions.map((q, i) => `${i+1}. ${q}`)]
          : []),
        ...(d.researchNote ? ['', `NOTE: ${d.researchNote}`] : []),
      ];
    } else {
      lines = [
        `COMPANY BRIEF: ${d.name}`,
        [d.industry, d.stage, d.headcount].filter(Boolean).join(' · '),
        ...(d.matchScore ? [`Match: ${d.matchScore}/10 — ${d.matchRationale || ''}`] : []),
        '',
        'OVERVIEW', d.overview,
        '', 'PAY CONTEXT', d.payContext,
        '', 'WORK ARRANGEMENT', d.workArrangement,
        '', 'CULTURE SIGNALS', d.cultureSignals,
        ...(d.recentSignals ? ['', 'RECENT SIGNALS', d.recentSignals] : []),
        '', `COMMUTE FROM ${(profile.homeCity || 'HOME').toUpperCase()}`, d.commuteNote,
        '', 'HOW YOU FIT', d.fitAngle,
        ...(d.watchoutFlags?.length ? ['', 'RED FLAGS', ...d.watchoutFlags.map(f => `[${f.severity}] ${f.category}: ${f.finding}\n  → ${f.probe}`)] : []),
        ...(d.blindSpots?.length ? ['', 'BLIND SPOTS', ...d.blindSpots.map(b => `Gap: ${b.gap}\n  → ${b.probe}`)] : []),
        ...(d.competitors && d.competitors.length ? ['', 'COMPETITORS', d.competitors.join(', ')] : []),
        ...(d.interviewQuestions && d.interviewQuestions.length
          ? ['', 'INTERVIEW QUESTIONS', ...d.interviewQuestions.map((q, i) => `${i+1}. ${q}`)]
          : []),
        ...(d.researchNote ? ['', `NOTE: ${d.researchNote}`] : []),
      ];
    }
    copyText(lines.join('\n'));
  }

  function addToPeople(d) {
    const stored = load() || {};
    const people = stored.people || [];
    if (people.find(p => p.name === d.name && p.company === d.company)) {
      setToast('Already in People'); return;
    }
    persist({ ...stored, people: [...people, {
      id: Date.now().toString(), name: d.name, title: d.title,
      company: d.company, sharedGround: d.sharedGround,
      dm: d.suggestedDM, addedOn: new Date().toLocaleDateString(),
    }]});
    setToast(`${d.name} added to People`);
  }

  function addToWatchList(d) {
    const stored = load() || {};
    const watching = stored.kanban?.jobCards?.watching || [];
    if (watching.find(w => w.company === d.name)) {
      setToast('Already in Watch List'); return;
    }
    const kanban = stored.kanban || {};
    const jobCards = kanban.jobCards || {};
    persist({ ...stored, kanban: { ...kanban, jobCards: { ...jobCards, watching: [...watching, {
      id: Date.now().toString(), type: 'company', company: d.name,
      title: `[Company Watch] ${d.name}`, location: '',
      industry: d.industry || '', notes: d.fitAngle || '',
      addedOn: new Date().toLocaleDateString(),
    }]}}});
    setToast(`${d.name} added to Watch List`);
  }

  function buildLinkedInUrl(name, company) {
    const q = encodeURIComponent(`${name}${company ? ' ' + company : ''}`);
    return `https://www.linkedin.com/search/results/people/?keywords=${q}`;
  }

  function buildCompanyJobsUrl(name) {
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    return `https://www.linkedin.com/company/${slug}/jobs/`;
  }

  function loadFromHistory(item) {
    if (item.type !== researchType) setResearchType(item.type);
    setResult({ type: item.type, data: item.data });
    setShowHistory(false);
  }

  const canRun = researchType === 'person' ? personName.trim() : researchType === 'company' ? companyName.trim() : (focusCompany.trim() && focusRole.trim());

  const toggleStyle = (active) => ({
    padding: '8px 22px', border: 'none', borderRadius: 6, cursor: 'pointer',
    fontSize: 12, fontFamily: 'var(--mono)', fontWeight: 600, letterSpacing: '0.06em',
    background: active ? 'var(--accent)' : 'rgba(240,238,248,0.06)',
    color: active ? '#09080A' : 'var(--muted)',
    transition: 'all 0.15s',
  });

  // Section with hover-reveal copy button
  function Section({ title, children, text }) {
    const [hov, setHov] = React.useState(false);
    return (
      <div className="dossier-section" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{position:'relative'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6}}>
          <div className="dossier-section-title">{title}</div>
          {text && hov && (
            <button
              onClick={() => copyText(text)}
              style={{background:'rgba(240,238,248,.08)', border:'1px solid var(--border)', borderRadius:4, padding:'2px 8px', fontSize:10, fontFamily:'var(--mono)', color:'var(--muted)', cursor:'pointer', flexShrink:0, marginLeft:8}}
            >copy</button>
          )}
        </div>
        {children}
      </div>
    );
  }

  const qRow = (q, i) => (
    <div key={i} style={{display:'flex', gap:10, marginTop:9, alignItems:'flex-start'}}>
      <span style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--accent)', fontWeight:700, paddingTop:2, minWidth:16, flexShrink:0}}>{i+1}</span>
      <div style={{fontSize:13, color:'var(--text)', lineHeight:1.55}}>{q}</div>
    </div>
  );

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

      <div className="page-header">
        <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12}}>
          <div>
            <div className="page-title">Deep Research</div>
            <div className="page-sub">Research a person for a warm intro, or a company for a full intelligence brief before you apply or interview.</div>
          </div>
          {history.length > 0 && (
            <div style={{position:'relative', flexShrink:0}}>
              <button
                onClick={() => setShowHistory(v => !v)}
                style={{background:'rgba(240,238,248,.06)', border:'1px solid var(--border)', borderRadius:6, padding:'6px 12px', fontSize:11, fontFamily:'var(--mono)', color:'var(--muted)', cursor:'pointer', letterSpacing:'0.05em', whiteSpace:'nowrap'}}
              >
                History ({history.length})
              </button>
              {showHistory && (
                <div style={{position:'absolute', right:0, top:'calc(100% + 6px)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8, zIndex:200, minWidth:270, boxShadow:'0 8px 28px rgba(0,0,0,.55)'}}>
                  {history.map(item => (
                    <div
                      key={item.id}
                      onClick={() => loadFromHistory(item)}
                      style={{padding:'10px 14px', cursor:'pointer', borderBottom:'1px solid var(--border)', fontSize:12, fontFamily:'var(--mono)', display:'flex', alignItems:'center', gap:6}}
                      onMouseEnter={e => e.currentTarget.style.background='rgba(240,238,248,.05)'}
                      onMouseLeave={e => e.currentTarget.style.background='transparent'}
                    >
                      <span style={{fontSize:9, fontFamily:'var(--mono)', color: item.type === 'person' ? 'var(--accent)' : 'var(--muted-2)', textTransform:'uppercase', letterSpacing:'0.07em', flexShrink:0}}>{item.type}</span>
                      <span style={{color:'var(--text)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{item.label}</span>
                      <span style={{color:'var(--muted)', fontSize:10, flexShrink:0}}>{item.ts}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {!apiKey && (
        <div className="card" style={{borderColor:'rgba(201,168,76,.4)', background:'rgba(201,168,76,.06)'}}>
          <div style={{fontSize:13, color:'var(--accent)'}}>
            Anthropic API key required.{' '}
            <button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0,fontFamily:'inherit'}}>Add it in Settings.</button>
          </div>
        </div>
      )}

      {/* Input card */}
      <div className="card" style={{paddingBottom:20}}>
        <div style={{display:'flex', gap:8, marginBottom:20}}>
          <button style={toggleStyle(researchType === 'person')} onClick={() => setResearchType('person')}>Person</button>
          <button style={toggleStyle(researchType === 'company')} onClick={() => setResearchType('company')}>Company</button>
          <button style={{...toggleStyle(researchType === 'focus'), position:'relative'}} onClick={() => setResearchType('focus')}>
            Focus
            <span style={{position:'absolute', top:-5, right:-5, fontSize:8, fontFamily:'var(--mono)', padding:'1px 4px', background:'rgba(139,43,190,.7)', borderRadius:3, color:'#fff', letterSpacing:'.04em', lineHeight:1.4}}>new</span>
          </button>
        </div>

        {researchType === 'person' && (
          <div className="field-row">
            <div className="field">
              <label>Person's Name</label>
              <input value={personName} onChange={e => setPersonName(e.target.value)}
                placeholder="Jane Smith"
                onKeyDown={e => e.key === 'Enter' && canRun && runResearch()} />
            </div>
            <div className="field">
              <label>Company (optional)</label>
              <input value={personCompany} onChange={e => setPersonCompany(e.target.value)}
                placeholder="Salesforce"
                onKeyDown={e => e.key === 'Enter' && canRun && runResearch()} />
            </div>
          </div>
        )}
        {researchType === 'company' && (
          <div className="field-row">
            <div className="field">
              <label>Company Name</label>
              <input value={companyName} onChange={e => setCompanyName(e.target.value)}
                placeholder="Workday"
                onKeyDown={e => e.key === 'Enter' && canRun && runResearch()} />
            </div>
            <div className="field">
              <label>Role You're Considering (optional)</label>
              <input value={roleConsidering} onChange={e => setRoleConsidering(e.target.value)}
                placeholder="Principal PM, AI Platform"
                onKeyDown={e => e.key === 'Enter' && canRun && runResearch()} />
            </div>
          </div>
        )}
        {researchType === 'focus' && (
          <>
            <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', marginBottom:12, lineHeight:1.55}}>
              A focused brief for one specific application. Combines company intel with role specific prep and interview questions tailored to that exact combination.
            </div>
            <div className="field-row">
              <div className="field">
                <label>Company</label>
                <input value={focusCompany} onChange={e => setFocusCompany(e.target.value)}
                  placeholder="Workday"
                  onKeyDown={e => e.key === 'Enter' && canRun && runResearch()} />
              </div>
              <div className="field">
                <label>Role Title</label>
                <input value={focusRole} onChange={e => setFocusRole(e.target.value)}
                  placeholder="Principal PM, AI Platform"
                  onKeyDown={e => e.key === 'Enter' && canRun && runResearch()} />
              </div>
            </div>
          </>
        )}

        <button className="btn btn-primary" onClick={runResearch} disabled={loading || !canRun} style={{marginTop:12}}>
          {loading ? 'Researching…' : researchType === 'person' ? 'Run Person Research' : researchType === 'company' ? 'Run Company Research' : 'Run Focus Brief'}
        </button>
      </div>

      {loading && (
        <div className="card">
          <FlaskLoader text={
            researchType === 'person'
              ? `Finding shared ground with your profile${streamLen ? ` · ${streamLen.toLocaleString()} chars` : '…'}`
              : researchType === 'company'
              ? `Pulling company intelligence${streamLen ? ` · ${streamLen.toLocaleString()} chars` : '…'}`
              : `Building focus brief${streamLen ? ` · ${streamLen.toLocaleString()} chars` : '…'}`
          } />
        </div>
      )}

      {error && <div className="error-msg">{error}</div>}

      {/* ── Person Result ── */}
      {result && result.type === 'person' && (() => {
        const d = result.data;
        return (
          <div className="dossier-card">
            {/* Header row */}
            <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, flexWrap:'wrap', marginBottom:16}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
                  <div className="dossier-name">{d.name}</div>
                  {d.matchScore && (
                    <div title={d.matchRationale || ''} style={{display:'inline-flex', alignItems:'center', gap:4, padding:'2px 9px', background:'rgba(201,168,76,.14)', border:'1px solid rgba(201,168,76,.3)', borderRadius:20, cursor:'default'}}>
                      <span style={{fontSize:13, fontFamily:'var(--mono)', fontWeight:700, color:'var(--accent)', lineHeight:1}}>{d.matchScore}</span>
                      <span style={{fontSize:9, fontFamily:'var(--mono)', color:'rgba(201,168,76,.7)', letterSpacing:'.05em'}}>/10</span>
                    </div>
                  )}
                </div>
                <div className="dossier-meta">{[d.title, d.company].filter(Boolean).join(' · ')}</div>
                {d.matchRationale && <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted)', marginTop:4, lineHeight:1.4}}>{d.matchRationale}</div>}
              </div>
              <div style={{display:'flex', gap:8, flexShrink:0, flexWrap:'wrap'}}>
                <a href={buildLinkedInUrl(d.name, d.company)} target="_blank" rel="noopener noreferrer"
                  className="btn btn-secondary btn-sm"
                  style={{textDecoration:'none', display:'inline-flex', alignItems:'center', gap:4}}>
                  LinkedIn ↗
                </a>
                <button className="btn btn-secondary btn-sm" onClick={() => addToPeople(d)}>+ People</button>
                <button className="btn btn-secondary btn-sm" onClick={copyFullBrief}>Copy Brief</button>
              </div>
            </div>

            <Section title="Background" text={d.background}>
              <div className="dossier-text">{d.background}</div>
            </Section>
            <Section title="How You Fit" text={d.howYouFit}>
              <div className="dossier-text">{d.howYouFit}</div>
            </Section>
            <Section title="Shared Ground" text={d.sharedGround}>
              <div className="dossier-text">{d.sharedGround}</div>
            </Section>
            <Section title="Suggested First Message" text={d.suggestedDM}>
              <div className="dm-box">{d.suggestedDM}</div>
              <div style={{marginTop:8}}>
                <button className="btn btn-secondary btn-sm" onClick={() => copyText(d.suggestedDM)}>Copy Message</button>
              </div>
            </Section>
            {d.interviewQuestions?.length > 0 && (
              <Section title="Conversation Starters">
                {d.interviewQuestions.map(qRow)}
              </Section>
            )}
            {d.researchNote && <div className="research-note">{d.researchNote}</div>}
          </div>
        );
      })()}

      {/* ── Company Result ── */}
      {result && result.type === 'company' && (() => {
        const d = result.data;
        const chipStyle = { display:'inline-block', padding:'3px 10px', background:'rgba(201,168,76,.12)', border:'1px solid rgba(201,168,76,.22)', borderRadius:12, fontSize:11, fontFamily:'var(--mono)', color:'var(--accent)', marginRight:6, marginBottom:4 };
        const statBox = (label, value) => (
          <div style={{flex:1, minWidth:0, background:'rgba(240,238,248,.04)', border:'1px solid var(--border)', borderRadius:8, padding:'12px 14px'}}>
            <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:4}}>{label}</div>
            <div style={{fontSize:13, fontFamily:'var(--mono)', color:'var(--text)', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{value || '—'}</div>
          </div>
        );
        return (
          <div className="dossier-card">
            {/* Header row */}
            <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, flexWrap:'wrap', marginBottom:16}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
                  <div className="dossier-name">{d.name}</div>
                  {d.matchScore && (
                    <div title={d.matchRationale || ''} style={{display:'inline-flex', alignItems:'center', gap:4, padding:'2px 9px', background:'rgba(201,168,76,.14)', border:'1px solid rgba(201,168,76,.3)', borderRadius:20, cursor:'default'}}>
                      <span style={{fontSize:13, fontFamily:'var(--mono)', fontWeight:700, color:'var(--accent)', lineHeight:1}}>{d.matchScore}</span>
                      <span style={{fontSize:9, fontFamily:'var(--mono)', color:'rgba(201,168,76,.7)', letterSpacing:'.05em'}}>/10</span>
                    </div>
                  )}
                </div>
                <div className="dossier-meta">{[d.industry, d.stage, d.headcount].filter(Boolean).join(' · ')}</div>
                {d.matchRationale && <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted)', marginTop:4, lineHeight:1.4}}>{d.matchRationale}</div>}
              </div>
              <div style={{display:'flex', gap:8, flexShrink:0, flexWrap:'wrap'}}>
                <a href={buildCompanyJobsUrl(d.name)} target="_blank" rel="noopener noreferrer"
                  className="btn btn-secondary btn-sm"
                  style={{textDecoration:'none', display:'inline-flex', alignItems:'center', gap:4}}>
                  Open Roles ↗

// ── SMB Prospecting Mode ──────────────────────────────────────────────────────

const SMB_INDUSTRIES = [
  'HR Tech', 'FinTech', 'HealthTech', 'RetailTech', 'LegalTech',
  'InsurTech', 'Supply Chain Tech', 'PropTech', 'EdTech', 'AgTech',
];

const SMB_STAGES = [
  'Bootstrapped', 'Pre-Seed / Seed', 'Series A', 'Series B/C', 'Scale-up', 'PE-backed SMB',
];

const SMB_ROLES = [
  'Founder / CEO', 'CPO', 'CTO', 'Head of Product', 'VP Product', 'VP Engineering',
];

const SMB_PAIN_POINTS = [
  'AI strategy', 'Product-market fit', 'AI governance', 'Platform architecture',
  'Regulated workflows', 'Go-to-market', 'Enterprise readiness',
];

function buildSMBLinkedInURL(industry, role) {
  const q = `${role} ${industry}`;
  const params = new URLSearchParams();
  params.set('keywords', q);
  params.set('origin', 'GLOBAL_SEARCH_HEADER');
  return `https://www.linkedin.com/search/results/people/?${params.toString()}`;
}

function buildSMBGoogleURL(industry, painPoint) {
  const q = `site:linkedin.com/in "${industry}" "${painPoint}" (founder OR CPO OR "head of product" OR CTO)`;
  return `https://www.google.com/search?q=${encodeURIComponent(q)}`;
}

function SMBProspecting({ profile, apiKey, onNeedApiKey }) {
  const [industry, setIndustry] = useState('HR Tech');
  const [stage, setStage] = useState('Series A');
  const [role, setRole] = useState('Founder / CEO');
  const [painPoint, setPainPoint] = useState('AI strategy');
  const [loading, setLoading] = useState(false);
  const [pitch, setPitch] = useState(null);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);

  const liURL = buildSMBLinkedInURL(industry, role);
  const googleURL = buildSMBGoogleURL(industry, painPoint);

  function copyURL(url) {
    navigator.clipboard.writeText(url).then(() => setToast('URL copied'));
  }

  async function generatePitch() {
    if (!apiKey) { onNeedApiKey(); return; }
    setLoading(true); setPitch(null); setError('');
    try {
      const systemMsg = `You are a positioning expert helping ${profile.name} pitch consulting services through Perez Creative Labs. Her background: ${profile.background} Her edge: ${profile.edge}. Write punchy, direct prose — no corporate language, no bullet points in the pitch itself.`;
      const userMsg = `Generate a consulting pitch for ${industry} companies at ${stage} stage who need help with "${painPoint}". Target contact: ${role}. Output valid JSON only: { "hook": "one sharp sentence that names the problem they have", "value": "2 sentences on what we deliver and how", "proof": "one credibility statement using the background above", "ask": "specific, low-friction call to action" }`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 550, system: systemMsg, messages: [{ role: 'user', content: userMsg }] }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const parsed = JSON.parse(data.content?.[0]?.text || '{}');
      setPitch(parsed);
    } catch(e) { setError(e.message || 'Something went wrong.'); }
    finally { setLoading(false); }
  }

  const UrlRow = ({ label, url }) => (
    <div className="url-box" style={{marginBottom: 10}}>
      <div className="url-box-label">{label}</div>
      <div className="url-row">
        <div className="url-text">{url}</div>
        <div className="url-actions">
          <a href={url} target="_blank" rel="noopener noreferrer"><button className="btn btn-secondary btn-sm">Open ↗</button></a>
          <button className="btn btn-primary btn-sm" onClick={() => copyURL(url)}>Copy</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">SMB Prospecting</div>
        <div className="page-sub">Find consulting prospects for Perez Creative Labs — SMBs that need AI product strategy, governance, or platform design.</div>
      </div>

      <div className="card">
        <div className="card-title">Industry</div>
        <div className="chips-wrap">
          {SMB_INDUSTRIES.map(i => (
            <button key={i} className={`chip ${industry === i ? 'active' : ''}`} onClick={() => setIndustry(i)}>{i}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex', gap: 24, flexWrap:'wrap'}}>
          <div style={{flex: 1, minWidth: 200}}>
            <div className="card-title" style={{marginBottom: 8}}>Company Stage</div>
            <div className="chips-wrap">
              {SMB_STAGES.map(s => (
                <button key={s} className={`chip ${stage === s ? 'active' : ''}`} onClick={() => setStage(s)}>{s}</button>
              ))}
            </div>
          </div>
          <div style={{flex: 1, minWidth: 200}}>
            <div className="card-title" style={{marginBottom: 8}}>Target Role</div>
            <div className="chips-wrap">
              {SMB_ROLES.map(r => (
                <button key={r} className={`chip ${role === r ? 'active' : ''}`} onClick={() => setRole(r)}>{r}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Pain Point / Need</div>
        <div className="chips-wrap">
          {SMB_PAIN_POINTS.map(p => (
            <button key={p} className={`chip ${painPoint === p ? 'active' : ''}`} onClick={() => setPainPoint(p)}>{p}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Search URLs: {industry} · {stage} · {role}</div>
        <UrlRow label="LinkedIn People Search" url={liURL} />
        <UrlRow label="Google X-ray (Decision Makers)" url={googleURL} />
      </div>

      <div className="card">
        <div className="card-title">PCL Pitch Generator</div>
        <div style={{fontSize: 12, color: '#8888a0', marginBottom: 12}}>Uses Claude to generate a targeted pitch for this segment using your background as the proof point.</div>
        {!apiKey && (
          <div style={{fontSize: 13, color: '#92400E', background: '#1a1200', border: '1px solid #92400E', borderRadius: 6, padding: '8px 12px', marginBottom: 12}}>
            ⚠️ Requires API key.{' '}<button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'#C9A84C',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0}}>Add in Settings.</button>
          </div>
        )}
        <button className="btn btn-primary" onClick={generatePitch} disabled={loading}>
          {loading ? 'Generating…' : 'Generate Pitch'}
        </button>
        {loading && <div style={{marginTop: 12}}><FlaskLoader text={`Building pitch for ${industry} · ${role}…`} /></div>}
        {error && <div className="error-msg" style={{marginTop: 8}}>{error}</div>}
        {pitch && (
          <div style={{marginTop: 16}}>
            <div className="dossier-section"><div className="dossier-section-title">Hook</div><div className="dossier-text">{pitch.hook}</div></div>
            <div className="dossier-section"><div className="dossier-section-title">Value</div><div className="dossier-text">{pitch.value}</div></div>
            <div className="dossier-section"><div className="dossier-section-title">Proof</div><div className="dossier-text">{pitch.proof}</div></div>
            <div className="dossier-section">
              <div className="dossier-section-title">Ask</div>
              <div className="dm-box">{pitch.ask}</div>
              <div style={{marginTop: 8}}>
                <button className="btn btn-secondary btn-sm" onClick={() => navigator.clipboard.writeText([pitch.hook, pitch.value, pitch.proof, pitch.ask].join('\n\n')).then(() => setToast('Pitch copied'))}>Copy Full Pitch</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Networking Mode ───────────────────────────────────────────────────────────

const NETWORK_CONTEXTS = [
  'Former colleague', 'Conference / event', 'Online community',
  'Warm intro', 'Alumni network', 'Content creator', 'Cold outreach',
];

const NETWORK_PLATFORMS = [
  'LinkedIn DM', 'Twitter / X', 'Slack community', 'Email', 'Facebook', 'Instagram DM',
];

const NETWORK_GOALS = [
  'Job referral', 'Consulting lead', 'Coffee chat / advice',
  'Partnership', 'Thought leadership', 'Community building',
];

function Networking({ profile, apiKey, onNeedApiKey }) {
  const [context, setContext] = useState('Former colleague');
  const [platform, setPlatform] = useState('LinkedIn DM');
  const [goal, setGoal] = useState('Job referral');
  const [targetName, setTargetName] = useState('');
  const [targetCompany, setTargetCompany] = useState('');
  const [loading, setLoading] = useState(false);
  const [outreach, setOutreach] = useState(null);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);

  async function generateOutreach() {
    if (!apiKey) { onNeedApiKey(); return; }
    if (!targetName.trim()) return;
    setLoading(true); setOutreach(null); setError('');
    try {
      const systemMsg = `You are helping ${profile.name} with strategic networking. Background: ${profile.background} Edge: ${profile.edge}. Write in first person as ${profile.name || 'the user'}. Be warm, direct, and human — not salesy. Match the length and tone to the platform.`;
      const userMsg = `Write a networking outreach message to: ${targetName.trim()}${targetCompany.trim() ? ` at ${targetCompany.trim()}` : ''}. Relationship context: ${context}. Platform: ${platform}. Goal: ${goal}. Output valid JSON only: { "subject": "subject line if email, null if DM", "message": "the full message, natural and human, no placeholder brackets", "followUpNote": "internal note — best timing to follow up and what to watch for" }`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 600, system: systemMsg, messages: [{ role: 'user', content: userMsg }] }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const parsed = JSON.parse(data.content?.[0]?.text || '{}');
      setOutreach(parsed);
    } catch(e) { setError(e.message || 'Something went wrong.'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Networking</div>
        <div className="page-sub">Generate warm, targeted outreach for any networking context: job referral, consulting lead, coffee chat, or community connection.</div>
      </div>

      <div className="card">
        <div className="field-row">
          <div className="field">
            <label>Person's Name</label>
            <input value={targetName} onChange={e => setTargetName(e.target.value)} placeholder="Jane Smith" onKeyDown={e => e.key === 'Enter' && generateOutreach()} />
          </div>
          <div className="field">
            <label>Company (optional)</label>
            <input value={targetCompany} onChange={e => setTargetCompany(e.target.value)} placeholder="Salesforce" onKeyDown={e => e.key === 'Enter' && generateOutreach()} />
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Relationship Context</div>
        <div className="chips-wrap">
          {NETWORK_CONTEXTS.map(c => (
            <button key={c} className={`chip ${context === c ? 'active' : ''}`} onClick={() => setContext(c)}>{c}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex', gap: 24, flexWrap:'wrap'}}>
          <div style={{flex: 1, minWidth: 180}}>
            <div className="card-title" style={{marginBottom: 8}}>Platform</div>
            <div className="chips-wrap">
              {NETWORK_PLATFORMS.map(p => (
                <button key={p} className={`chip ${platform === p ? 'active' : ''}`} onClick={() => setPlatform(p)}>{p}</button>
              ))}
            </div>
          </div>
          <div style={{flex: 1, minWidth: 180}}>
            <div className="card-title" style={{marginBottom: 8}}>Goal</div>
            <div className="chips-wrap">
              {NETWORK_GOALS.map(g => (
                <button key={g} className={`chip ${goal === g ? 'active' : ''}`} onClick={() => setGoal(g)}>{g}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        {!apiKey && (
          <div style={{fontSize: 13, color: '#92400E', background: '#1a1200', border: '1px solid #92400E', borderRadius: 6, padding: '8px 12px', marginBottom: 12}}>
            ⚠️ Requires API key.{' '}<button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'#C9A84C',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0}}>Add in Settings.</button>
          </div>
        )}
        <button className="btn btn-primary" onClick={generateOutreach} disabled={loading || !targetName.trim()}>
          {loading ? 'Writing…' : 'Generate Outreach'}
        </button>
        {loading && <div style={{marginTop: 12}}><FlaskLoader text={`Writing your ${goal.toLowerCase()} message…`} /></div>}
        {error && <div className="error-msg" style={{marginTop: 8}}>{error}</div>}
        {outreach && (
          <div style={{marginTop: 16}}>
            {outreach.subject && (
              <div className="dossier-section"><div className="dossier-section-title">Subject</div><div className="dossier-text">{outreach.subject}</div></div>
            )}
            <div className="dossier-section">
              <div className="dossier-section-title">Message</div>
              <div className="dm-box" style={{whiteSpace: 'pre-wrap'}}>{outreach.message}</div>
              <div style={{marginTop: 8}}>
                <button className="btn btn-secondary btn-sm" onClick={() => navigator.clipboard.writeText(outreach.message).then(() => setToast('Message copied'))}>Copy Message</button>
              </div>
            </div>
            {outreach.followUpNote && <div className="research-note">{outreach.followUpNote}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsModal({ profile, setProfile, watchList, setWatchList, apiKey, setApiKey, calTokens, setCalTokens, googleClientId, setGoogleClientId, onConnectCalendar, onClose }) {
  const [tab, setTab] = useState('profile');
  const [localProfile, setLocalProfile] = useState({...profile});
  const [localKey, setLocalKey] = useState(apiKey);
  const [localWatch, setLocalWatch] = useState([...watchList]);
  const [localCalTokens, setLocalCalTokens] = useState([...(calTokens || [])]);
  const [localGCId, setLocalGCId] = useState(googleClientId || '');
  const [keyEditMode, setKeyEditMode] = useState(!apiKey);
  const [newCompany, setNewCompany] = useState('');
  const [newTier, setNewTier] = useState('2');
  const [toast, setToast] = useState(null);
  // Smart Profile Builder state
  const [smartText, setSmartText] = useState('');
  const [smartLoading, setSmartLoading] = useState(false);
  const [smartError, setSmartError] = useState(null);

  const activeKey = localKey || apiKey;
  const detectedProvider = detectProvider(activeKey);
  const providerLabel = detectedProvider === 'openai' ? 'OpenAI' : detectedProvider === 'google' ? 'Google' : detectedProvider === 'anthropic' ? 'Anthropic' : null;

  async function buildFromText() {
    if (!smartText.trim()) return;
    if (!activeKey) { setSmartError('Add an API key first — any provider works.'); return; }
    setSmartLoading(true); setSmartError(null);
    const prompt = `Extract career profile data from the text below. Return ONLY valid JSON with these exact keys:
- "name": full name (string or null)
- "role": target/current job title (string)
- "targetDomain": 2-3 domain keywords, comma separated (string)
- "background": 2-3 sentences describing experience (string)
- "edge": unique competitive advantage — include specifics, numbers, named skills (string)
- "homeCity": city, state if mentioned (string or null)

Text:
${smartText}

Return ONLY the JSON object. No markdown, no explanation.`;
    try {
      const text = await callAI(activeKey, prompt, 600);
      const clean = text.replace(/```json\n?|\n?```/g, '').trim();
      const extracted = JSON.parse(clean);
      setLocalProfile(prev => ({
        ...prev,
        ...(extracted.name && { name: extracted.name }),
        ...(extracted.role && { role: extracted.role }),
        ...(extracted.targetDomain && { targetDomain: extracted.targetDomain }),
        ...(extracted.background && { background: extracted.background }),
        ...(extracted.edge && { edge: extracted.edge }),
        ...(extracted.homeCity && { homeCity: extracted.homeCity }),
      }));
      setSmartText('');
      setToast('Profile extracted — review and save');
    } catch(e) {
      setSmartError('Extraction failed — try pasting more detail or check your API key.');
    } finally {
      setSmartLoading(false);
    }
  }

  const edgeScore = scoreEdge(localProfile.edge);
  const barColor = edgeScore >= 70 ? '#22C55E' : edgeScore >= 40 ? '#F59E0B' : '#EF4444';

  function save() {
    setProfile(localProfile);
    setApiKey(localKey);
    setWatchList(localWatch);
    setCalTokens(localCalTokens);
    setGoogleClientId(localGCId);
    setKeyEditMode(!localKey); // stay in edit mode only if key is still empty
    onClose();
  }

  function addCompany() {
    if (!newCompany.trim()) return;
    const id = Date.now();
    setLocalWatch([...localWatch, { id, company: newCompany.trim(), tier: parseInt(newTier) }]);
    setNewCompany('');
  }

  function removeCompany(id) {
    setLocalWatch(localWatch.filter(w => w.id !== id));
  }

  const TabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)}
      style={{padding:'6px 14px', border:'none', background: tab===id ? 'rgba(245,156,0,0.10)' : 'none',
        borderRadius: 6, cursor:'pointer', fontSize: 13, fontWeight: tab===id ? 600 : 400,
        color: tab===id ? '#f59c00' : '#8888a0', fontFamily: 'inherit'}}>
      {label}
    </button>
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Settings</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        <div style={{padding:'12px 24px 0', display:'flex', gap:4, borderBottom:'1px solid #1e1e2a'}}>
          <TabBtn id="profile" label="Profile" />
          <TabBtn id="watchlist" label="Watch List" />
          <TabBtn id="api" label="API Key" />
          <TabBtn id="calendar" label="Calendar" />
        </div>

        <div className="modal-body">
{tab === 'profile' && (
            <div>
              <div style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',background:'rgba(91,184,112,.06)',border:'1px solid rgba(91,184,112,.18)',borderRadius:6,marginBottom:14,fontSize:12,color:'rgba(91,184,112,.85)',lineHeight:1.6}}>
                <span style={{flexShrink:0,marginTop:1}}>🔒</span>
                <span>Your profile data stays in this browser only — it is never sent to any server except when you explicitly run an AI call. KPI snapshot exports may contain personal data; store them carefully.</span>
              </div>

              {/* ── Smart Profile Builder ── */}
              <div style={{marginBottom:18,padding:'12px 14px',background:'rgba(61,26,136,.08)',border:'1px solid rgba(139,43,190,.2)',borderRadius:8}}>
                <div style={{fontSize:11,fontFamily:'var(--mono)',letterSpacing:'.12em',textTransform:'uppercase',color:'rgba(139,43,190,.9)',marginBottom:6}}>
                  ✦ Smart Profile Builder
                </div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.65}}>
                  Paste your LinkedIn About section, resume summary, or any career bio. AI will extract and fill your profile fields automatically. Works with any API key.
                </div>
                <textarea
                  rows={4}
                  value={smartText}
                  onChange={e => setSmartText(e.target.value)}
                  placeholder="Paste your LinkedIn About section, resume summary, or bio here…"
                  style={{width:'100%',padding:'9px 11px',background:'rgba(0,0,0,.3)',border:'1px solid rgba(139,43,190,.2)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'var(--mono)',lineHeight:1.6,resize:'vertical',marginBottom:8}}
                />
                {smartError && (
                  <div style={{fontSize:11,color:'rgba(208,24,120,.8)',marginBottom:8}}>{smartError}</div>
                )}
                <button
                  className="btn btn-primary"
                  style={{padding:'7px 18px',fontSize:12}}
                  onClick={buildFromText}
                  disabled={smartLoading || !smartText.trim()}>
                  {smartLoading ? 'Extracting…' : activeKey ? `Extract with ${providerLabel || 'AI'}` : 'Add API key first'}
                </button>
              </div>
              <div className="field">
                <label>Name</label>
                <input value={localProfile.name} onChange={e => setLocalProfile({...localProfile, name: e.target.value})} />
              </div>
              <div className="field">
                <label>Target Role</label>
                <input value={localProfile.role} onChange={e => setLocalProfile({...localProfile, role: e.target.value})} />
              </div>
              <div className="field">
                <label>Home City (used for commute analysis in Company Research)</label>
                <input value={localProfile.homeCity || ''} onChange={e => setLocalProfile({...localProfile, homeCity: e.target.value})} placeholder="Boston, MA" />
              </div>
              <div className="field">
                <label>Domain Focus</label>
                <input value={localProfile.targetDomain} onChange={e => setLocalProfile({...localProfile, targetDomain: e.target.value})} />
              </div>
              <div className="field">
                <label>Background</label>
                <textarea rows={4} value={localProfile.background} onChange={e => setLocalProfile({...localProfile, background: e.target.value})} />
              </div>
              <div className="field">
                <label>Competitive Edge (your signal — drives all AI research and outreach)</label>
                <textarea rows={5} value={localProfile.edge} onChange={e => setLocalProfile({...localProfile, edge: e.target.value})} />
                <div className="edge-meter">
                  <div className="edge-bar-track">
                    <div className="edge-bar-fill" style={{width: `${edgeScore}%`, background: barColor}} />
                  </div>
                  <div className="edge-score-row">
                    <span>{edgeScore < 40 ? 'Too abstract — add numbers and named specifics' : edgeScore < 70 ? 'Getting there — more specifics help' : 'Strong edge statement'}</span>
                    <span>{edgeScore}/100</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {tab === 'watchlist' && (
            <div>
              <div className="add-row">
                <input value={newCompany} onChange={e => setNewCompany(e.target.value)}
                  placeholder="Add company…"
                  onKeyDown={e => e.key === 'Enter' && addCompany()}
                  style={{flex:1, padding:'8px 10px', border:'1px solid #1e1e2a', borderRadius:6, fontSize:13, background:'#111118', color:'#e8e8f0', fontFamily:'inherit'}} />
                <div style={{position:'relative'}}>
                  <select value={newTier} onChange={e => setNewTier(e.target.value)}
                    style={{padding:'8px 28px 8px 10px', border:'1px solid #1e1e2a', borderRadius:6, fontSize:13, background:'#16161f', color:'#e8e8f0'}}>
                    <option value="1">Tier 1</option>
                    <option value="2">Tier 2</option>
                    <option value="3">Tier 3</option>
                  </select>
                </div>
                <button className="btn btn-primary" onClick={addCompany}>Add</button>
              </div>
              <table className="watch-table">
                <thead>
                  <tr>
                    <th>Company</th>
                    <th>Tier</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {localWatch.map(w => (
                    <tr key={w.id}>
                      <td>{w.company}</td>
                      <td>
                        <span className={`tier-badge tier-${w.tier}`}>T{w.tier}</span>
                      </td>
                      <td style={{textAlign:'right'}}>
                        <button className="btn btn-sm btn-danger" onClick={() => removeCompany(w.id)}>Remove</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

{tab === 'calendar' && (
            <div>
              <div style={{display:'flex',alignItems:'flex-start',gap:8,padding:'10px 12px',background:'rgba(91,143,208,.06)',border:'1px solid rgba(91,143,208,.2)',borderRadius:6,marginBottom:16,fontSize:12,color:'rgba(91,143,208,.85)',lineHeight:1.65}}>
                <span style={{flexShrink:0,marginTop:1}}>📅</span>
                <span>Connect Google Calendar to auto-detect interviews, networking, and SMB events and import them to your boards. Requires a free Google Cloud project with Calendar API enabled.</span>
              </div>

              <div className="field">
                <label>Google OAuth Client ID</label>

                  value={localGCId}
                  onChange={e => setLocalGCId(e.target.value)}

                <div style={{fontSize:11,color:'var(--muted-2)',marginTop:8,lineHeight:1.75}}>
