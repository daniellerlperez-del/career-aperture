              <div className="field" style={{marginTop:16}}>

{tab === 'api' && (

                    <span style={{fontSize:10,fontFamily:'var(--mono)',padding:'2px 8px',borderRadius:3,
                      background: detectProvider(localKey) === 'openai' ? 'rgba(16,163,127,.12)' : 'rgba(201,168,76,.1)',
                      color: detectProvider(localKey) === 'openai' ? 'rgba(16,163,127,.9)' : 'var(--accent)',

                      Change
                    </button>
                  </div>
                ) : (
                  <div style={{display:'flex',gap:6}}>
                    <input type="password" value={localKey} onChange={e => setLocalKey(e.target.value)}
                      placeholder="sk-ant-… or sk-… (Anthropic or OpenAI)" autoComplete="new-password" style={{flex:1}} />

                      <button onClick={() => { setLocalKey(apiKey); setKeyEditMode(false); }}

                    )}

                )}

                </div>
              </div>
            </div>
          )}

        </div>

  );
}

// ── Role Selector ────────────────────────────────────────────────────────────

function KeywordSelector({ mustKws, setMustKws, optKws, setOptKws }) {
  const [open, setOpen] = useState(false);
  const [custom, setCustom] = useState('');
  const ref = React.useRef(null);

  useEffect(() => {
    function onOutside(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onOutside);
    return () => document.removeEventListener('mousedown', onOutside);
  }, []);

  const isChecked = (label) => mustKws.includes(label) || optKws.includes(label);
  const isMust    = (label) => mustKws.includes(label);

  function toggle(label) {
    if (mustKws.includes(label)) {
      // remove from must
      setMustKws(prev => prev.filter(x => x !== label));
    } else if (optKws.includes(label)) {
      // remove from optional
      setOptKws(prev => prev.filter(x => x !== label));
    } else {
      // add as optional first
      setOptKws(prev => [...prev, label]);
    }
  }

  function cycleMode(label, e) {
    e.preventDefault();
    e.stopPropagation();
    if (mustKws.includes(label)) {
      // must → remove
      setMustKws(prev => prev.filter(x => x !== label));
    } else if (optKws.includes(label)) {
      // optional → must
      setOptKws(prev => prev.filter(x => x !== label));
      setMustKws(prev => [...prev, label]);
    }
  }

  function addCustom() {
    const v = custom.trim();
    if (!v) return;
    if (!mustKws.includes(v) && !optKws.includes(v)) setOptKws(prev => [...prev, v]);
    setCustom('');
  }

  function removeKw(label) {
    setMustKws(prev => prev.filter(x => x !== label));
    setOptKws(prev => prev.filter(x => x !== label));
  }

  const recommended = DOMAIN_KEYWORDS.filter(k => k.recommended);
  const other       = DOMAIN_KEYWORDS.filter(k => !k.recommended);
  const totalCount  = mustKws.length + optKws.length;

  function KwOption({ label, isRec }) {
    const checked  = isChecked(label);
    const must     = isMust(label);
    return (
      <div className="role-option">
        <input type="checkbox" checked={checked} onChange={() => toggle(label)} />
        <span style={checked ? {color: must ? '#ff88b0' : 'var(--accent)'} : {}}>{label}</span>
        {isRec && !checked && <span className="role-rec-badge">✦ rec</span>}
        {checked && (
          <button
            className={`role-option-mode ${must ? 'must' : 'opt'}`}
            onClick={(e) => cycleMode(label, e)}
            title={must ? 'Click to remove' : 'Click to promote to Must Fit'}
          >{must ? 'must' : 'opt'}</button>
        )}
      </div>
    );
  }

  return (
    <div className="role-selector" ref={ref}>
      <button className={`role-trigger ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
        <span>
          {totalCount === 0
            ? 'Select domain keywords…'
            : `${totalCount} keyword${totalCount > 1 ? 's' : ''}${mustKws.length > 0 ? ` · ${mustKws.length} must` : ''}`}
        </span>
        <span className="caret">▾</span>
      </button>

      {open && (
        <div className="role-panel">
          <div className="role-group-hdr">Recommended for your background</div>
          {recommended.map(k => <KwOption key={k.label} label={k.label} isRec={true} />)}
          <div className="role-group-hdr other">All keywords</div>
          {other.map(k => <KwOption key={k.label} label={k.label} isRec={false} />)}
          <div style={{padding:'8px 12px 10px', borderTop:'1px solid var(--border)'}}>
            <div style={{display:'flex', gap:6}}>
              <input
                value={custom}
                onChange={e => setCustom(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCustom(); } }}
                placeholder="Add custom keyword…"
                style={{flex:1, fontSize:12, padding:'5px 8px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', fontFamily:'var(--mono)'}}
              />
              <button className="btn btn-secondary btn-sm" onClick={addCustom} disabled={!custom.trim()}>Add</button>
            </div>
          </div>
        </div>
      )}

      {totalCount > 0 && (
        <div>
          <div className="role-pills">
            {mustKws.map(label => (
              <span key={label} className="role-pill must" title="Must fit — AND logic">
                ⊕ {label}
                <button className="role-pill-x" onClick={() => removeKw(label)}>×</button>
              </span>
            ))}
            {optKws.map(label => (
              <span key={label} className="role-pill" title="Other fits — OR logic">
                {label}
                <button className="role-pill-x" onClick={() => removeKw(label)}>×</button>
              </span>
            ))}
          </div>
          <div className="kw-hint">
            <span className="h-must">must</span> required in results (AND) &nbsp;·&nbsp;
            <span className="h-opt">opt</span> nice to have (OR) &nbsp;·&nbsp; click badge to promote
          </div>
        </div>
      )}
    </div>
  );
}

function RoleSelector({ selected, setSelected }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  useEffect(() => {
    function onOutside(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onOutside);
    return () => document.removeEventListener('mousedown', onOutside);
  }, []);

  function toggle(label) {
    setSelected(prev => prev.includes(label) ? prev.filter(x => x !== label) : [...prev, label]);
  }

  const recommended = JOB_ROLES.filter(r => r.recommended);
  const other = JOB_ROLES.filter(r => !r.recommended);
  const count = selected.length;

  return (
    <div className="role-selector" ref={ref}>
      <button className={`role-trigger ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
        <span>{count === 0 ? 'Select target roles…' : `${count} role${count > 1 ? 's' : ''} selected`}</span>
        <span className="caret">▾</span>
      </button>

      {open && (
        <div className="role-panel">
          <div className="role-group-hdr">Recommended for your background</div>
          {recommended.map(r => (
            <label key={r.label} className="role-option">
              <input type="checkbox" checked={selected.includes(r.label)} onChange={() => toggle(r.label)} />
              <span>{r.label}</span>
              <span className="role-rec-badge">✦ rec</span>
            </label>
          ))}
          <div className="role-group-hdr other">All roles</div>
          {other.map(r => (
            <label key={r.label} className="role-option">
              <input type="checkbox" checked={selected.includes(r.label)} onChange={() => toggle(r.label)} />
              <span>{r.label}</span>
            </label>
          ))}
        </div>
      )}

      {selected.length > 0 && (
        <div className="role-pills">
          {selected.map(label => (
            <span key={label} className="role-pill">
              {label}
              <button className="role-pill-x" onClick={() => toggle(label)}>×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Job Fit Mode ──────────────────────────────────────────────────────────────

function JobValue() {
  const [toast, setToast] = useState(null);

  // Offer
  const [company, setCompany]       = useState('');
  const [role, setRole]             = useState('');
  const [base, setBase]             = useState('');
  const [bonusPct, setBonusPct]     = useState('');
  const [equity, setEquity]         = useState('');
  const [signing, setSigning]       = useState('');

  // Benefits
  const [healthMo, setHealthMo]         = useState('');
  const [k401Match, setK401Match]       = useState('');
  const [k401Contrib, setK401Contrib]   = useState('6');
  const [ptoDays, setPtoDays]           = useState('');
  const [remoteStipend, setRemoteStipend] = useState('');
  const [learningBudget, setLearningBudget] = useState('');

  // Work style
  const [arrangement, setArrangement]   = useState('hybrid');
  const [officeDays, setOfficeDays]     = useState('2');
  const [weeklyHours, setWeeklyHours]   = useState('40');

  // QoL (1–5)
  const [growth, setGrowth]         = useState(3);
  const [manager, setManager]       = useState(3);
  const [culture, setCulture]       = useState(3);
  const [wlb, setWlb]               = useState(3);
  const [excitement, setExcitement] = useState(3);

  // Commute
  const [miles, setMiles]           = useState('');
  const [gasPrice, setGasPrice]     = useState('3.50');
  const [mpg, setMpg]               = useState('28');
  const [depPerMile, setDepPerMile] = useState('0.21');
  const [parking, setParking]       = useState('0');
  const [tolls, setTolls]           = useState('0');
  const [commuteMin, setCommuteMin] = useState('');

  // Negotiation rounds
  const [rounds, setRounds]               = useState([]);
  const [roundForm, setRoundForm]         = useState({ label: '', base: '', bonus: '', equity: '', signing: '', notes: '' });
  const [showRoundForm, setShowRoundForm] = useState(false);

  // Helpers
  const n   = v => parseFloat(v) || 0;
  const fmt = v => v >= 1000 ? '$' + Math.round(v).toLocaleString('en-US') : '$' + Math.round(v);
  const fmtK = v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'K' : '$' + Math.round(v);

  // ---- Calculations ----
  const baseNum      = n(base);
  const bonusDollars = baseNum * (n(bonusPct) / 100);
  const equityNum    = n(equity);
  const signingAmort = n(signing) / 2;

  const healthValue  = n(healthMo) * 12;
  const matchPct     = Math.min(n(k401Match), n(k401Contrib));
  const k401Value    = baseNum * (matchPct / 100);
  const ptoValue     = baseNum > 0 ? (baseNum / 260) * n(ptoDays) : 0;
  const totalBenefits = healthValue + k401Value + ptoValue + n(remoteStipend) + n(learningBudget);
  const grossComp    = baseNum + bonusDollars + equityNum + signingAmort + totalBenefits;

  // Commute
  const commuteDays  = arrangement === 'remote' ? 0 : n(officeDays);
  const annualTrips  = commuteDays * 52;
  const annualMiles  = n(miles) * 2 * annualTrips;
  const gasCost      = n(mpg) > 0 ? (annualMiles / n(mpg)) * n(gasPrice) : 0;
  const depCost      = annualMiles * n(depPerMile);
  const parkCost     = n(parking) * 12;
  const tollCost     = n(tolls) * 12;
  const commuteHrs   = (n(commuteMin) / 60) * 2 * annualTrips;
  const hourlyRate   = baseNum / 2080;
  const timeCost     = commuteHrs * hourlyRate;
  const totalCommute = gasCost + depCost + parkCost + tollCost + timeCost;
  const netAdjusted  = grossComp - totalCommute;

  // QoL 0–100
  const qolScore  = Math.round(((growth + manager + culture + wlb + excitement) / 25) * 100);
  const hrsPenalty = weeklyHours === '45' ? 11 : weeklyHours === '50+' ? 20 : 0;

  function getRating(q) {
    if (q >= 80) return { label: 'Strong Accept', color: '#3aad6e',  bg: 'rgba(58,173,110,.10)',  border: 'rgba(58,173,110,.28)' };
    if (q >= 60) return { label: 'Accept',        color: '#7dd4a0',  bg: 'rgba(58,173,110,.06)',  border: 'rgba(58,173,110,.18)' };
    if (q >= 40) return { label: 'Negotiate',     color: 'var(--accent)', bg: 'var(--accent-dim)', border: 'var(--accent-bdr)' };
    if (q >= 20) return { label: 'Caution',       color: '#E86020',  bg: 'rgba(232,96,32,.10)',   border: 'rgba(232,96,32,.28)' };
    return          { label: 'Decline',           color: '#D01878',  bg: 'rgba(208,24,120,.10)',  border: 'rgba(208,24,120,.28)' };
  }
  const rating = getRating(qolScore);

  function addRound() {
    if (!roundForm.label && !roundForm.base) return;
    setRounds(prev => [...prev, {
      id: Date.now(),
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      ...roundForm,
    }]);
    setRoundForm({ label: '', base: '', bonus: '', equity: '', signing: '', notes: '' });
    setShowRoundForm(false);
  }

  function copyOfferSummary() {
    const lines = [
      `OFFER ANALYSIS — ${company || 'Company'} / ${role || 'Role'}`,
      ``,
      `BASE SALARY          ${fmt(baseNum)}`,
      `ANNUAL BONUS         ${fmt(bonusDollars)}  (${n(bonusPct)}%)`,
      `EQUITY (annual)      ${fmt(equityNum)}`,
      `SIGNING (amort/yr)   ${fmt(signingAmort)}`,
      `BENEFITS VALUE       ${fmt(totalBenefits)}`,
      `GROSS TOTAL COMP     ${fmt(grossComp)}`,
      ``,
      `ANNUAL COMMUTE COST  ${fmt(totalCommute)}`,
      `NET ADJUSTED COMP    ${fmt(netAdjusted)}`,
      ``,
      `QOL SCORE            ${qolScore}/100  —  ${rating.label}`,
      `ARRANGEMENT          ${arrangement.toUpperCase()}  |  ${weeklyHours}hrs/wk`,
      hrsPenalty > 0 ? `HOURS PENALTY        effective hourly rate is ~${hrsPenalty}% lower than 40hr baseline` : '',
    ].filter(l => l !== null);
    navigator.clipboard.writeText(lines.join('\n')).then(() => setToast('Summary copied'));
  }

  const RatingSlider = ({ label, value, onChange }) => (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
        <span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--muted)', letterSpacing: '.04em' }}>{label}</span>
        <span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--accent)' }}>{value}/5</span>
      </div>
      <input type="range" min="1" max="5" value={value} onChange={e => onChange(Number(e.target.value))}
        style={{ width: '100%', accentColor: 'var(--accent)', cursor: 'pointer', height: 4 }} />
    </div>
  );

  const StatRow = ({ label, val, accent, dim }) => (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid var(--border)' }}>
      <span style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--muted)' }}>{label}</span>
      <span style={{ fontSize: 12, fontFamily: 'var(--mono)', color: val > 0 ? (accent || 'var(--text)') : 'var(--muted-2)' }}>{fmt(val)}</span>
    </div>
  );

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Job Fit</div>
        <div className="page-sub">Negotiate from numbers. Model the true value of any offer: compensation, benefits, commute cost, and quality of life.</div>
      </div>

      {/* ── Three input columns ── */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 12 }}>

        {/* Col 1: Offer + Benefits */}
        <div>
          <div className="card" style={{ marginBottom: 10 }}>
            <div className="card-title">Offer Details</div>
            <div className="field">
              <label>Company</label>
              <input value={company} onChange={e => setCompany(e.target.value)} placeholder="Acme Corp" />
            </div>
            <div className="field">
              <label>Role</label>
              <input value={role} onChange={e => setRole(e.target.value)} placeholder="Principal PM, AI" />
            </div>
            <div className="field">
              <label>Base Salary ($)</label>
              <input type="number" value={base} onChange={e => setBase(e.target.value)} placeholder="180,000" />
            </div>
            <div className="field-row">
              <div className="field">
                <label>Annual Bonus (%)</label>
                <input type="number" value={bonusPct} onChange={e => setBonusPct(e.target.value)} placeholder="15" />
              </div>
              <div className="field">
                <label>Equity / RSU ($/yr)</label>
                <input type="number" value={equity} onChange={e => setEquity(e.target.value)} placeholder="40,000" />
              </div>
            </div>
            <div className="field">
              <label>Signing Bonus ($)</label>
              <input type="number" value={signing} onChange={e => setSigning(e.target.value)} placeholder="20,000" />
            </div>
          </div>

          <div className="card" style={{ marginBottom: 0 }}>
            <div className="card-title">Benefits</div>
            <div className="field">
              <label>Health Insurance (employer $/mo)</label>
              <input type="number" value={healthMo} onChange={e => setHealthMo(e.target.value)} placeholder="600" />
            </div>
            <div className="field-row">
              <div className="field">
                <label>401k Match (%)</label>
                <input type="number" value={k401Match} onChange={e => setK401Match(e.target.value)} placeholder="4" />
              </div>
              <div className="field">
                <label>Your Contribution (%)</label>
                <input type="number" value={k401Contrib} onChange={e => setK401Contrib(e.target.value)} placeholder="6" />
              </div>
            </div>
            <div className="field">
              <label>PTO Days</label>
              <input type="number" value={ptoDays} onChange={e => setPtoDays(e.target.value)} placeholder="20" />
            </div>
            <div className="field-row">
              <div className="field">
                <label>Remote Stipend ($/yr)</label>
                <input type="number" value={remoteStipend} onChange={e => setRemoteStipend(e.target.value)} placeholder="1,200" />
              </div>
              <div className="field">
                <label>Learning Budget ($/yr)</label>
                <input type="number" value={learningBudget} onChange={e => setLearningBudget(e.target.value)} placeholder="2,000" />
              </div>
            </div>
          </div>
        </div>

        {/* Col 2: Work Style + QoL */}
        <div>
          <div className="card" style={{ marginBottom: 10 }}>
            <div className="card-title">Work Style</div>
            <div className="field">
              <label>Arrangement</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {['remote', 'hybrid', 'onsite'].map(a => (
                  <button key={a} onClick={() => setArrangement(a)}
                    className={`chip ${arrangement === a ? 'active' : ''}`}
                    style={{ flex: 1, textAlign: 'center', textTransform: 'capitalize' }}>
                    {a}
                  </button>
                ))}
              </div>
            </div>
            {arrangement !== 'remote' && (
              <div className="field">
                <label>Office Days / Week</label>
                <div style={{ display: 'flex', gap: 6 }}>
                  {['1','2','3','4','5'].map(d => (
                    <button key={d} onClick={() => setOfficeDays(d)}
                      className={`chip ${officeDays === d ? 'active' : ''}`}
                      style={{ flex: 1, textAlign: 'center' }}>{d}</button>
                  ))}
                </div>
              </div>
            )}
            <div className="field">
              <label>Expected Weekly Hours</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {['40','45','50+'].map(h => (
                  <button key={h} onClick={() => setWeeklyHours(h)}
                    className={`chip ${weeklyHours === h ? 'active' : ''}`}
                    style={{ flex: 1, textAlign: 'center' }}>{h}</button>
                ))}
              </div>
            </div>
            {hrsPenalty > 0 && (
              <div style={{ marginTop: 6, fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--muted-2)', padding: '6px 10px', background: 'rgba(240,238,248,.04)', borderRadius: 6, lineHeight: 1.6 }}>
                ⚠ At {weeklyHours}hrs/wk your effective hourly rate is ~{hrsPenalty}% lower than a 40hr role at the same base.
              </div>
            )}
          </div>

          <div className="card" style={{ marginBottom: 0 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div className="card-title" style={{ marginBottom: 0 }}>Quality of Life</div>
              <span style={{ fontSize: 18, fontFamily: 'var(--mono)', color: rating.color, fontWeight: 500 }}>{qolScore}<span style={{ fontSize: 10, color: 'var(--muted-2)' }}>/100</span></span>
            </div>
            <RatingSlider label="Career Growth Potential" value={growth}     onChange={setGrowth} />
            <RatingSlider label="Manager Quality"         value={manager}    onChange={setManager} />
            <RatingSlider label="Team Culture Fit"        value={culture}    onChange={setCulture} />
            <RatingSlider label="Work-Life Balance"       value={wlb}        onChange={setWlb} />
            <RatingSlider label="Role Excitement"         value={excitement} onChange={setExcitement} />
            <div style={{ marginTop: 10, display: 'flex', justifyContent: 'center' }}>
              <span style={{ padding: '4px 16px', borderRadius: 20, fontSize: 10, fontFamily: 'var(--mono)', letterSpacing: '.1em', textTransform: 'uppercase', fontWeight: 500, color: rating.color, background: rating.bg, border: `1px solid ${rating.border}` }}>
                {rating.label}
              </span>
            </div>
          </div>
        </div>

        {/* Col 3: Commute */}
        <div className="card" style={{ marginBottom: 0 }}>
          <div className="card-title">Commute Cost Calculator</div>
          {arrangement === 'remote' ? (
            <div style={{ padding: '20px 0', textAlign: 'center' }}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>🌐</div>
              <div style={{ fontSize: 12, fontFamily: 'var(--mono)', color: 'var(--muted)', letterSpacing: '.06em' }}>Remote — no commute cost</div>
            </div>
          ) : (
            <>
              <div className="field-row">
                <div className="field">
                  <label>One-Way Miles</label>
                  <input type="number" value={miles} onChange={e => setMiles(e.target.value)} placeholder="18" />
                </div>
                <div className="field">
                  <label>One-Way Time (min)</label>
                  <input type="number" value={commuteMin} onChange={e => setCommuteMin(e.target.value)} placeholder="35" />
                </div>
              </div>
              <div className="field-row">
                <div className="field">
                  <label>Gas Price ($/gal)</label>
                  <input type="number" step="0.01" value={gasPrice} onChange={e => setGasPrice(e.target.value)} />
                </div>
                <div className="field">
                  <label>Vehicle MPG</label>
                  <input type="number" value={mpg} onChange={e => setMpg(e.target.value)} />
                </div>
              </div>
              <div className="field-row">
                <div className="field">
                  <label>Depreciation ($/mi)</label>
                  <input type="number" step="0.01" value={depPerMile} onChange={e => setDepPerMile(e.target.value)} />
                </div>
                <div className="field">
                  <label>Monthly Parking ($)</label>
                  <input type="number" value={parking} onChange={e => setParking(e.target.value)} placeholder="0" />
                </div>
              </div>
              <div className="field">
                <label>Monthly Tolls ($)</label>
                <input type="number" value={tolls} onChange={e => setTolls(e.target.value)} placeholder="0" />
              </div>

              {annualMiles > 0 && (
                <div style={{ marginTop: 12, background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 8, padding: 12 }}>
                  <div style={{ fontSize: 9, fontFamily: 'var(--mono)', color: 'var(--muted-2)', letterSpacing: '.16em', textTransform: 'uppercase', marginBottom: 8 }}>Annual Breakdown</div>
                  {[
                    { label: 'Gas',            val: gasCost },
                    { label: 'Depreciation',   val: depCost },
                    { label: 'Parking',        val: parkCost },
                    { label: 'Tolls',          val: tollCost },
                    { label: `Time Cost (${Math.round(commuteHrs)}hrs × ${fmt(hourlyRate)}/hr)`, val: timeCost },
                  ].map(c => (
                    <div key={c.label} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: 11 }}>
                      <span style={{ fontFamily: 'var(--mono)', color: 'var(--muted)', fontSize: 10 }}>{c.label}</span>
                      <span style={{ fontFamily: 'var(--mono)', color: c.val > 0 ? '#e06090' : 'var(--muted-2)' }}>{fmt(c.val)}</span>
                    </div>

                <input type="number" value={roundForm.base} onChange={e => setRoundForm(f => ({...f, base: e.target.value}))} placeholder="175,000" />

            <div className="field-row">
              <div className="field">
                <label>Bonus (%)</label>
                <input type="number" value={roundForm.bonus} onChange={e => setRoundForm(f => ({...f, bonus: e.target.value}))} placeholder="12" />
              </div>
              <div className="field">
                <label>Equity ($/yr)</label>
                <input type="number" value={roundForm.equity} onChange={e => setRoundForm(f => ({...f, equity: e.target.value}))} placeholder="30,000" />
              </div>
              <div className="field">
                <label>Signing ($)</label>
                <input type="number" value={roundForm.signing} onChange={e => setRoundForm(f => ({...f, signing: e.target.value}))} placeholder="15,000" />
              </div>
            </div>
            <div className="field">
              <label>Notes</label>
              <input value={roundForm.notes} onChange={e => setRoundForm(f => ({...f, notes: e.target.value}))} placeholder="Countered via recruiter — deadline Friday" />

                <th>Notes</th>

                const rBase   = n(r.base);
                const rBonus  = rBase * (n(r.bonus) / 100);
                const rEq     = n(r.equity);
                const rSign   = n(r.signing);
                const rTotal  = rBase + rBonus + rEq;
                const prev    = rounds[i - 1];
                const delta   = prev && r.base && prev.base ? rBase - n(prev.base) : null;
                return (
                  <tr key={r.id}>
                    <td><span style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--accent)' }}>{r.label || `Round ${i+1}`}</span></td>
                    <td><span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--muted-2)' }}>{r.date}</span></td>
                    <td>
                      <div style={{ fontSize: 12, fontFamily: 'var(--mono)' }}>{r.base ? fmt(rBase) : '—'}</div>
                      {delta !== null && <div style={{ fontSize: 9, fontFamily: 'var(--mono)', color: delta >= 0 ? '#3aad6e' : '#D01878' }}>{delta >= 0 ? '+' : ''}{fmt(delta)}</div>}
                    </td>
                    <td><span style={{ fontSize: 12, fontFamily: 'var(--mono)' }}>{r.bonus ? `${r.bonus}%` : '—'}</span></td>
                    <td><span style={{ fontSize: 12, fontFamily: 'var(--mono)' }}>{r.equity ? fmt(rEq) : '—'}</span></td>
                    <td><span style={{ fontSize: 12, fontFamily: 'var(--mono)' }}>{r.signing ? fmt(rSign) : '—'}</span></td>
                    <td><span style={{ fontSize: 12, fontFamily: 'var(--mono)', color: 'var(--accent)' }}>{r.base ? fmt(rTotal) : '—'}</span></td>
                    <td><span style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'Georgia, serif', fontStyle: 'italic' }}>{r.notes}</span></td>
                    <td><button style={{ background: 'none', border: 'none', color: 'var(--muted-2)', cursor: 'pointer', fontSize: 14, lineHeight: 1 }} onClick={() => setRounds(prev => prev.filter(x => x.id !== r.id))}>×</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function SignalFeed({ apiKey, onNeedApiKey, demoMode = false }) {
  const [companies, setCompanies] = useState(() => { const s = load(); return s?.signalFeed || []; });
  const [newCompany, setNewCompany] = useState('');
  const [loadingMap, setLoadingMap] = useState({});
  const [toast, setToast] = useState(null);

  if (demoMode) {
    return (
      <div>
        <div className="page-header"><div className="page-title">Signal Feed</div><div className="page-sub">Live market signals · Demo</div></div>
        {DEMO_DATA.signals.map(s => (
          <div key={s.id} style={{padding:'14px 16px',marginBottom:8,background:'rgba(255,255,255,.025)',border:'1px solid rgba(201,168,76,.1)',borderRadius:8}}>
            <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--accent)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}}>{s.type}</div>
            <div style={{fontSize:14,color:'var(--text)',marginBottom:4,lineHeight:1.4}}>{s.headline}</div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.65}}>{s.summary}</div>
          </div>
        ))}
      </div>
    );
  }

  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, signalFeed: companies });
  }, [companies]);

  function addCompany() {
    const name = newCompany.trim();
    if (!name) return;
    if (companies.some(c => c.name.toLowerCase() === name.toLowerCase())) { setToast('Already in feed'); return; }
    setCompanies(prev => [{ id: Date.now(), name, addedOn: new Date().toLocaleDateString(), lastRefreshed: null, brief: null }, ...prev]);
    setNewCompany('');
  }

  function removeCompany(id) { setCompanies(prev => prev.filter(c => c.id !== id)); }

  async function refreshCompany(company) {
    if (!apiKey) { onNeedApiKey(); return; }
    setLoadingMap(prev => ({ ...prev, [company.id]: true }));
    try {
      const prompt = `You are a company intelligence analyst. Research ${company.name} and report on notable signals from the last 90 days relevant to a job seeker evaluating this company.

Return ONLY valid JSON, no markdown, no fences. Schema:
{
  "funding": "funding rounds, valuation, investment news — or null if none",
  "layoffs": "layoffs, reductions, hiring freeze — or null if none",
  "leadership": "executive hires, departures, org changes — or null if none",
  "productLaunches": "product launches, acquisitions, pivots — or null if none",
  "reorgs": "restructuring, rebranding, strategic shifts — or null if none",
  "summary": "1-2 sentences: overall signal picture for a job seeker — what does this mean for someone considering joining?",
  "sentiment": "POSITIVE or NEUTRAL or CAUTIOUS"
}

Use null for any category with no notable signals. Be specific and direct.`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 500, messages: [{ role: 'user', content: prompt }] }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const brief = JSON.parse(data.content[0].text.trim());
      setCompanies(prev => prev.map(c => c.id === company.id ? { ...c, brief, lastRefreshed: new Date().toLocaleDateString() } : c));
    } catch(e) {
      setToast(`Refresh failed: ${e.message}`);
    } finally {
      setLoadingMap(prev => ({ ...prev, [company.id]: false }));
    }
  }

  function addToResearch(name) {
    window.__apertureCompany = name;
  }

  const sentColor = s => s === 'POSITIVE' ? 'rgba(61,226,136,.85)' : s === 'CAUTIOUS' ? 'rgba(208,24,120,.85)' : 'var(--muted)';
  const sigLabel = (label, text) => text ? (
    <div style={{display:'flex', gap:8, alignItems:'flex-start'}}>
      <span style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--accent)', letterSpacing:'.06em', padding:'2px 6px', background:'rgba(201,168,76,.1)', border:'1px solid rgba(201,168,76,.2)', borderRadius:4, flexShrink:0, marginTop:1}}>{label}</span>
      <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', lineHeight:1.5}}>{text}</span>
    </div>
  ) : null;

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Signal Feed</div>
        <div className="page-sub">Track target companies for funding, layoffs, leadership changes, and product moves. Hit Refresh on any company to pull a 90 day intel brief.</div>
      </div>
      {!apiKey && (
        <div className="card" style={{borderColor:'rgba(201,168,76,.4)', background:'rgba(201,168,76,.06)'}}>
          <div style={{fontSize:13, color:'var(--accent)'}}>API key required. <button onClick={onNeedApiKey} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',textDecoration:'underline',fontSize:13,padding:0,fontFamily:'inherit'}}>Add in Settings.</button></div>
        </div>
      )}
      <div className="card">
        <div style={{display:'flex', gap:8}}>
          <input value={newCompany} onChange={e => setNewCompany(e.target.value)} onKeyDown={e => e.key === 'Enter' && addCompany()} placeholder="Add a company to watch…" style={{flex:1}} />
          <button className="btn btn-primary" onClick={addCompany} disabled={!newCompany.trim()}>Add</button>
        </div>
      </div>
      {companies.length === 0 && (
        <div style={{textAlign:'center', padding:'48px 24px', color:'var(--muted-2)', fontFamily:'var(--mono)', fontSize:12}}>Add companies above to start tracking signals.</div>
      )}
      {companies.map(company => {
        const b = company.brief;
        const sigs = b ? [
          b.funding && ['Funding', b.funding],
          b.layoffs && ['Layoffs', b.layoffs],
          b.leadership && ['Leadership', b.leadership],
          b.productLaunches && ['Product', b.productLaunches],
          b.reorgs && ['Reorg', b.reorgs],
        ].filter(Boolean) : [];
        return (
          <div key={company.id} style={{background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'16px 18px', marginBottom:10}}>
            <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, marginBottom: b ? 10 : 0}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{fontSize:13, fontWeight:600, fontFamily:'var(--mono)', color:'var(--text)'}}>{company.name}</span>
                  {b?.sentiment && <span style={{fontSize:9, fontFamily:'var(--mono)', color:sentColor(b.sentiment), letterSpacing:'.07em'}}>{b.sentiment}</span>}
                </div>
                <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', marginTop:2}}>
                  Added {company.addedOn}{company.lastRefreshed ? ` · refreshed ${company.lastRefreshed}` : ''}
                </div>
              </div>
              <div style={{display:'flex', gap:6, flexShrink:0}}>
                <button className="btn btn-primary btn-sm" onClick={() => refreshCompany(company)} disabled={loadingMap[company.id]} style={{fontSize:11, padding:'4px 10px'}}>
                  {loadingMap[company.id] ? '⟳' : b ? 'Refresh' : 'Get Signals'}
                </button>
                <button onClick={() => removeCompany(company.id)} style={{background:'none',border:'none',color:'var(--muted-2)',cursor:'pointer',fontSize:16,padding:'2px 6px',lineHeight:1}}>×</button>
              </div>
            </div>
            {b?.summary && <div style={{fontSize:12, color:'var(--text)', lineHeight:1.55, marginBottom: sigs.length ? 10 : 0}}>{b.summary}</div>}
            {sigs.length > 0 && (
              <div style={{display:'flex', flexDirection:'column', gap:6}}>
                {sigs.map(([label, text], i) => sigLabel(label, text) && <React.Fragment key={i}>{sigLabel(label, text)}</React.Fragment>)}
              </div>
            )}
            {!b && <div style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted-2)', fontStyle:'italic', marginTop:4}}>Hit Get Signals to pull recent intel.</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── Activity Report (MA Unemployment Work Search Log) ─────────────────────────

function ActivityReport() {
  const MA_MINIMUM = 3;

  // MA unemployment week: Saturday through Friday
  function getWeekBounds(offset) {
    const now = new Date();
    const day = now.getDay(); // 0=Sun … 6=Sat
    const daysSinceSat = day === 6 ? 0 : day + 1;
    const start = new Date(now);
    start.setDate(now.getDate() - daysSinceSat + (offset * 7));
    start.setHours(0,0,0,0);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23,59,59,999);
    return { start, end };
  }

  const [weekOffset, setWeekOffset] = useState(0);
  const [manualActs, setManualActs] = useState(() => { const s = load(); return s?.activityReport?.manual || []; });
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0,10), employer:'', city:'', method:'Applied online', position:'', result:'' });
  const [toast, setToast] = useState(null);

  const { start, end } = getWeekBounds(weekOffset);

  function fmt(d) { return d.toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'numeric' }); }

  function inRange(str) {
    if (!str) return false;
    try { const d = new Date(str); return !isNaN(d) && d >= start && d <= end; } catch(_){ return false; }
  }

  function gatherActs() {
    const stored = load() || {};
    const acts = [];

    // Board — job cards
    const colMap = {
      watching:  ['Online job board research', 'Identified opportunity'],
      applied:   ['Applied online', 'Application submitted'],
      screen:    ['Employer phone screen', 'Interview completed'],
      interview: ['Employer interview (video/in-person)', 'Interview completed'],
      offer:     ['Employer contact', 'Offer received'],
    };
    Object.entries(stored.kanban?.jobCards || {}).forEach(([col, cards]) => {
      (cards || []).forEach(card => {
        // Fallback: use numeric id as timestamp for legacy cards missing created field
        const ts = card.created || (typeof card.id === 'number' ? new Date(card.id).toISOString() : null);
        if (!inRange(ts)) return;
        const [method, result] = colMap[col] || ['Job search activity', 'In progress'];
        // Cards from job search have card.company (employer) + card.title (job title) separately
        // Cards added manually have card.title as "Company · Role" or just company
        const employer = card.company || card.title || '';
        const position = card.company ? card.title : (card.sub || card.title || '');
        acts.push({ date: new Date(ts), employer, city:'', method, position, result, source:'board' });
      });
    });

    // Deep Research history
    (stored.deepResearch?.history || []).forEach(item => {
      if (!inRange(item.ts)) return;
      acts.push({
        date: new Date(item.ts),
        employer: item.label?.split(' · ')[0] || item.label || '',
        city: '',
        method: item.type === 'person' ? 'Professional networking (online)' : 'Online employer research',
        position: 'General inquiry',
        result: 'Research completed',
        source: 'research',
      });
    });

    // People contacts
    (stored.people || []).forEach(p => {
      if (!inRange(p.addedOn)) return;
      acts.push({ date: new Date(p.addedOn), employer: p.company || '', city:'', method:'Professional networking (LinkedIn)', position: p.title || 'Networking contact', result:'Contact established', source:'people' });
    });

    // Signal Feed refreshes
    (stored.signalFeed || []).forEach(co => {
      if (!inRange(co.lastRefreshed)) return;
      acts.push({ date: new Date(co.lastRefreshed), employer: co.name || '', city:'', method:'Online company research', position:'General inquiry', result:'Research completed', source:'signals' });
    });

    // Manual entries
    manualActs.forEach(m => {
      if (!inRange(m.date)) return;
      acts.push({ date: new Date(m.date), employer: m.employer, city: m.city || '', method: m.method, position: m.position, result: m.result, source:'manual', id: m.id });
    });

    acts.sort((a,b) => a.date - b.date);
    return acts;
  }

  const activities = gatherActs();
  const met = activities.length >= MA_MINIMUM;

  function saveManual() {
    if (!form.employer.trim()) return;
    const entry = { ...form, id: Date.now() };
    const updated = [...manualActs, entry];
    setManualActs(updated);
    const stored = load() || {};
    persist({ ...stored, activityReport: { ...(stored.activityReport || {}), manual: updated } });
    setForm({ date: new Date().toISOString().slice(0,10), employer:'', city:'', method:'Applied online', position:'', result:'' });
    setShowAdd(false);
    setToast('Activity added');
  }

  function removeManual(id) {
    const updated = manualActs.filter(m => m.id !== id);
    setManualActs(updated);
    const stored = load() || {};
    persist({ ...stored, activityReport: { ...(stored.activityReport || {}), manual: updated } });
  }

  function copyReport() {
    const pad = (s, n) => String(s || '').slice(0, n).padEnd(n);
    const lines = [
      'MASSACHUSETTS UNEMPLOYMENT WEEKLY WORK SEARCH LOG',
      `Week of: ${fmt(start)} through ${fmt(end)}`,
      '',
      `${'#'.padEnd(4)}${'DATE'.padEnd(13)}${'EMPLOYER'.padEnd(28)}${'CITY/STATE'.padEnd(16)}${'CONTACT METHOD'.padEnd(35)}${'POSITION'.padEnd(28)}RESULT`,
      `${'-'.repeat(4)}${'-'.repeat(13)}${'-'.repeat(28)}${'-'.repeat(16)}${'-'.repeat(35)}${'-'.repeat(28)}${'-'.repeat(24)}`,
    ];
    activities.forEach((a, i) => {
      lines.push(`${String(i+1).padEnd(4)}${fmt(a.date).padEnd(13)}${pad(a.employer,28)}${pad(a.city,16)}${pad(a.method,35)}${pad(a.position,28)}${a.result || ''}`);
    });
    lines.push('');
    lines.push(`Total activities: ${activities.length}  |  Minimum required: ${MA_MINIMUM}/week  |  Status: ${met ? 'REQUIREMENT MET' : `NEED ${MA_MINIMUM - activities.length} MORE`}`);
    navigator.clipboard.writeText(lines.join('\n')).then(() => setToast('Report copied to clipboard'));
  }

  function printReport() {
    const rows = activities.map((a, i) => `
      <tr>
        <td>${i+1}</td>
        <td style="white-space:nowrap">${fmt(a.date)}</td>
        <td>${a.employer || ''}</td>
        <td>${a.city || ''}</td>
        <td>${a.method || ''}</td>
        <td>${a.position || ''}</td>
        <td>${a.result || ''}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <title>MA DUA Work Search Log — ${fmt(start)} to ${fmt(end)}</title>
      <style>
        body { font-family: Arial, sans-serif; font-size: 12px; margin: 32px; color: #111; }
        h2 { font-size: 15px; margin-bottom: 4px; }
        .sub { font-size: 11px; color: #555; margin-bottom: 20px; }
        .status { display:inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 20px;
          background: ${met ? '#d4edda' : '#fff3cd'}; color: ${met ? '#155724' : '#856404'}; border: 1px solid ${met ? '#c3e6cb' : '#ffeeba'}; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f5f5f5; border: 1px solid #ddd; padding: 6px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
        td { border: 1px solid #ddd; padding: 6px 8px; vertical-align: top; }
        tr:nth-child(even) { background: #fafafa; }
        .footer { margin-top: 20px; font-size: 10px; color: #888; }
        @media print { body { margin: 16px; } }
      </style>
    </head><body>
      <h2>Massachusetts DUA — Weekly Work Search Log</h2>
      <div class="sub">Week of ${fmt(start)} through ${fmt(end)} &nbsp;·&nbsp; Saturday–Friday (MA DUA certification week)</div>
      <div class="status">${met ? `✓ REQUIREMENT MET — ${activities.length} of ${MA_MINIMUM} activities` : `⚠ ${activities.length} of ${MA_MINIMUM} required — need ${MA_MINIMUM - activities.length} more`}</div>
      <table>
        <thead><tr><th>#</th><th>Date</th><th>Employer / Organization</th><th>City, State</th><th>Contact Method</th><th>Position / Work Type</th><th>Result</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="footer">Generated by Career Aperture · Perez Creative Labs &nbsp;·&nbsp; Keep records for at least one year per MA DUA requirements.</div>
    </body></html>`;
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 400);
  }

  const METHODS = [
    'Applied online','Applied by email','Applied in person','Phone inquiry',
    'Interview (phone)','Interview (video)','Interview (in-person)',
    'Job fair / career fair','Networking event','Professional networking (LinkedIn)',
    'Online employer research','Staffing / recruiting agency','Career center services',
    'Resume or profile updated','Other',
  ];

  const weekLabel = weekOffset === 0 ? 'This week' : weekOffset === -1 ? 'Last week' : `${Math.abs(weekOffset)} weeks ago`;
  const sourceTag = s => ({ board:'board', research:'research', people:'network', signals:'signals', manual:null }[s]);

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

      <div className="page-header">
        <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16, flexWrap:'wrap'}}>
          <div>
            <div className="page-title">Activity Report</div>
            <div className="page-sub">Massachusetts DUA weekly work search log. Minimum 3 activities required per certification week.</div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexShrink:0}}>
            <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(w => w - 1)}>← Prev</button>
            <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--muted)', whiteSpace:'nowrap', minWidth:80, textAlign:'center'}}>{weekLabel}</span>
            <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(w => Math.min(0, w+1))} disabled={weekOffset === 0}>Next →</button>
          </div>
        </div>
      </div>

      {/* Week status bar */}
      <div className="card" style={{borderColor: met ? 'rgba(61,226,136,.25)' : 'rgba(201,168,76,.3)', background: met ? 'rgba(61,226,136,.04)' : 'rgba(201,168,76,.05)'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12}}>

            <div style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--muted-2)', letterSpacing:'.14em', textTransform:'uppercase', marginBottom:3}}>Certification Week</div>
            <div style={{fontSize:14, fontFamily:'var(--mono)', color:'var(--text)', fontWeight:500}}>
              {fmt(start)} through {fmt(end)}
            </div>

            <button className="btn btn-primary btn-sm" onClick={copyReport} disabled={activities.length === 0}>Copy Report</button>

                <label>Employer / Organization</label>

              </div>
              <div className="field" style={{flex:1}}>
                <label>City, State</label>
                <input value={form.city} onChange={e => setForm(f => ({...f, city:e.target.value}))} placeholder="Boston, MA" />

            </div>
            <div className="field-row">
              <div className="field" style={{flex:2}}>
                <label>Contact Method</label>
                <div style={{position:'relative'}}>
                  <select value={form.method} onChange={e => setForm(f => ({...f, method:e.target.value}))}>
                    {METHODS.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                  <span style={{position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', color:'var(--muted-2)', fontSize:11}}>▾</span>
                </div>
              </div>
              <div className="field" style={{flex:2}}>
                <label>Position / Type of Work</label>
                <input value={form.position} onChange={e => setForm(f => ({...f, position:e.target.value}))} placeholder="Principal PM, AI Platform" />
              </div>
              <div className="field" style={{flex:2}}>
                <label>Result</label>
                <input value={form.result} onChange={e => setForm(f => ({...f, result:e.target.value}))} placeholder="Applied, Interview scheduled..." />
              </div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={saveManual} disabled={!form.employer.trim()}>Add to log</button>
          </div>
        )}

        {activities.length === 0 ? (
          <div style={{fontSize:12, fontFamily:'var(--mono)', color:'var(--muted-2)', fontStyle:'italic', padding:'12px 0'}}>
            No activities tracked for this week. Add entries manually, or use the Board, Deep Research, People, and Signal Feed to auto-log activities.
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:11, fontFamily:'var(--mono)'}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border)'}}>
                  {['#','Date','Employer','City / State','Contact Method','Position','Result',''].map((h,i) => (
                    <th key={i} style={{textAlign:'left', padding:'5px 10px', fontSize:9, color:'var(--muted-2)', letterSpacing:'.1em', fontWeight:400, textTransform:'uppercase', whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {activities.map((a, i) => (
                  <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'9px 10px', color:'var(--muted-2)', fontSize:10}}>{i+1}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted)', whiteSpace:'nowrap'}}>{fmt(a.date)}</td>
                    <td style={{padding:'9px 10px', color:'var(--text)', fontWeight:500, maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.employer}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted-2)', whiteSpace:'nowrap'}}>{a.city || '—'}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted)', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.method}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted)', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.position || '—'}</td>
                    <td style={{padding:'9px 10px', color:'var(--muted-2)', maxWidth:140, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.result}</td>
                    <td style={{padding:'9px 6px', whiteSpace:'nowrap'}}>
                      {a.source === 'manual'
                        ? <button onClick={() => removeManual(a.id)} style={{background:'none', border:'none', color:'var(--muted-2)', cursor:'pointer', fontSize:14, padding:'1px 5px', lineHeight:1}}>×</button>
                        : <span style={{fontSize:9, padding:'1px 6px', background:'rgba(240,238,248,.06)', borderRadius:4, color:'var(--muted-2)'}}>{sourceTag(a.source)}</span>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div style={{fontSize:10, fontFamily:'var(--mono)', color:'var(--muted-2)', lineHeight:1.75, padding:'2px'}}>
        Activities are auto-populated from your Board (job applications), Deep Research history, People contacts, and Signal Feed refreshes.
        Add manually for job fairs, phone inquiries, staffing agencies, or anything else not tracked in the app.
        Massachusetts DUA requires a minimum of 3 work search contacts per week. Keep records for at least one year.
      </div>
    </div>
  );
}

      return <svg style={s} viewBox="0 0 14 14" {...p}><circle cx="7" cy="7" r="2"/><path d="M7 1.5v1.2M7 11.3v1.2M1.5 7h1.2M11.3 7h1.2M3.4 3.4l.85.85M9.75 9.75l.85.85M3.4 10.6l.85-.85M9.75 4.25l.85-.85"/></svg>;

const KANBAN_JOB_COLS = [
  { id: 'watching',   label: 'Watching',   color: 'rgba(240,238,248,.12)' },
  { id: 'applied',    label: 'Applied',    color: 'rgba(201,168,76,.18)' },
  { id: 'screen',     label: 'Screen',     color: 'rgba(139,43,190,.22)' },
  { id: 'interview',  label: 'Interview',  color: 'rgba(208,24,120,.22)' },
  { id: 'offer',      label: 'Offer',      color: 'rgba(61,226,136,.20)' },
];
const KANBAN_SMB_COLS = [
  { id: 'prospect',   label: 'Prospect',   color: 'rgba(240,238,248,.12)' },
  { id: 'outreach',   label: 'Outreach',   color: 'rgba(201,168,76,.18)' },
  { id: 'meeting',    label: 'Meeting',    color: 'rgba(139,43,190,.22)' },
  { id: 'proposal',   label: 'Proposal',   color: 'rgba(208,24,120,.22)' },
  { id: 'won',        label: 'Won',        color: 'rgba(61,226,136,.20)' },
];
const KANBAN_PROJECT_COLS = [
  { id: 'kickoff',    label: 'Kickoff',    color: 'rgba(240,238,248,.12)' },
  { id: 'inprogress', label: 'In Progress',color: 'rgba(201,168,76,.18)' },
  { id: 'review',     label: 'Review',     color: 'rgba(139,43,190,.22)' },
  { id: 'delivered',  label: 'Delivered',  color: 'rgba(208,24,120,.22)' },
  { id: 'invoiced',   label: 'Invoiced',   color: 'rgba(61,226,136,.20)' },
  { id: 'paid',       label: 'Paid',       color: 'rgba(61,226,136,.38)' },
];

function KanbanBoard() {
  const [activeTab, setActiveTab] = useState('jobs');
  const [jobCards, setJobCards] = useState(() => {
    const s = load(); return s && s.kanban && s.kanban.jobCards ? s.kanban.jobCards : {};
  });
  const [smbCards, setSmbCards] = useState(() => {
    const s = load(); return s && s.kanban && s.kanban.smbCards ? s.kanban.smbCards : {};
  });
  const [projectCards, setProjectCards] = useState(() => {
    const s = load(); return s && s.kanban && s.kanban.projectCards ? s.kanban.projectCards : {};
  });
  const [adding, setAdding]   = useState(null);  // colId or null
  const [addText, setAddText] = useState('');
  const [addSub,  setAddSub]  = useState('');
  const [addDate, setAddDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [toast, setToast]     = useState(null);
  const [sheetView, setSheetView] = useState(() => { const s = load(); return s?.kanban?.sheetView || false; });

  useEffect(() => {
    const stored = load() || {};
    persist({ ...stored, kanban: { jobCards, smbCards, projectCards } });
  }, [jobCards, smbCards, projectCards]);

  const cols    = activeTab === 'jobs' ? KANBAN_JOB_COLS : activeTab === 'smb' ? KANBAN_SMB_COLS : KANBAN_PROJECT_COLS;
  const cards   = activeTab === 'jobs' ? jobCards : activeTab === 'smb' ? smbCards : projectCards;
  const setCards= activeTab === 'jobs' ? setJobCards : activeTab === 'smb' ? setSmbCards : setProjectCards;

  function getCol(id) { return cards[id] || []; }

  function addCard(colId) {
    const title = addText.trim();
    if (!title) return;
    const displayDate = addDate
      ? new Date(addDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    // created: ISO timestamp so ActivityReport can date-range filter this card
    const created = addDate
      ? new Date(addDate + 'T12:00:00').toISOString()
      : new Date().toISOString();
    const card = { id: Date.now(), title, sub: addSub.trim(), date: displayDate, created };
    setCards(prev => ({ ...prev, [colId]: [...(prev[colId] || []), card] }));
    setAdding(null); setAddText(''); setAddSub('');
    setAddDate(new Date().toISOString().slice(0, 10));
  }

  function removeCard(colId, id) {
    setCards(prev => ({ ...prev, [colId]: (prev[colId] || []).filter(c => c.id !== id) }));
  }

  function moveCard(fromId, toId, card) {
    setCards(prev => ({
      ...prev,
      [fromId]: (prev[fromId] || []).filter(c => c.id !== card.id),
      [toId]:   [...(prev[toId] || []), { ...card }],
    }));
    setToast(`Moved to ${cols.find(c => c.id === toId)?.label}`);
  }

  // Analytics helpers
  const jobColCounts = KANBAN_JOB_COLS.map(c => ({ ...c, count: (jobCards[c.id] || []).length }));
  const smbColCounts = KANBAN_SMB_COLS.map(c => ({ ...c, count: (smbCards[c.id] || []).length }));

  function pct(a, b) { return b === 0 ? 0 : Math.round((a / b) * 100); }

  const jobApps       = jobColCounts.find(c => c.id === 'applied')?.count || 0;
  const jobScreens    = jobColCounts.find(c => c.id === 'screen')?.count || 0;
  const jobInterviews = jobColCounts.find(c => c.id === 'interview')?.count || 0;
  const jobOffers     = jobColCounts.find(c => c.id === 'offer')?.count || 0;
  const jobTotal      = jobColCounts.reduce((s, c) => s + c.count, 0);

  const smbTotal      = smbColCounts.reduce((s, c) => s + c.count, 0);
  const smbOutreach   = smbColCounts.find(c => c.id === 'outreach')?.count || 0;
  const smbMeetings   = smbColCounts.find(c => c.id === 'meeting')?.count || 0;
  const smbWon        = smbColCounts.find(c => c.id === 'won')?.count || 0;

  return (
    <div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      <div className="page-header">
        <div className="page-title">Board</div>
        <div className="page-sub">Track your pipeline: job applications, SMB prospects, and active projects.</div>
      </div>

      <div className="kanban-tabs" style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:8}}>
        <div style={{display:'flex', gap:4}}>
          <button className={`ktab ${activeTab === 'jobs' ? 'active' : ''}`} onClick={() => { setActiveTab('jobs'); setSheetView(false); }}>Job Hunting</button>
          <button className={`ktab ${activeTab === 'smb' ? 'active' : ''}`} onClick={() => { setActiveTab('smb'); setSheetView(false); }}>SMB Clients</button>
          <button className={`ktab ${activeTab === 'projects' ? 'active' : ''}`} onClick={() => { setActiveTab('projects'); setSheetView(false); }}>Projects</button>
        </div>
        <button
          onClick={() => { const v = !sheetView; setSheetView(v); const stored = load() || {}; persist({ ...stored, kanban: { ...(stored.kanban||{}), sheetView: v } }); }}
          title="Contact Sheet: all cards across all boards"
          style={{background: sheetView ? 'var(--accent)' : 'rgba(240,238,248,.06)', border:'1px solid var(--border)', borderRadius:6, padding:'5px 10px', fontSize:11, fontFamily:'var(--mono)', color: sheetView ? '#09080A' : 'var(--muted)', cursor:'pointer', letterSpacing:'.04em', display:'flex', alignItems:'center', gap:5}}
        >
